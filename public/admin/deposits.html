<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>充值审核 - FOOTRADAPRO 后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- JS 引用 - 保留原有 -->
    <script src="/js/core/config.js"></script>
    <script src="/js/core/timezone.js"></script>
    <script src="/js/admin/admin_auth_guard.js"></script>
    
    <style>
        /* ============================================
           世界級後台管理系統 - 充值审核頁面
           深色主題 | 玻璃態效果 | 響應式佈局
        ============================================ */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --primary-light: #60A5FA;
            --secondary: #8B5CF6;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --info: #06B6D4;
            --dark-bg: #0A0F1C;
            --card-bg: rgba(18, 28, 44, 0.75);
            --border-glow: rgba(59, 130, 246, 0.25);
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0B1120, #050814);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1E293B;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        /* ========= 側邊欄 ========= */
        .admin-sidebar {
            width: 280px;
            background: rgba(10, 18, 32, 0.85);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-glow);
            box-shadow: 8px 0 32px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 20;
        }

        .admin-sidebar::-webkit-scrollbar {
            width: 3px;
        }

        .admin-sidebar-logo {
            padding: 28px 24px;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border-bottom: 1px solid var(--border-glow);
            margin-bottom: 20px;
        }
        .admin-sidebar-logo span {
            color: var(--primary);
            background: none;
        }

        .admin-nav {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 0 16px 20px 16px;
        }
        .admin-nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .admin-nav-item i {
            width: 24px;
            font-size: 1.2rem;
        }
        .admin-nav-item:hover {
            background: rgba(59, 130, 246, 0.15);
            color: white;
            transform: translateX(4px);
        }
        .admin-nav-item.active {
            background: linear-gradient(95deg, rgba(59,130,246,0.2), rgba(139,92,246,0.1));
            color: white;
            border-left: 3px solid var(--primary);
        }
        
        .unread-badge {
            margin-left: auto;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            background: var(--warning);
            color: white;
        }

        /* ========= 主內容區域 ========= */
        .admin-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .admin-header {
            background: rgba(10, 18, 32, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glow);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 15;
        }
        .admin-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(120deg, #F1F5F9, var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .admin-header h1 i {
            color: var(--primary);
            margin-right: 12px;
        }
        .admin-user {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.04);
            padding: 6px 18px;
            border-radius: 60px;
        }
        #adminName {
            font-weight: 600;
            color: var(--text-primary);
        }
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .admin-content {
            padding: 28px 32px;
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
        }

        /* ========= 通知欄 ========= */
        .notification-bar {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 14px 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .notification-bar i {
            color: var(--primary);
            font-size: 1.2rem;
        }
        .notification-bar span {
            flex: 1;
            color: var(--text-primary);
        }
        .notification-bar button {
            background: var(--primary);
            border: none;
            border-radius: 10px;
            padding: 6px 16px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .notification-bar .close-btn {
            background: transparent;
            color: var(--text-secondary);
            padding: 4px;
        }

        /* ========= 統計卡片 ========= */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid var(--border-glow);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 18px;
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            border-color: rgba(59,130,246,0.5);
        }
        .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .stat-icon.blue { background: linear-gradient(145deg, #1E3A8A, #2563EB); }
        .stat-icon.green { background: linear-gradient(145deg, #14532D, #16A34A); }
        .stat-icon.red { background: linear-gradient(145deg, #7F1D1D, #DC2626); }
        .stat-icon.orange { background: linear-gradient(145deg, #9A3412, #EA580C); }
        .stat-info {
            flex: 1;
        }
        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            line-height: 1.2;
            margin-top: 4px;
        }

        /* ========= 篩選欄 ========= */
        .filters-bar {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid var(--border-glow);
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filter-group label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .filter-select {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 16px;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
        }
        .search-box {
            flex: 1;
            min-width: 200px;
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 16px;
            gap: 10px;
        }
        .search-box i {
            color: var(--text-secondary);
        }
        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: 0.85rem;
            width: 100%;
            outline: none;
        }
        .search-box input::placeholder {
            color: var(--text-muted);
        }
        .btn-refresh {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 18px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-refresh:hover {
            background: rgba(59,130,246,0.2);
            color: var(--primary);
            border-color: var(--primary);
        }

        /* ========= 表格 ========= */
        .table-container {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid var(--border-glow);
            overflow-x: auto;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .admin-table th {
            text-align: left;
            padding: 16px 16px;
            color: var(--text-secondary);
            font-weight: 600;
            border-bottom: 1px solid var(--border-glow);
            background: rgba(0,0,0,0.2);
        }
        .admin-table td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.4);
            color: var(--text-primary);
        }
        .admin-table tr:hover td {
            background: rgba(59, 130, 246, 0.06);
        }
        .loading {
            text-align: center;
            padding: 48px !important;
            color: var(--text-secondary);
        }
        .loading i {
            margin-right: 8px;
        }

        /* 狀態徽章 */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-badge.pending {
            background: rgba(245, 158, 11, 0.2);
            color: #F59E0B;
        }
        .status-badge.completed {
            background: rgba(16, 185, 129, 0.2);
            color: #10B981;
        }
        .status-badge.rejected {
            background: rgba(239, 68, 68, 0.2);
            color: #EF4444;
        }

        /* 操作按鈕 */
        .action-btns {
            display: flex;
            gap: 8px;
        }
        .action-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn.approve {
            color: #10B981;
        }
        .action-btn.approve:hover {
            background: rgba(16, 185, 129, 0.2);
        }
        .action-btn.reject {
            color: #EF4444;
        }
        .action-btn.reject:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        /* ========= 模態框 ========= */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: #0F172A;
            border-radius: 28px;
            border: 1px solid var(--border-glow);
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-glow);
            position: sticky;
            top: 0;
            background: #0F172A;
        }
        .modal-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-header h2 i {
            color: var(--primary);
        }
        .modal-close {
            background: transparent;
            border: none;
            font-size: 1.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            line-height: 1;
        }
        .modal-close:hover {
            color: var(--danger);
        }
        .modal-body {
            padding: 24px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(51, 65, 85, 0.4);
        }
        .detail-row label {
            color: var(--text-secondary);
            font-weight: 500;
        }
        .detail-row span {
            color: var(--text-primary);
            font-weight: 500;
        }
        .screenshot-container {
            margin-top: 8px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn-approve {
            flex: 1;
            background: linear-gradient(135deg, #10B981, #059669);
            border: none;
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-approve:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }
        .btn-reject {
            flex: 1;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 12px;
            color: #EF4444;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-reject:hover {
            background: rgba(239, 68, 68, 0.3);
        }
        .btn-confirm-reject {
            flex: 1;
            background: linear-gradient(135deg, #EF4444, #DC2626);
            border: none;
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        /* ========= 響應式 ========= */
        @media (max-width: 768px) {
            .admin-layout {
                flex-direction: column;
            }
            .admin-sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }
            .admin-nav {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .admin-nav-item {
                flex: 0 0 auto;
            }
            .admin-content {
                padding: 20px;
            }
            .admin-header h1 {
                font-size: 1.2rem;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .filters-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-group {
                justify-content: space-between;
            }
        }
        @media (max-width: 550px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stat-card, .filters-bar, .table-container {
            animation: fadeSlideUp 0.4s ease forwards;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- 側邊導航欄 -->
        <aside class="admin-sidebar" id="sidebar-container"></aside>

        <script>
            fetch('/admin/components/sidebar.html')
                .then(res => res.text())
                .then(html => {
                    document.getElementById('sidebar-container').innerHTML = html;
                    const currentPath = window.location.pathname;
                    document.querySelectorAll('.admin-nav-item').forEach(link => {
                        if (link.getAttribute('href') === currentPath) {
                            link.classList.add('active');
                        }
                    });
                })
                .catch(err => console.error('加载侧边栏失败:', err));
        </script>

        <main class="admin-main">
            <header class="admin-header">
                <h1><i class="fas fa-arrow-down"></i> 充值审核</h1>
                <div class="admin-user">
                    <span id="adminName">管理员</span>
                    <button class="icon-btn" id="logoutBtn" title="退出登录">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <div class="admin-content">
                <div class="notification-bar" id="notificationBar" style="display: none;">
                    <i class="fas fa-bell"></i>
                    <span id="notificationMessage">有新的充值申请</span>
                    <button onclick="location.href='#pending'">查看</button>
                    <button class="close-btn" onclick="closeNotification()"><i class="fas fa-times"></i></button>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue"><i class="fas fa-clock"></i></div>
                        <div class="stat-info">
                            <span class="stat-label">待审核</span>
                            <span class="stat-value" id="pendingCount">0</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
                        <div class="stat-info">
                            <span class="stat-label">已完成</span>
                            <span class="stat-value" id="completedCount">0</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon red"><i class="fas fa-times-circle"></i></div>
                        <div class="stat-info">
                            <span class="stat-label">已驳回</span>
                            <span class="stat-value" id="rejectedCount">0</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange"><i class="fas fa-coins"></i></div>
                        <div class="stat-info">
                            <span class="stat-label">待审核总额</span>
                            <span class="stat-value" id="pendingAmount">0 USDT</span>
                        </div>
                    </div>
                </div>

                <div class="filters-bar">
                    <div class="filter-group">
                        <label>状态</label>
                        <select id="statusFilter" class="filter-select">
                            <option value="pending">待审核</option>
                            <option value="completed">已完成</option>
                            <option value="rejected">已驳回</option>
                            <option value="all">全部</option>
                        </select>
                    </div>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="搜索用户ID、UID...">
                    </div>
                    <button class="btn-refresh" onclick="window.loadDeposits?.()">
                        <i class="fas fa-sync-alt"></i> 刷新
                    </button>
                </div>

                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>时间</th>
                                <th>用户</th>
                                <th>申请金额</th>
                                <th>网络</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="depositTableBody">
                            <tr><td colspan="7" class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</td><\/tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="reviewModal">
        <div class="modal">
            <div class="modal-header">
                <h2><i class="fas fa-gavel"></i> 审核充值</h2>
                <button class="modal-close" onclick="closeReviewModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="reviewId">
                
                <div class="detail-row">
                    <label>用户信息</label>
                    <span id="reviewUser"></span>
                </div>
                <div class="detail-row">
                    <label>申请金额</label>
                    <span id="reviewAmount"></span>
                </div>
                <div class="detail-row">
                    <label>网络</label>
                    <span id="reviewNetwork"></span>
                </div>
                
                <div class="detail-row">
                    <label>转账截图</label>
                    <div class="screenshot-container" id="screenshotContainer">
                        <img id="reviewScreenshot" src="" alt="充值截图" style="max-width: 100%; max-height: 200px; display: none; border-radius: 8px;">
                        <p id="noScreenshot" style="color: var(--text-muted);">无截图</p>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>实际到账金额 <span style="color: var(--danger);">*</span></label>
                    <input type="number" id="actualAmount" class="form-control" placeholder="请输入实际转账金额" step="0.01" min="0">
                    <small style="color: var(--text-muted); font-size: 12px;">根据截图填写实际转账金额</small>
                </div>
                
                <div class="form-group">
                    <label>备注</label>
                    <textarea id="adminNote" class="form-control" rows="2" placeholder="填写备注（可选）"></textarea>
                </div>
                
                <div class="form-group" id="rejectReasonGroup" style="display: none;">
                    <label>驳回原因 <span style="color: var(--danger);">*</span></label>
                    <textarea id="rejectReason" class="form-control" rows="3" placeholder="请输入驳回原因"></textarea>
                </div>
                
                <div class="action-buttons">
                    <button class="btn-approve" onclick="approveDeposit()">
                        <i class="fas fa-check"></i> 通过（增加余额）
                    </button>
                    <button class="btn-reject" onclick="showRejectReason()">
                        <i class="fas fa-times"></i> 驳回
                    </button>
                    <button class="btn-confirm-reject" id="confirmRejectBtn" style="display: none;" onclick="rejectDeposit()">
                        <i class="fas fa-check"></i> 确认驳回
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/admin/deposits.js"></script>
</body>
</html>
