<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>充值审核 - FOOTRADAPRO 后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/js/core/config.js"></script>
    <script src="/js/core/timezone.js"></script>
    <script src="/js/admin/admin_auth_guard.js"></script>
    <link rel="stylesheet" href="/css/admin-base.css">
    <link rel="stylesheet" href="/css/admin-deposits-simple.css">
    <link rel="stylesheet" href="/css/admin-nav.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar" id="sidebar-container"></aside>

        <script>
            fetch('/admin/components/sidebar.html')
                .then(res => res.text())
                .then(html => {
                    document.getElementById('sidebar-container').innerHTML = html;
                    const currentPath = window.location.pathname;
                    document.querySelectorAll('.admin-nav-item').forEach(link => {
                        if (link.getAttribute('href') === currentPath) {
                            link.classList.add('active');
                        }
                    });
                })
                .catch(err => console.error('加载侧边栏失败:', err));
        </script>

        <main class="admin-main">
            <header class="admin-header">
                <h1><i class="fas fa-arrow-down"></i> 充值审核</h1>
                <div class="admin-user">
                    <span id="adminName">管理员</span>
                    <button class="icon-btn" id="logoutBtn" title="退出登录">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <div class="notification-bar" id="notificationBar" style="display: none;">
                <i class="fas fa-bell"></i>
                <span id="notificationMessage">有新的充值申请</span>
                <button onclick="location.href='#pending'">查看</button>
                <button class="close-btn" onclick="closeNotification()"><i class="fas fa-times"></i></button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon blue"><i class="fas fa-clock"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">待审核</span>
                        <span class="stat-value" id="pendingCount">0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">已完成</span>
                        <span class="stat-value" id="completedCount">0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red"><i class="fas fa-times-circle"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">已驳回</span>
                        <span class="stat-value" id="rejectedCount">0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange"><i class="fas fa-coins"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">待审核总额</span>
                        <span class="stat-value" id="pendingAmount">0 USDT</span>
                    </div>
                </div>
            </div>

            <div class="filters-bar">
                <div class="filter-group">
                    <label>状态</label>
                    <select id="statusFilter" class="filter-select">
                        <option value="pending">待审核</option>
                        <option value="completed">已完成</option>
                        <option value="rejected">已驳回</option>
                        <option value="all">全部</option>
                    </select>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="搜索用户ID、UID...">
                </div>
                <button class="btn-refresh" onclick="window.loadDeposits?.()">
                    <i class="fas fa-sync-alt"></i> 刷新
                </button>
            </div>

            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>时间</th>
                            <th>用户</th>
                            <th>申请金额</th>
                            <th>网络</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="depositTableBody">
                        <tr><td colspan="7" class="loading">加载中...<\/td><\/tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="reviewModal">
        <div class="modal">
            <div class="modal-header">
                <h2><i class="fas fa-gavel"></i> 审核充值</h2>
                <button class="modal-close" onclick="closeReviewModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="reviewId">
                
                <div class="detail-row">
                    <label>用户信息</label>
                    <span id="reviewUser"></span>
                </div>
                <div class="detail-row">
                    <label>申请金额</label>
                    <span id="reviewAmount"></span>
                </div>
                <div class="detail-row">
                    <label>网络</label>
                    <span id="reviewNetwork"></span>
                </div>
                
                <div class="detail-row">
                    <label>转账截图</label>
                    <div class="screenshot-container" id="screenshotContainer">
                        <img id="reviewScreenshot" src="" alt="充值截图" style="max-width: 100%; max-height: 200px; display: none; border-radius: 8px;">
                        <p id="noScreenshot" style="color: var(--text-tertiary);">无截图</p>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>实际到账金额 <span style="color: var(--danger);">*</span></label>
                    <input type="number" id="actualAmount" class="form-control" placeholder="请输入实际转账金额" step="0.01" min="0">
                    <small style="color: var(--text-tertiary); font-size: 12px;">根据截图填写实际转账金额</small>
                </div>
                
                <div class="form-group">
                    <label>备注</label>
                    <textarea id="adminNote" class="form-control" rows="2" placeholder="填写备注（可选）"></textarea>
                </div>
                
                <div class="form-group" id="rejectReasonGroup" style="display: none;">
                    <label>驳回原因 <span style="color: var(--danger);">*</span></label>
                    <textarea id="rejectReason" class="form-control" rows="3" placeholder="请输入驳回原因"></textarea>
                </div>
                
                <div class="action-buttons">
                    <button class="btn-approve" onclick="approveDeposit()">
                        <i class="fas fa-check"></i> 通过（增加余额）
                    </button>
                    <button class="btn-reject" onclick="showRejectReason()">
                        <i class="fas fa-times"></i> 驳回
                    </button>
                    <button class="btn-confirm-reject" id="confirmRejectBtn" style="display: none;" onclick="rejectDeposit()">
                        <i class="fas fa-check"></i> 确认驳回
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/admin/deposits.js"></script>
</body>
</html>
