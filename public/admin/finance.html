<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>财务管理 - FOOTRADAPRO 后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- JS 引用 - 保留原有 -->
    <script src="/js/core/config.js"></script>
    <script src="/js/core/timezone.js"></script>
    <script src="/js/admin/admin_auth_guard.js"></script>
    
    <style>
        /* ============================================
           世界級後台管理系統 - 财务管理頁面
           深色主題 | 玻璃態效果 | 響應式佈局
        ============================================ */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --primary-light: #60A5FA;
            --secondary: #8B5CF6;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --info: #06B6D4;
            --dark-bg: #0A0F1C;
            --card-bg: rgba(18, 28, 44, 0.75);
            --border-glow: rgba(59, 130, 246, 0.25);
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0B1120, #050814);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1E293B;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        /* ========= 側邊欄 ========= */
        .admin-sidebar {
            width: 280px;
            background: rgba(10, 18, 32, 0.85);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-glow);
            box-shadow: 8px 0 32px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 20;
        }

        .admin-sidebar::-webkit-scrollbar {
            width: 3px;
        }

        .admin-sidebar-logo {
            padding: 28px 24px;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border-bottom: 1px solid var(--border-glow);
            margin-bottom: 20px;
        }
        .admin-sidebar-logo span {
            color: var(--primary);
            background: none;
        }

        .admin-nav {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 0 16px 20px 16px;
        }
        .admin-nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .admin-nav-item i {
            width: 24px;
            font-size: 1.2rem;
        }
        .admin-nav-item:hover {
            background: rgba(59, 130, 246, 0.15);
            color: white;
            transform: translateX(4px);
        }
        .admin-nav-item.active {
            background: linear-gradient(95deg, rgba(59,130,246,0.2), rgba(139,92,246,0.1));
            color: white;
            border-left: 3px solid var(--primary);
        }
        
        .unread-badge {
            margin-left: auto;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            background: var(--warning);
            color: white;
        }

        /* ========= 主內容區域 ========= */
        .admin-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .admin-header {
            background: rgba(10, 18, 32, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glow);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 15;
        }
        .admin-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(120deg, #F1F5F9, var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .admin-header h1 i {
            color: var(--primary);
            margin-right: 12px;
        }
        .admin-user {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.04);
            padding: 6px 18px;
            border-radius: 60px;
        }
        #adminName {
            font-weight: 600;
            color: var(--text-primary);
        }
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .admin-content {
            padding: 28px 32px;
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
        }

        /* ========= 統計卡片 ========= */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid var(--border-glow);
            padding: 20px 24px;
            text-align: center;
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            border-color: rgba(59,130,246,0.5);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: white;
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        /* ========= 標籤頁 ========= */
        .finance-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-glow);
            padding-bottom: 0;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 12px 24px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 12px 12px 0 0;
            position: relative;
        }
        .tab-btn:hover {
            color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }
        .tab-btn.active {
            color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }
        .tab-btn .status-badge {
            margin-left: 8px;
            padding: 2px 6px;
            font-size: 0.7rem;
            border-radius: 20px;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
            animation: fadeSlideUp 0.3s ease;
        }

        /* ========= 操作欄 ========= */
        .action-bar {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid var(--border-glow);
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .action-bar h2 {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .action-bar h2 i {
            color: var(--primary);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 20px;
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background: rgba(59, 130, 246, 0.15);
            color: white;
            border-color: var(--primary);
        }

        /* ========= 篩選欄 ========= */
        .filters-bar {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid var(--border-glow);
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .search-box {
            flex: 1;
            min-width: 200px;
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 16px;
            gap: 10px;
        }
        .search-box i {
            color: var(--text-secondary);
        }
        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: 0.85rem;
            width: 100%;
            outline: none;
        }
        .search-box input::placeholder {
            color: var(--text-muted);
        }
        .filter-select {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 16px;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
        }

        /* ========= 表格 ========= */
        .table-container {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid var(--border-glow);
            overflow-x: auto;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .admin-table th {
            text-align: left;
            padding: 16px 16px;
            color: var(--text-secondary);
            font-weight: 600;
            border-bottom: 1px solid var(--border-glow);
            background: rgba(0,0,0,0.2);
        }
        .admin-table td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.4);
            color: var(--text-primary);
        }
        .admin-table tr:hover td {
            background: rgba(59, 130, 246, 0.06);
        }
        .loading {
            text-align: center;
            padding: 48px !important;
            color: var(--text-secondary);
        }
        .loading i {
            margin-right: 8px;
        }

        /* 狀態徽章 */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-badge.pending {
            background: rgba(245, 158, 11, 0.2);
            color: #F59E0B;
        }
        .status-badge.approved, .status-badge.completed {
            background: rgba(16, 185, 129, 0.2);
            color: #10B981;
        }
        .status-badge.rejected {
            background: rgba(239, 68, 68, 0.2);
            color: #EF4444;
        }

        /* 操作按鈕 */
        .action-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:hover {
            background: rgba(59,130,246,0.2);
            color: var(--primary);
            border-color: var(--primary);
        }

        /* 地址截斷 */
        .address-truncate {
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
            font-family: monospace;
        }

        /* 分頁 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        .page-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 14px;
            border-radius: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .page-btn:hover:not(:disabled) {
            background: var(--primary);
            color: white;
        }
        .page-btn.active {
            background: var(--primary);
            color: white;
        }
        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ========= 模態框 ========= */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: #0F172A;
            border-radius: 28px;
            border: 1px solid var(--border-glow);
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-glow);
            position: sticky;
            top: 0;
            background: #0F172A;
        }
        .modal-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-header h2 i {
            color: var(--primary);
        }
        .modal-close {
            background: transparent;
            border: none;
            font-size: 1.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            line-height: 1;
        }
        .modal-close:hover {
            color: var(--danger);
        }
        .modal-body {
            padding: 24px;
        }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-glow);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }
        .detail-row {
            display: flex;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.4);
        }
        .detail-row label {
            width: 100px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .detail-row span {
            flex: 1;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-primary);
            word-break: break-all;
        }
        .user-select-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .user-item {
            padding: 12px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.4);
            cursor: pointer;
            transition: all 0.2s;
        }
        .user-item:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        /* 響應式 */
        @media (max-width: 768px) {
            .admin-layout {
                flex-direction: column;
            }
            .admin-sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }
            .admin-nav {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .admin-nav-item {
                flex: 0 0 auto;
            }
            .admin-content {
                padding: 20px;
            }
            .admin-header h1 {
                font-size: 1.2rem;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .finance-tabs {
                flex-wrap: wrap;
            }
            .filters-bar {
                flex-direction: column;
                align-items: stretch;
            }
        }
        @media (max-width: 550px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stat-card, .finance-tabs, .action-bar, .filters-bar, .table-container {
            animation: fadeSlideUp 0.4s ease forwards;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- 側邊導航欄 -->
        <aside class="admin-sidebar" id="sidebar-container"></aside>

        <script>
            fetch('/admin/components/sidebar.html')
                .then(res => res.text())
                .then(html => {
                    document.getElementById('sidebar-container').innerHTML = html;
                    const currentPath = window.location.pathname;
                    document.querySelectorAll('.admin-nav-item').forEach(link => {
                        if (link.getAttribute('href') === currentPath) {
                            link.classList.add('active');
                        }
                    });
                })
                .catch(err => console.error('加载侧边栏失败:', err));
        </script>

        <main class="admin-main">
            <header class="admin-header">
                <h1><i class="fas fa-chart-line"></i> 财务管理</h1>
                <div class="admin-user">
                    <span id="adminName">管理员</span>
                    <button class="icon-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>

            <div class="admin-content">
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value" id="totalBalance">-</div><div class="stat-label">总余额</div></div>
                    <div class="stat-card"><div class="stat-value" id="todayDeposit">-</div><div class="stat-label">今日充值</div></div>
                    <div class="stat-card"><div class="stat-value" id="todayWithdraw">-</div><div class="stat-label">今日提现</div></div>
                    <div class="stat-card"><div class="stat-value" id="totalRevenue">-</div><div class="stat-label">平台总收入</div></div>
                </div>

                <div class="finance-tabs">
                    <button class="tab-btn active" data-tab="records"><i class="fas fa-list"></i> 财务记录</button>
                    <button class="tab-btn" data-tab="withdrawals"><i class="fas fa-arrow-up"></i> 提现审核<span class="status-badge pending" id="pendingWithdrawCount" style="display: none;">0</span></button>
                    <button class="tab-btn" data-tab="deposits"><i class="fas fa-arrow-down"></i> 充值确认<span class="status-badge pending" id="pendingDepositCount" style="display: none;">0</span></button>
                </div>

                <div class="tab-content active" id="tab-records">
                    <div class="action-bar">
                        <h2><i class="fas fa-list"></i> 财务记录</h2>
                        <button class="btn-primary" onclick="openUserSelectModal()"><i class="fas fa-coins"></i> 调整用户余额</button>
                    </div>

                    <div class="filters-bar">
                        <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="搜索用户ID、用户名..."></div>
                        <select class="filter-select" id="typeFilter">
                            <option value="">全部类型</option>
                            <option value="deposit">充值</option>
                            <option value="withdraw">提现</option>
                            <option value="authorization">授权</option>
                            <option value="settlement">结算</option>
                            <option value="bonus">体验金</option>
                            <option value="admin_add">管理员增加</option>
                            <option value="admin_deduct">管理员扣除</option>
                            <option value="admin_set">管理员设置</option>
                        </select>
                        <select class="filter-select" id="dateFilter">
                            <option value="7">最近7天</option><option value="30">最近30天</option><option value="90">最近90天</option><option value="all">全部</option>
                        </select>
                        <button class="btn-primary" id="exportBtn"><i class="fas fa-download"></i> 导出报表</button>
                    </div>

                    <div class="table-container">
                        <table class="admin-table">
                            <thead><tr><th>ID</th><th>时间</th><th>用户</th><th>类型</th><th>金额</th><th>变动前</th><th>变动后</th><th>原因</th><th>操作员</th><th>操作</th></tr></thead>
                            <tbody id="financeTableBody"><tr><td colspan="10" class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</td></tr></tbody>
                        </table>
                    </div>

                    <div class="pagination" id="pagination"></div>
                </div>

                <div class="tab-content" id="tab-withdrawals">
                    <h2 style="margin-bottom: 20px;"><i class="fas fa-arrow-up"></i> 提现审核</h2>
                    <div class="filters-bar">
                        <select class="filter-select" id="withdrawStatusFilter">
                            <option value="pending">待审核</option><option value="approved">已通过</option><option value="rejected">已拒绝</option><option value="completed">已完成</option><option value="all">全部</option>
                        </select>
                        <div class="search-box"><i class="fas fa-search"></i><input type="text" id="withdrawSearchInput" placeholder="搜索用户ID、地址..."></div>
                    </div>
                    <div class="table-container">
                        <table class="admin-table">
                            <thead><tr><th>ID</th><th>申请时间</th><th>用户</th><th>金额</th><th>手续费</th><th>到账</th><th>网络</th><th>提现地址</th><th>状态</th><th>操作</th></tr></thead>
                            <tbody id="withdrawTableBody"><tr><td colspan="10" class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</td></tr></tbody>
                        </table>
                    </div>
                </div>

                <div class="tab-content" id="tab-deposits">
                    <h2 style="margin-bottom: 20px;"><i class="fas fa-arrow-down"></i> 充值确认</h2>
                    <div class="filters-bar">
                        <select class="filter-select" id="depositStatusFilter">
                            <option value="pending">待确认</option><option value="completed">已完成</option><option value="rejected">已驳回</option><option value="all">全部</option>
                        </select>
                        <div class="search-box"><i class="fas fa-search"></i><input type="text" id="depositSearchInput" placeholder="搜索用户ID、交易哈希..."></div>
                    </div>
                    <div class="table-container">
                        <table class="admin-table">
                            <thead><tr><th>ID</th><th>申请时间</th><th>用户</th><th>金额</th><th>网络</th><th>交易哈希</th><th>确认数</th><th>状态</th><th>操作</th></tr></thead>
                            <tbody id="depositTableBody"><tr><td colspan="9" class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="userSelectModal">
        <div class="modal">
            <div class="modal-header"><h2><i class="fas fa-user"></i> 选择用户</h2><button class="modal-close" onclick="closeUserSelectModal()">&times;</button></div>
            <div class="modal-body">
                <div class="search-box" style="margin-bottom: 15px;"><i class="fas fa-search"></i><input type="text" id="userSearchInput" placeholder="搜索用户名、UID..."></div>
                <div id="userList" class="user-select-list"><div class="loading"><i class="fas fa-spinner fa-spin"></i> 加载用户中...</div></div>
            </div>
            <div class="modal-footer"><button class="btn-secondary" onclick="closeUserSelectModal()">取消</button></div>
        </div>
    </div>

    <div class="modal-overlay" id="adjustBalanceModal">
        <div class="modal">
            <div class="modal-header"><h2><i class="fas fa-coins"></i> 调整用户余额</h2><button class="modal-close" onclick="closeAdjustModal()">&times;</button></div>
            <div class="modal-body">
                <div style="margin-bottom: 20px; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 12px;"><div><strong>用户:</strong> <span id="adjustUsername"></span></div><div><strong>当前余额:</strong> <span id="adjustCurrentBalance"></span> USDT</div></div>
                <input type="hidden" id="adjustUserId">
                <div class="form-group"><label>操作类型</label><select id="adjustType" class="filter-select" style="width: 100%;"><option value="add">增加余额</option><option value="deduct">扣除余额</option><option value="set">设置为</option></select></div>
                <div class="form-group"><label>金额 (USDT)</label><input type="number" id="adjustAmount" step="0.01" min="0" class="form-control" placeholder="输入金额"></div>
                <div class="form-group"><label>原因</label><input type="text" id="adjustReason" class="form-control" placeholder="例如: 手动充值、退款等"></div>
            </div>
            <div class="modal-footer"><button class="btn-secondary" onclick="closeAdjustModal()">取消</button><button class="btn-primary" onclick="submitAdjustBalance()">确认调整</button></div>
        </div>
    </div>

    <div class="modal-overlay" id="withdrawReviewModal">
        <div class="modal">
            <div class="modal-header"><h2><i class="fas fa-gavel"></i> 审核提现</h2><button class="modal-close" onclick="closeWithdrawReviewModal()">&times;</button></div>
            <div class="modal-body">
                <input type="hidden" id="reviewWithdrawId">
                <div class="detail-row"><label>用户</label><span id="reviewUsername"></span></div>
                <div class="detail-row"><label>提现金额</label><span id="reviewAmount"></span></div>
                <div class="detail-row"><label>手续费</label><span>1 USDT</span></div>
                <div class="detail-row"><label>实际到账</label><span id="reviewNetAmount"></span></div>
                <div class="detail-row"><label>网络</label><span id="reviewNetwork"></span></div>
                <div class="detail-row"><label>提现地址</label><span id="reviewAddress" style="word-break: break-all;"></span></div>
                <div class="detail-row"><label>申请时间</label><span id="reviewTime"></span></div>
                <div class="detail-row"><label>用户余额</label><span id="reviewUserBalance"></span></div>
                <div id="approveSection"><div class="form-group"><label>交易哈希 (TxID) <span style="color: var(--danger);">*</span></label><input type="text" id="reviewTxHash" class="form-control tx-hash-input" placeholder="请输入区块链交易哈希"></div></div>
                <div id="rejectSection" style="display: none;"><div class="form-group"><label>拒绝原因 <span style="color: var(--danger);">*</span></label><textarea id="reviewRejectReason" class="form-control" rows="3" placeholder="请输入拒绝原因..."></textarea></div></div>
                <div style="display: flex; gap: 20px; margin: 20px 0;"><label style="display: flex; align-items: center; gap: 6px;"><input type="radio" name="reviewAction" value="approve" checked onclick="toggleReviewAction('approve')"> 通过</label><label style="display: flex; align-items: center; gap: 6px;"><input type="radio" name="reviewAction" value="reject" onclick="toggleReviewAction('reject')"> 拒绝</label></div>
                <div class="form-group"><label>管理员备注</label><textarea id="adminNote" class="form-control" rows="2" placeholder="可选备注"></textarea></div>
            </div>
            <div class="modal-footer"><button class="btn-secondary" onclick="closeWithdrawReviewModal()">取消</button><button class="btn-primary" onclick="submitWithdrawReview()">确认提交</button></div>
        </div>
    </div>

    <script src="/js/admin/finance_controller.js"></script>
</body>
</html>
