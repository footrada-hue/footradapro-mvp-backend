<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>比赛管理 · FOOTRADAPRO 后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="/js/core/config.js"></script>
    <script src="/js/admin/admin_auth_guard.js"></script>
    <script src="/js/core/timezone.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --primary-light: #60A5FA;
            --secondary: #8B5CF6;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --info: #06B6D4;
            --dark-bg: #0A0F1C;
            --card-bg: rgba(18, 28, 44, 0.85);
            --border-glow: rgba(59, 130, 246, 0.2);
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0B1120 0%, #0A0F1C 50%, #050814 100%);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1E293B;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .admin-sidebar {
            width: 280px;
            background: rgba(10, 18, 32, 0.95);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-glow);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 20;
        }

        .admin-sidebar-logo {
            padding: 28px 24px;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border-bottom: 1px solid var(--border-glow);
            margin-bottom: 20px;
            text-align: center;
        }

        .admin-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 16px 20px 16px;
        }
        .admin-nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .admin-nav-item i {
            width: 24px;
            font-size: 1.2rem;
        }
        .admin-nav-item:hover {
            background: rgba(59, 130, 246, 0.15);
            color: white;
            transform: translateX(4px);
        }
        .admin-nav-item.active {
            background: linear-gradient(95deg, rgba(59,130,246,0.2), rgba(139,92,246,0.1));
            color: white;
            border-left: 3px solid var(--primary);
        }

        .admin-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .admin-header {
            background: rgba(10, 18, 32, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glow);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 15;
        }
        .admin-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(120deg, #F1F5F9, var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .admin-header h1 i {
            color: var(--primary);
            margin-right: 12px;
        }
        .admin-user {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.05);
            padding: 8px 20px;
            border-radius: 40px;
        }
        #adminName {
            font-weight: 600;
            color: var(--text-primary);
        }
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .icon-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .admin-content {
            padding: 28px 32px;
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(18, 28, 44, 0.9), rgba(15, 23, 42, 0.9));
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid var(--border-glow);
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(59,130,246,0.4);
        }
        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }
        .stat-icon.blue { background: linear-gradient(135deg, #1E3A8A, #2563EB); }
        .stat-icon.green { background: linear-gradient(135deg, #14532D, #16A34A); }
        .stat-icon.orange { background: linear-gradient(135deg, #9A3412, #EA580C); }
        .stat-icon.purple { background: linear-gradient(135deg, #4C1D95, #8B5CF6); }
        .stat-info { flex: 1; }
        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: white;
            line-height: 1.2;
            margin-top: 4px;
        }

        /* 存储统计面板 */
        .storage-stats-panel {
            background: linear-gradient(135deg, rgba(18, 28, 44, 0.9), rgba(15, 23, 42, 0.9));
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid var(--border-glow);
            padding: 24px;
            margin-bottom: 24px;
        }
        .storage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-glow);
        }
        .storage-header h3 {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .storage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 16px;
        }
        .storage-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            transition: all 0.3s;
        }
        .storage-item:hover {
            background: rgba(59, 130, 246, 0.1);
        }
        .storage-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .storage-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-light);
        }
        .storage-value.small { font-size: 0.75rem; word-break: break-all; }

        /* 操作栏 */
        .action-bar {
            background: linear-gradient(135deg, rgba(18, 28, 44, 0.9), rgba(15, 23, 42, 0.9));
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid var(--border-glow);
            padding: 20px 24px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .action-bar-left { display: flex; gap: 12px; flex-wrap: wrap; }
        
        .btn-primary, .btn-secondary, .btn-success {
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary);
        }
        .btn-secondary:hover {
            background: rgba(59, 130, 246, 0.15);
            color: white;
            border-color: var(--primary);
        }
        .btn-success {
            background: linear-gradient(135deg, #10B981, #059669);
            color: white;
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }
        .sync-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 12px;
        }

        /* 筛选栏 */
        .time-filter-bar, .search-filter-bar {
            background: linear-gradient(135deg, rgba(18, 28, 44, 0.9), rgba(15, 23, 42, 0.9));
            backdrop-filter: blur(8px);
            border-radius: 16px;
            border: 1px solid var(--border-glow);
            padding: 16px 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .time-buttons, .sort-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .time-btn, .sort-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 16px;
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .time-btn:hover, .sort-btn:hover {
            background: rgba(59,130,246,0.2);
            color: white;
        }
        .time-btn.active, .sort-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-color: transparent;
        }
        .search-box {
            flex: 1;
            min-width: 250px;
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 16px;
            gap: 10px;
        }
        .search-box:focus-within {
            border-color: var(--primary);
        }
        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: 0.85rem;
            width: 100%;
            outline: none;
        }
        .filter-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .filter-select {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 8px 16px;
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .filter-select:hover {
            border-color: var(--primary);
        }

        /* 批量操作栏 */
        .bulk-bar {
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 14px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .bulk-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .action-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 14px;
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .action-btn:hover {
            background: rgba(59,130,246,0.2);
            color: white;
        }
        .selection-info {
            font-size: 0.85rem;
            color: var(--primary-light);
            font-weight: 500;
        }

        /* ========== 表格样式 - 修复对齐问题 ========== */
        .matches-table-wrapper {
            background: linear-gradient(135deg, rgba(18, 28, 44, 0.9), rgba(15, 23, 42, 0.9));
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid var(--border-glow);
            overflow-x: auto;
        }
        
        .matches-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            /* 关键：使用固定表格布局，确保列宽一致 */
            table-layout: fixed;
        }
        
        /* 统一所有列宽 */
        .matches-table th,
        .matches-table td {
            padding: 14px 10px;
            vertical-align: middle;
            box-sizing: border-box;
        }
        
        /* 第1列：复选框 */
        .matches-table th:nth-child(1),
        .matches-table td:nth-child(1) {
            width: 45px;
            text-align: center;
        }
        
        /* 第2列：对阵双方 */
        .matches-table th:nth-child(2),
        .matches-table td:nth-child(2) {
            width: 210px;
            text-align: left;
        }
        
        /* 第3列：联赛 */
        .matches-table th:nth-child(3),
        .matches-table td:nth-child(3) {
            width: 100px;
            text-align: left;
        }
        
        /* 第4列：数据源 */
        .matches-table th:nth-child(4),
        .matches-table td:nth-child(4) {
            width: 85px;
            text-align: center;
        }
        
        /* 第5列：优先级 */
        .matches-table th:nth-child(5),
        .matches-table td:nth-child(5) {
            width: 65px;
            text-align: center;
        }
        
        /* 第6列：比赛时间 */
        .matches-table th:nth-child(6),
        .matches-table td:nth-child(6) {
            width: 150px;
            text-align: center;
        }
        
        /* 第7列：比分 */
        .matches-table th:nth-child(7),
        .matches-table td:nth-child(7) {
            width: 65px;
            text-align: center;
        }
        
        /* 第8列：执行率 */
        .matches-table th:nth-child(8),
        .matches-table td:nth-child(8) {
            width: 65px;
            text-align: center;
        }
        
        /* 第9列：状态 */
        .matches-table th:nth-child(9),
        .matches-table td:nth-child(9) {
            width: 80px;
            text-align: center;
        }
        
        /* 第10列：前台显示 */
        .matches-table th:nth-child(10),
        .matches-table td:nth-child(10) {
            width: 85px;
            text-align: center;
        }
        
        /* 第11列：操作 */
        .matches-table th:nth-child(11),
        .matches-table td:nth-child(11) {
            width: 100px;
            text-align: center;
        }
        
        .matches-table th {
            background: rgba(0, 0, 0, 0.4);
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 2px solid var(--border-glow);
            white-space: nowrap;
        }
        
        .matches-table td {
            border-bottom: 1px solid rgba(51, 65, 85, 0.4);
            color: var(--text-primary);
        }
        
        .matches-table tbody tr:hover {
            background: rgba(59, 130, 246, 0.08);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px !important;
            color: var(--text-secondary);
        }

        /* 徽章 */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-badge.upcoming { background: rgba(59, 130, 246, 0.2); color: #60A5FA; }
        .status-badge.live { background: rgba(16, 185, 129, 0.2); color: #10B981; }
        .status-badge.finished { background: rgba(107, 114, 128, 0.2); color: #9CA3AF; }
        
        .source-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 500;
        }
        .source-badge.manual { background: rgba(249, 115, 22, 0.2); color: #F97316; }
        .source-badge.auto { background: rgba(59, 130, 246, 0.2); color: #60A5FA; }
        
        .priority-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 500;
        }
        .priority-badge.high { background: rgba(239, 68, 68, 0.2); color: #EF4444; }
        .priority-badge.medium { background: rgba(245, 158, 11, 0.2); color: #F59E0B; }
        .priority-badge.low { background: rgba(16, 185, 129, 0.2); color: #10B981; }

        /* 切换开关 */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #4B5563;
            transition: 0.3s;
            border-radius: 34px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .toggle-slider { background-color: #10B981; }
        input:checked + .toggle-slider:before { transform: translateX(22px); }

        .action-buttons { display: flex; gap: 8px; justify-content: center; }
        .action-btn-sm {
            padding: 5px 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn-sm:hover {
            background: rgba(59,130,246,0.2);
            color: var(--primary);
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        .page-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 14px;
            border-radius: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            min-width: 40px;
            text-align: center;
        }
        .page-btn:hover {
            background: rgba(59,130,246,0.2);
            color: white;
        }
        .page-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-color: transparent;
        }

        /* 模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: linear-gradient(135deg, #0F172A, #0A0F1C);
            border-radius: 28px;
            border: 1px solid var(--border-glow);
            width: 90%;
            max-width: 1000px;
            max-height: 85vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-glow);
            background: rgba(0,0,0,0.3);
        }
        .modal-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-close {
            background: transparent;
            border: none;
            font-size: 1.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }

        @media (max-width: 768px) {
            .admin-layout { flex-direction: column; }
            .admin-sidebar { width: 100%; height: auto; position: relative; }
            .admin-nav { flex-direction: row; flex-wrap: wrap; justify-content: center; }
            .admin-content { padding: 16px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .modal { width: 95%; }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar" id="sidebar-container"></aside>

        <script>
            fetch('/admin/components/sidebar.html')
                .then(res => res.text())
                .then(html => {
                    document.getElementById('sidebar-container').innerHTML = html;
                    const currentPath = window.location.pathname;
                    document.querySelectorAll('.admin-nav-item').forEach(link => {
                        if (link.getAttribute('href') === currentPath) {
                            link.classList.add('active');
                        }
                    });
                })

    <script>
        document.getElementById('logoutBtn')?.addEventListener('click', () => window.location.href = '/admin/index.html');
        const storedAdmin = localStorage.getItem('admin_name');
        if (storedAdmin) document.getElementById('adminName').textContent = storedAdmin;
        
        // 比赛信息管理功能
        (function() {
            const manageBtn = document.getElementById('manageLogosBtn');
            const modal = document.getElementById('teamLogoModal');
            const tbody = document.getElementById('teamListBody');
            const leagueFilter = document.getElementById('teamLogoLeagueFilter');
            const searchInput = document.getElementById('teamLogoSearchInput');
            const refreshBtn = document.getElementById('refreshTeamLogosBtn');
            
            if (!manageBtn) return;
            
            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
            }
            
            async function loadLeagues() {
                try {
                    const res = await fetch('/api/v1/admin/matches/leagues', { credentials: 'include' });
                    const result = await res.json();
                    if (result.success && result.data && leagueFilter) {
                        leagueFilter.innerHTML = '<option value="all">全部联赛</option>' + 
                            result.data.map(l => `<option value="${escapeHtml(l.league)}">${escapeHtml(l.league)} (${l.match_count})</option>`).join('');
                    }
                } catch(err) { console.error(err); }
            }
            
            async function loadTeams() {
                if (!tbody) return;
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:48px;"><i class="fas fa-spinner fa-spin"></i> 加载中...</td></tr>';
                try {
                    const league = leagueFilter ? leagueFilter.value : 'all';
                    const search = searchInput ? searchInput.value.trim() : '';
                    let url = '/api/v1/admin/matches/all-teams-from-matches?league=' + encodeURIComponent(league);
                    if (search) url += '&search=' + encodeURIComponent(search);
                    const res = await fetch(url, { credentials: 'include' });
                    const result = await res.json();
                    if (result.success && result.data) {
                        if (result.data.length === 0) {
                            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:48px;">暂无球队数据</td></tr>';
                        } else {
                            let html = '';
                            result.data.forEach((team, index) => {
                                const logoUrl = team.logo_url && team.logo_url !== '/uploads/teams/default.png' ? team.logo_url : '/uploads/teams/default.png';
                                html += `<tr>
                                    <td style="padding:12px; text-align:center;">${index + 1}</td>
                                    <td style="padding:12px;"><strong>${escapeHtml(team.team_name)}</strong></td>
                                    <td style="padding:12px;">${escapeHtml(team.league || '-')}</td>
                                    <td style="padding:12px; text-align:center;">${team.involved_matches} 场</td>
                                    <td style="padding:12px; text-align:center;"><img src="${logoUrl}" style="width:40px;height:40px;border-radius:50%;" onerror="this.src='/uploads/teams/default.png'"></td>
                                    <td style="padding:12px;">
                                        <div style="display: flex; gap: 8px; justify-content: center;">
                                            <button class="edit-team-final" data-team="${escapeHtml(team.team_name)}" data-league="${escapeHtml(team.league || '')}" data-matches="${team.involved_matches}" data-logo="${logoUrl}" style="padding: 5px 12px; background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); border-radius: 6px; color: var(--primary-light); cursor: pointer;"><i class="fas fa-edit"></i> 编辑</button>
                                            <button class="upload-logo-final" data-team="${escapeHtml(team.team_name)}" data-league="${escapeHtml(team.league || '')}" data-matches="${team.involved_matches}" style="padding: 5px 12px; background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); border-radius: 6px; color: #10B981; cursor: pointer;"><i class="fas fa-upload"></i> 上传</button>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                            tbody.innerHTML = html;
                            document.querySelectorAll('.edit-team-final').forEach(btn => {
                                btn.onclick = () => {
                                    document.getElementById('editTeamName').value = btn.dataset.team;
                                    document.getElementById('currentLogoImg').src = btn.dataset.logo || '/uploads/teams/default.png';
                                    document.getElementById('affectedCount').textContent = btn.dataset.matches;
                                    window.currentEditTeam = btn.dataset.team;
                                    document.getElementById('editTeamModal').classList.add('show');
                                };
                            });
                            document.querySelectorAll('.upload-logo-final').forEach(btn => {
                                btn.onclick = () => {
                                    document.getElementById('uploadTeamName').textContent = btn.dataset.team;
                                    document.getElementById('uploadTeamInfo').textContent = `${btn.dataset.league} • 涉及 ${btn.dataset.matches} 场比赛`;
                                    window.currentUploadTeam = btn.dataset.team;
                                    document.getElementById('uploadLogoModal').classList.add('show');
                                };
                            });
                        }
                    } else {
                        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:48px;">加载失败</td></tr>';
                    }
                } catch(err) {
                    console.error(err);
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:48px;">加载失败</td></tr>';
                }
            }
            
            const newBtn = manageBtn.cloneNode(true);
            manageBtn.parentNode.replaceChild(newBtn, manageBtn);
            newBtn.onclick = () => { modal.classList.add('show'); loadLeagues(); loadTeams(); };
            if (refreshBtn) refreshBtn.onclick = loadTeams;
            if (leagueFilter) leagueFilter.onchange = loadTeams;
            if (searchInput) { let timer; searchInput.oninput = () => { clearTimeout(timer); timer = setTimeout(loadTeams, 300); }; }
            
            document.getElementById('confirmEditTeamBtn')?.addEventListener('click', async () => {
                const newName = document.getElementById('editTeamName').value.trim();
                if (!newName) { alert('球队名称不能为空'); return; }
                const formData = new FormData();
                formData.append('original_name', window.currentEditTeam);
                formData.append('new_name', newName);
                const logoFile = document.getElementById('editTeamLogoFile').files[0];
                if (logoFile) formData.append('logo', logoFile);
                try {
                    const res = await fetch('/api/v1/admin/matches/edit-team', { method: 'POST', body: formData, credentials: 'include' });
                    const result = await res.json();
                    if (result.success) {
                        alert(`✅ 球队信息已更新，影响 ${result.updated_matches} 场比赛`);
                        document.getElementById('editTeamModal').classList.remove('show');
                        document.getElementById('editTeamLogoFile').value = '';
                        loadTeams();
                    } else { alert('保存失败: ' + (result.error || '未知错误')); }
                } catch(err) { alert('网络错误'); }
            });
            
            document.getElementById('confirmUploadBtn')?.addEventListener('click', async () => {
                const file = document.getElementById('teamLogoFile').files[0];
                if (!file) { alert('请选择图片'); return; }
                const formData = new FormData();
                formData.append('team_name', window.currentUploadTeam);
                formData.append('logo', file);
                try {
                    const res = await fetch('/api/v1/admin/matches/upload-logo', { method: 'POST', body: formData, credentials: 'include' });
                    const result = await res.json();
                    if (result.success) {
                        alert(`✅ ${window.currentUploadTeam} 队徽已更新，影响 ${result.updated_matches} 场比赛`);
                        document.getElementById('uploadLogoModal').classList.remove('show');
                        document.getElementById('teamLogoFile').value = '';
                        document.getElementById('uploadPreview').style.display = 'none';
                        loadTeams();
                    } else { alert('上传失败: ' + (result.error || '未知错误')); }
                } catch(err) { alert('网络错误'); }
            });
            
            document.getElementById('editTeamLogoFile')?.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) { const reader = new FileReader(); reader.onload = (ev) => { document.getElementById('currentLogoImg').src = ev.target.result; }; reader.readAsDataURL(file); }
            });
            document.getElementById('teamLogoFile')?.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) { const reader = new FileReader(); reader.onload = (ev) => { document.getElementById('uploadPreviewImg').src = ev.target.result; document.getElementById('uploadPreview').style.display = 'block'; }; reader.readAsDataURL(file); }
            });
            
            document.getElementById('closeTeamLogoModalBtn')?.addEventListener('click', () => modal.classList.remove('show'));
            document.getElementById('closeEditTeamModalBtn')?.addEventListener('click', () => document.getElementById('editTeamModal').classList.remove('show'));
            document.getElementById('cancelEditTeamBtn')?.addEventListener('click', () => document.getElementById('editTeamModal').classList.remove('show'));
            document.getElementById('closeUploadModalBtn')?.addEventListener('click', () => document.getElementById('uploadLogoModal').classList.remove('show'));
            document.getElementById('cancelUploadBtn')?.addEventListener('click', () => document.getElementById('uploadLogoModal').classList.remove('show'));
            modal?.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('show'); });
            document.getElementById('editTeamModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('editTeamModal')) document.getElementById('editTeamModal').classList.remove('show'); });
            document.getElementById('uploadLogoModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('uploadLogoModal')) document.getElementById('uploadLogoModal').classList.remove('show'); });
        })();
    </script>
</body>
</html>
