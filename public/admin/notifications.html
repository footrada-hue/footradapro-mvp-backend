<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>通知管理 · FOOTRADAPRO 后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="/js/core/config.js"></script>
    <script src="/js/core/timezone.js"></script>
    <script src="/js/admin/admin_auth_guard.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --primary-light: #60A5FA;
            --secondary: #8B5CF6;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --dark-bg: #0A0F1C;
            --card-bg: rgba(18, 28, 44, 0.85);
            --border-glow: rgba(59, 130, 246, 0.2);
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0B1120 0%, #0A0F1C 50%, #050814 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .admin-layout { display: flex; min-height: 100vh; }
        
        .admin-sidebar {
            width: 280px;
            background: rgba(10, 18, 32, 0.95);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-glow);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }
        
        .admin-sidebar-logo {
            padding: 28px 24px;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            border-bottom: 1px solid var(--border-glow);
        }
        
        .admin-nav { display: flex; flex-direction: column; gap: 8px; padding: 0 16px 20px; }
        .admin-nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s;
        }
        .admin-nav-item:hover { background: rgba(59,130,246,0.15); color: white; }
        .admin-nav-item.active {
            background: linear-gradient(95deg, rgba(59,130,246,0.2), rgba(139,92,246,0.1));
            color: white;
            border-left: 3px solid var(--primary);
        }

        .admin-main { flex: 1; display: flex; flex-direction: column; }
        .admin-header {
            background: rgba(10, 18, 32, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glow);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-header h1 { font-size: 1.6rem; font-weight: 700; background: linear-gradient(120deg, #F1F5F9, var(--primary-light)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .admin-header h1 i { color: var(--primary); margin-right: 12px; }
        .admin-user {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.05);
            padding: 8px 20px;
            border-radius: 40px;
        }
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }
        .icon-btn:hover { background: rgba(239,68,68,0.2); color: var(--danger); }

        .admin-content { padding: 28px 32px; max-width: 1400px; width: 100%; margin: 0 auto; }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(18, 28, 44, 0.9), rgba(15, 23, 42, 0.9));
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid var(--border-glow);
            padding: 20px;
        }
        .stat-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .stat-header i { font-size: 1.5rem; color: var(--primary); }
        .stat-title { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: white; }

        /* 实时状态面板 */
        .realtime-panel {
            background: linear-gradient(135deg, rgba(18, 28, 44, 0.9), rgba(15, 23, 42, 0.9));
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid var(--border-glow);
            margin-bottom: 24px;
            overflow: hidden;
        }
        .panel-header { padding: 16px 24px; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border-glow); }
        .online-users { padding: 16px 24px; max-height: 200px; overflow-y: auto; }
        .user-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(51, 65, 85, 0.4); }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex; align-items: center; justify-content: center; font-weight: 600; color: white; font-size: 14px;
        }
        .online-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }

        /* 发送通知卡片 */
        .send-card {
            background: linear-gradient(135deg, rgba(18, 28, 44, 0.9), rgba(15, 23, 42, 0.9));
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid var(--border-glow);
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .send-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-glow);
        }
        
        .form-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .form-group { flex: 1; margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 0.85rem;
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        
        .duration-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .duration-btn {
            padding: 6px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }
        .duration-btn:hover, .duration-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-color: transparent;
        }
        
        .btn-send {
            background: linear-gradient(135deg, #10B981, #059669);
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        .btn-send:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
        
        /* 通知列表 */
        .content-card {
            background: linear-gradient(135deg, rgba(18, 28, 44, 0.9), rgba(15, 23, 42, 0.9));
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid var(--border-glow);
            overflow: hidden;
        }
        .action-bar {
            padding: 16px 20px;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--border-glow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 6px 14px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .btn-secondary:hover { background: rgba(59,130,246,0.15); color: white; }
        
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .admin-table th { padding: 12px 16px; text-align: left; color: var(--text-secondary); border-bottom: 1px solid var(--border-glow); }
        .admin-table td { padding: 12px 16px; border-bottom: 1px solid rgba(51, 65, 85, 0.4); }
        .read-rate { display: flex; align-items: center; gap: 8px; }
        .progress-bar { width: 80px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 2px; }
        
        .notification-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .type-info { background: rgba(59,130,246,0.2); color: #60A5FA; }
        .type-success { background: rgba(16,185,129,0.2); color: #10B981; }
        .type-warning { background: rgba(245,158,11,0.2); color: #F59E0B; }
        .type-danger { background: rgba(239,68,68,0.2); color: #EF4444; }
        
        .action-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            margin: 0 2px;
        }
        .action-btn:hover { background: rgba(59,130,246,0.2); color: var(--primary); }
        
        .pagination-controls { display: flex; justify-content: center; gap: 8px; padding: 16px; }
        .page-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .page-btn.active { background: var(--primary); color: white; }
        
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1E293B;
            border-left: 3px solid var(--primary);
            padding: 10px 18px;
            border-radius: 10px;
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .admin-layout { flex-direction: column; }
            .admin-sidebar { width: 100%; height: auto; }
            .admin-nav { flex-direction: row; flex-wrap: wrap; }
            .admin-content { padding: 16px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .form-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>
<div class="admin-layout">
    <aside class="admin-sidebar" id="sidebar-container"></aside>
    <main class="admin-main">
        <header class="admin-header">
            <h1><i class="fas fa-bell"></i> 通知管理</h1>
            <div class="admin-user">
                <span id="adminName">管理员</span>
                <button class="icon-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <div class="admin-content">
            <!-- 统计看板 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-header"><span class="stat-title">总通知</span><i class="fas fa-envelope"></i></div>
                    <div class="stat-value" id="totalNotifications">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header"><span class="stat-title">未读总数</span><i class="fas fa-envelope-open"></i></div>
                    <div class="stat-value" id="unreadTotal">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header"><span class="stat-title">平均阅读率</span><i class="fas fa-chart-pie"></i></div>
                    <div class="stat-value" id="avgReadRate">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header"><span class="stat-title">在线用户</span><i class="fas fa-users"></i></div>
                    <div class="stat-value" id="onlineUsers">-</div>
                </div>
            </div>

            <!-- 实时状态面板（在线用户列表） -->
            <div class="realtime-panel">
                <div class="panel-header"><h3><i class="fas fa-charging-station"></i> 在线用户监控</h3></div>
                <div class="online-users" id="onlineUsersList"><div class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div></div>
            </div>

            <!-- 发送通知卡片 -->
            <div class="send-card">
                <div class="send-title">
                    <i class="fas fa-paper-plane"></i> 发送通知
                </div>
                
                <div class="form-row">
                    <div class="form-group" style="flex: 2;">
                        <label><i class="fas fa-tag"></i> 标题</label>
                        <input type="text" id="notificationTitle" placeholder="例如：系统维护通知">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label><i class="fas fa-bullhorn"></i> 类型</label>
                        <select id="notificationType">
                            <option value="info">📘 信息</option>
                            <option value="success">✅ 成功</option>
                            <option value="warning">⚠️ 警告</option>
                            <option value="danger">🔴 紧急</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-file-alt"></i> 内容</label>
                    <textarea id="notificationContent" placeholder="请输入通知内容..."></textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-clock"></i> 有效期</label>
                        <div class="duration-buttons" id="durationButtons">
                            <button type="button" class="duration-btn" data-days="1">1天</button>
                            <button type="button" class="duration-btn" data-days="3">3天</button>
                            <button type="button" class="duration-btn active" data-days="7">7天</button>
                            <button type="button" class="duration-btn" data-days="30">30天</button>
                            <button type="button" class="duration-btn" data-days="0">永久</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-users"></i> 发送对象</label>
                        <select id="targetType">
                            <option value="all">👥 所有用户</option>
                            <option value="single">👤 指定用户</option>
                        </select>
                    </div>
                    <div class="form-group" id="singleUserGroup" style="display: none;">
                        <label><i class="fas fa-search"></i> 用户ID或邮箱</label>
                        <input type="text" id="singleUserId" placeholder="输入用户ID或邮箱后按回车">
                    </div>
                </div>
                
                <div id="selectedUserInfo" style="display: none; margin-bottom: 12px; padding: 8px 12px; background: rgba(59,130,246,0.1); border-radius: 8px;">
                    <i class="fas fa-check-circle" style="color: var(--success);"></i> 已选择: <span id="selectedUserName"></span>
                    <span id="clearSelectedUser" style="margin-left: 12px; cursor: pointer; color: var(--danger);"><i class="fas fa-times-circle"></i> 清除</span>
                </div>
                
                <button class="btn-send" id="sendNotificationBtn">
                    <i class="fas fa-paper-plane"></i> 立即发送
                </button>
            </div>

            <!-- 通知列表 -->
            <div class="content-card">
                <div class="action-bar">
                    <h2 style="font-size: 1rem;"><i class="fas fa-list"></i> 通知列表</h2>
                    <button class="btn-secondary" id="refreshBtn"><i class="fas fa-sync-alt"></i> 刷新</button>
                </div>
                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr><th>ID</th><th>标题</th><th>类型</th><th>目标</th><th>阅读率</th><th>状态</th><th>发送时间</th><th>操作</th></tr>
                        </thead>
                        <tbody id="notificationList">
                            <tr><td colspan="8" class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...<\/td><\/tr>
                        </tbody>
                    </table>
                </div>
                <div class="pagination-controls" id="pagination"></div>
            </div>
        </div>
    </main>
</div>

<script>
(function() {
    let selectedDuration = 7;
    let selectedUserId = null;
    let selectedUserName = null;
    let currentPage = 1;
    let totalPages = 1;
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }
    
    function showToast(message, type = 'info') {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i><span>${escapeHtml(message)}</span>`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    async function adminRequest(endpoint, options = {}) {
        const token = localStorage.getItem('admin_token');
        const defaultOptions = {
            headers: { 'Content-Type': 'application/json', 'Authorization': token ? `Bearer ${token}` : '' },
            credentials: 'include'
        };
        try {
            const response = await fetch(`/api/v1/admin/notifications${endpoint}`, { ...defaultOptions, ...options });
            const data = await response.json();
            if (!response.ok && response.status === 401) {
                localStorage.removeItem('admin_token');
                localStorage.removeItem('admin_name');
                window.location.href = '/admin/index.html';
            }
            return data;
        } catch (err) { console.error('API请求失败:', err); throw err; }
    }
    
    // 加载统计
    async function loadStats() {
        try {
            const result = await adminRequest('/stats');
            if (result.success) {
                document.getElementById('totalNotifications').textContent = result.data.total || 0;
                document.getElementById('unreadTotal').textContent = result.data.unreadTotal || 0;
                document.getElementById('avgReadRate').textContent = `${result.data.avgReadRate || 0}%`;
                document.getElementById('onlineUsers').textContent = result.data.onlineUsers || 0;
            }
        } catch (err) { console.error(err); }
    }
    
    // 加载在线用户
    async function loadOnlineUsers() {
        try {
            const result = await adminRequest('/online-users');
            const container = document.getElementById('onlineUsersList');
            if (result.success && result.data && result.data.length > 0) {
                let html = '';
                for (const user of result.data) {
                    let displayName = user.username;
                    if (!displayName && user.email) displayName = user.email.split('@')[0];
                    if (!displayName) displayName = '用户';
                    const avatar = displayName.charAt(0).toUpperCase();
                    html += `
                        <div class="user-item">
                            <div class="user-info">
                                <div class="user-avatar">${escapeHtml(avatar)}</div>
                                <div class="user-details">
                                    <div>${escapeHtml(displayName)}</div>
                                    <div style="font-size: 0.7rem; color: var(--text-muted);">${escapeHtml(user.email || '')}</div>
                                </div>
                            </div>
                            <div class="user-status"><div class="online-dot"></div><span>在线</span></div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } else {
                container.innerHTML = '<div style="text-align:center; padding:32px;"><i class="fas fa-user-slash"></i> 暂无在线用户</div>';
            }
        } catch (err) { console.error(err); }
    }
    
    // 加载通知列表
    async function loadNotifications() {
        try {
            const url = `/?page=${currentPage}&limit=20`;
            const tbody = document.getElementById('notificationList');
            tbody.innerHTML = '<tr><td colspan="8" class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...<\/td><\/tr>';
            
            const result = await adminRequest(url);
            if (result.success && result.data) {
                const notifications = result.data;
                if (notifications.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="loading">暂无通知<\/td><\/tr>';
                } else {
                    let html = '';
                    for (const n of notifications) {
                        const typeClass = `notification-type type-${n.type}`;
                        const typeText = { info: '信息', success: '成功', warning: '警告', danger: '危险' }[n.type] || n.type;
                        const target = n.target_users === 'all' ? '所有用户' : `用户ID:${n.user_id}`;
                        const statusText = n.is_active ? '生效中' : '已禁用';
                        const start = n.start_at ? new Date(n.start_at).toLocaleString() : '立即';
                        const end = n.end_at ? new Date(n.end_at).toLocaleString() : '永久';
                        const readRate = n.read_rate || 0;
                        html += `
                            <tr>
                                <td>${n.id}</td>
                                <td><strong>${escapeHtml(n.title)}</strong><br><small style="color:var(--text-muted);">${escapeHtml(n.content?.substring(0, 40))}${n.content?.length > 40 ? '...' : ''}</small></td>
                                <td><span class="${typeClass}">${typeText}</span></td>
                                <td>${target}</td>
                                <td><div class="read-rate"><span>${readRate}%</span><div class="progress-bar"><div class="progress-fill" style="width: ${readRate}%"></div></div></div></td>
                                <td>${statusText}</td>
                                <td>${start}</td>
                                <td><button class="action-btn" onclick="deleteNotification(${n.id})"><i class="fas fa-trash"></i></button></td>
                            </tr>
                        `;
                    }
                    tbody.innerHTML = html;
                }
                
                if (result.pagination) {
                    totalPages = result.pagination.pages || 1;
                    renderPagination();
                }
            }
        } catch (err) { console.error(err); }
    }
    
    function renderPagination() {
        const container = document.getElementById('pagination');
        if (!container) return;
        if (totalPages <= 1) { container.innerHTML = ''; return; }
        let html = '';
        html += `<button class="page-btn" data-page="${currentPage - 1}" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;
        for (let i = 1; i <= totalPages; i++) {
            if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
            } else if (i === currentPage - 3 || i === currentPage + 3) {
                html += `<button class="page-btn" disabled>...</button>`;
            }
        }
        html += `<button class="page-btn" data-page="${currentPage + 1}" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;
        container.innerHTML = html;
        container.querySelectorAll('.page-btn[data-page]').forEach(btn => {
            btn.addEventListener('click', () => {
                const page = parseInt(btn.dataset.page);
                if (!isNaN(page) && page >= 1 && page <= totalPages) {
                    currentPage = page;
                    loadNotifications();
                }
            });
        });
    }
    
    window.deleteNotification = async function(id) {
        if (!confirm('确定删除该通知？')) return;
        try {
            const result = await adminRequest(`/${id}`, { method: 'DELETE' });
            if (result.success) {
                showToast('删除成功', 'success');
                loadNotifications();
                loadStats();
            } else {
                showToast('删除失败', 'error');
            }
        } catch (err) { showToast('删除失败', 'error'); }
    };
    
// 发送通知
async function sendNotification() {
    const title = document.getElementById('notificationTitle').value.trim();
    const content = document.getElementById('notificationContent').value.trim();
    const type = document.getElementById('notificationType').value;
    const targetType = document.getElementById('targetType').value;
    
    if (!title || !content) {
        showToast('请填写标题和内容', 'error');
        return;
    }
    
    // 构建请求数据
    const data = {
        title: title,
        content: content,
        type: type,
        is_active: 1
    };
    
    // 根据目标类型设置 target_users
    if (targetType === 'single') {
        if (!selectedUserId) {
            showToast('请先选择要发送的用户', 'error');
            return;
        }
        data.target_users = 'specific';
        data.user_id = parseInt(selectedUserId);
    } else {
        data.target_users = 'all';
    }
    
    // 设置有效期
    if (selectedDuration && selectedDuration > 0) {
        const endDate = new Date();
        endDate.setDate(endDate.getDate() + selectedDuration);
        data.end_at = endDate.toISOString();
    }
    
    const btn = document.getElementById('sendNotificationBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中...';
    
    try {
        const result = await adminRequest('/', { 
            method: 'POST', 
            body: JSON.stringify(data) 
        });
        
        if (result.success) {
            const msg = result.data?.count ? `成功发送给 ${result.data.count} 个用户` : '通知发送成功！';
            showToast(msg, 'success');
            // 清空表单
            document.getElementById('notificationTitle').value = '';
            document.getElementById('notificationContent').value = '';
            selectedUserId = null;
            selectedUserName = null;
            document.getElementById('selectedUserInfo').style.display = 'none';
            document.getElementById('singleUserId').value = '';
            // 刷新列表
            loadNotifications();
            loadStats();
        } else {
            showToast(result.error || '发送失败', 'error');
        }
    } catch (err) {
        console.error('发送失败:', err);
        showToast('发送失败: ' + (err.message || '网络错误'), 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> 立即发送';
    }
}

// 搜索用户
async function searchUser(keyword) {
    if (!keyword || keyword.length < 2) {
        showToast('请输入至少2个字符', 'warning');
        return;
    }
    
    try {
        const response = await fetch(`/api/v1/admin/notifications/all-users?search=${encodeURIComponent(keyword)}&limit=10`, {
            credentials: 'include',
            headers: {
                'Authorization': localStorage.getItem('admin_token') ? `Bearer ${localStorage.getItem('admin_token')}` : ''
            }
        });
        const data = await response.json();
        
        if (data.success && data.data && data.data.length > 0) {
            // 如果找到多个用户，显示选择框
            if (data.data.length > 1) {
                let userList = data.data.map(u => `${u.userId}: ${u.username || u.email}`).join('\n');
                const selectedId = prompt(`找到多个用户，请输入用户ID：\n${userList}`);
                if (selectedId) {
                    const user = data.data.find(u => u.userId == selectedId);
                    if (user) {
                        selectedUserId = user.userId;
                        selectedUserName = user.username || user.email;
                        document.getElementById('selectedUserInfo').style.display = 'block';
                        document.getElementById('selectedUserName').innerHTML = `${escapeHtml(selectedUserName)} ${user.email ? '(' + escapeHtml(user.email) + ')' : ''}`;
                        showToast(`已选择用户: ${selectedUserName}`, 'success');
                    } else {
                        showToast('用户ID无效', 'error');
                    }
                }
            } else {
                const user = data.data[0];
                selectedUserId = user.userId;
                selectedUserName = user.username || user.email;
                document.getElementById('selectedUserInfo').style.display = 'block';
                document.getElementById('selectedUserName').innerHTML = `${escapeHtml(selectedUserName)} ${user.email ? '(' + escapeHtml(user.email) + ')' : ''}`;
                showToast(`已选择用户: ${selectedUserName}`, 'success');
            }
            document.getElementById('singleUserId').value = '';
        } else {
            showToast('未找到该用户', 'error');
        }
    } catch (err) { 
        console.error('搜索用户失败:', err);
        showToast('搜索用户失败', 'error');
    }
}
    function init() {
        fetch('/admin/components/sidebar.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('sidebar-container').innerHTML = html;
                document.querySelectorAll('.admin-nav-item').forEach(link => {
                    if (link.getAttribute('href') === window.location.pathname) link.classList.add('active');
                });
            })
            .catch(err => console.error(err));
        
        const storedAdmin = localStorage.getItem('admin_name');
        if (storedAdmin) document.getElementById('adminName').textContent = storedAdmin;
        
        // 有效期按钮
        document.querySelectorAll('.duration-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.duration-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedDuration = parseInt(btn.dataset.days);
            });
        });
        
        // 目标类型切换
        document.getElementById('targetType').addEventListener('change', (e) => {
            const singleGroup = document.getElementById('singleUserGroup');
            if (e.target.value === 'single') {
                singleGroup.style.display = 'block';
            } else {
                singleGroup.style.display = 'none';
                selectedUserId = null;
                document.getElementById('selectedUserInfo').style.display = 'none';
            }
        });
        
        // 用户搜索
        const userIdInput = document.getElementById('singleUserId');
        userIdInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchUser(userIdInput.value);
            }
        });
        
        // 清除选中用户
        document.getElementById('clearSelectedUser')?.addEventListener('click', () => {
            selectedUserId = null;
            selectedUserName = null;
            document.getElementById('selectedUserInfo').style.display = 'none';
            document.getElementById('singleUserId').value = '';
        });
        
        // 发送按钮
        document.getElementById('sendNotificationBtn').addEventListener('click', sendNotification);
        
        // 刷新按钮
        document.getElementById('refreshBtn').addEventListener('click', () => {
            loadNotifications();
            loadStats();
            loadOnlineUsers();
            showToast('已刷新', 'success');
        });
        
        // 退出登录
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_name');
            window.location.href = '/admin/index.html';
        });
        
        // 加载数据
        loadStats();
        loadOnlineUsers();
        loadNotifications();
        
        // 定期刷新在线用户
        setInterval(() => { loadOnlineUsers(); }, 30000);
    }
    
    document.addEventListener('DOMContentLoaded', init);
})();
</script>
