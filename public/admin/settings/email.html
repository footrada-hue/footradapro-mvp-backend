<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>邮件模板配置 · FOOTRADAPRO 后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- 全局配置 -->
    <script src="/js/core/timezone.js"></script>
    
    <style>
        /* ============================================
           世界級後台管理系統 - 邮件模板配置
           深色主題 | 玻璃態效果 | 響應式佈局
        ============================================ */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --primary-light: #60A5FA;
            --secondary: #8B5CF6;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --info: #06B6D4;
            --dark-bg: #0A0F1C;
            --card-bg: rgba(18, 28, 44, 0.75);
            --border-glow: rgba(59, 130, 246, 0.25);
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0B1120, #050814);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1E293B;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        /* ========= 側邊欄 ========= */
        .admin-sidebar {
            width: 280px;
            background: rgba(10, 18, 32, 0.85);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-glow);
            box-shadow: 8px 0 32px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 20;
        }

        .admin-sidebar-logo {
            padding: 28px 24px;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border-bottom: 1px solid var(--border-glow);
            margin-bottom: 20px;
        }
        .admin-sidebar-logo span {
            color: var(--primary);
            background: none;
        }

        .admin-nav {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 0 16px 20px 16px;
        }
        .admin-nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .admin-nav-item i {
            width: 24px;
            font-size: 1.2rem;
        }
        .admin-nav-item:hover {
            background: rgba(59, 130, 246, 0.15);
            color: white;
            transform: translateX(4px);
        }
        .admin-nav-item.active {
            background: linear-gradient(95deg, rgba(59,130,246,0.2), rgba(139,92,246,0.1));
            color: white;
            border-left: 3px solid var(--primary);
        }

        /* ========= 主內容區域 ========= */
        .admin-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .admin-header {
            background: rgba(10, 18, 32, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glow);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 15;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-glow);
            color: var(--text-secondary);
            cursor: pointer;
        }
        .back-btn:hover {
            background: rgba(59,130,246,0.2);
            color: var(--primary);
        }
        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(120deg, #F1F5F9, var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-actions {
            display: flex;
            gap: 12px;
        }

        .settings-container {
            padding: 24px 32px;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        /* 雙列佈局 */
        .two-column {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        /* 模板列表卡片 */
        .template-list-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid var(--border-glow);
            overflow: hidden;
        }
        .list-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-glow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
        }
        .list-title {
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .list-title i {
            color: var(--primary);
        }
        .list-search {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-glow);
        }
        .search-box {
            position: relative;
        }
        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        .search-box input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            color: white;
            font-size: 0.8rem;
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .template-items {
            max-height: 550px;
            overflow-y: auto;
            padding: 12px;
        }
        .template-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 6px;
            border: 1px solid transparent;
        }
        .template-item:hover {
            background: rgba(59,130,246,0.1);
            border-color: var(--border-glow);
        }
        .template-item.active {
            background: rgba(59,130,246,0.15);
            border-color: var(--primary);
        }
        .item-icon {
            width: 42px;
            height: 42px;
            background: rgba(59,130,246,0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1rem;
        }
        .template-item.active .item-icon {
            background: var(--primary);
            color: white;
        }
        .item-info {
            flex: 1;
        }
        .item-name {
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .item-badge {
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .item-badge.active {
            background: rgba(16, 185, 129, 0.2);
            color: #10B981;
        }
        .item-badge.inactive {
            background: rgba(100, 116, 139, 0.2);
            color: #94A3B8;
        }
        .item-desc {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .item-time {
            font-size: 0.6rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* 編輯器卡片 */
        .editor-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid var(--border-glow);
            overflow: hidden;
        }
        .panel-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border-glow);
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(0,0,0,0.2);
        }
        .panel-header i {
            width: 44px;
            height: 44px;
            background: rgba(59,130,246,0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--primary);
        }
        .panel-header h3 {
            font-size: 1rem;
            font-weight: 600;
            flex: 1;
        }
        .editor-tabs {
            display: flex;
            gap: 4px;
            background: rgba(0,0,0,0.3);
            padding: 4px;
            border-radius: 12px;
        }
        .editor-tab {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.8rem;
            border-radius: 10px;
            cursor: pointer;
        }
        .editor-tab.active {
            background: var(--primary);
            color: white;
        }
        .panel-body {
            padding: 24px;
        }

        /* 快速操作按鈕 */
        .quick-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .quick-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-glow);
            border-radius: 30px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .quick-btn:hover {
            background: rgba(59,130,246,0.2);
            color: var(--primary);
        }

        /* 變量區域 */
        .variables-section {
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .variables-title {
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }
        .variables-title span {
            font-size: 0.7rem;
            color: var(--primary-light);
        }
        .variables-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .variable-tag {
            padding: 6px 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-glow);
            border-radius: 30px;
            font-size: 0.75rem;
            color: var(--text-primary);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .variable-tag:hover {
            background: var(--primary);
            color: white;
        }

        /* 表單 */
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .form-control {
            width: 100%;
            padding: 12px 14px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 0.85rem;
        }
        textarea.form-control {
            font-family: monospace;
            min-height: 280px;
            resize: vertical;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }
        .form-hint {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* 測試區域 */
        .test-section {
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 16px;
            margin-top: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .test-section .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        /* 按鈕 */
        .btn {
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-glow);
            color: var(--text-secondary);
        }
        .btn-secondary:hover {
            background: rgba(59,130,246,0.2);
            color: var(--primary);
        }
        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #EF4444;
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-glow);
        }

        /* 預覽模態框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
        }
        .modal-overlay.active {
            display: block;
        }
        .preview-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            background: #0F172A;
            border-radius: 28px;
            border: 1px solid var(--border-glow);
            z-index: 1001;
            overflow: auto;
        }
        .preview-modal.active {
            display: block;
        }
        .preview-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-glow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .preview-body {
            padding: 20px;
        }
        .preview-subject {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-glow);
        }
        .preview-content {
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        @media (max-width: 1024px) {
            .two-column {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 768px) {
            .admin-layout {
                flex-direction: column;
            }
            .admin-sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }
            .admin-nav {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .settings-container {
                padding: 16px;
            }
            .form-actions {
                flex-direction: column;
            }
            .form-actions button {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-sidebar-logo">FOOT<span>RADA</span></div>
            <nav class="admin-nav">
                <a href="/admin/dashboard.html" class="admin-nav-item"><i class="fas fa-tachometer-alt"></i> <span>仪表盘</span></a>
                <a href="/admin/stats.html" class="admin-nav-item"><i class="fas fa-chart-pie"></i> <span>数据统计</span></a>
                <a href="/admin/users.html" class="admin-nav-item"><i class="fas fa-users"></i> <span>用户管理</span></a>
                <a href="/admin/admins.html" class="admin-nav-item"><i class="fas fa-user-shield"></i> <span>管理员管理</span></a>
                <a href="/admin/deposits.html" class="admin-nav-item"><i class="fas fa-arrow-down"></i> <span>充值审核</span></a>
                <a href="/admin/withdrawals.html" class="admin-nav-item"><i class="fas fa-arrow-up"></i> <span>提现审核</span></a>
                <a href="/admin/finance.html" class="admin-nav-item"><i class="fas fa-chart-line"></i> <span>财务管理</span></a>
                <a href="/admin/matches.html" class="admin-nav-item"><i class="fas fa-futbol"></i> <span>比赛管理</span></a>
                <a href="/admin/settle.html" class="admin-nav-item"><i class="fas fa-calculator"></i> <span>清算管理</span></a>
                <a href="/admin/report-editor.html" class="admin-nav-item"><i class="fas fa-edit"></i> <span>报告编辑</span></a>
                <a href="/admin/ticker-manager.html" class="admin-nav-item"><i class="fas fa-bolt"></i> <span>动态管理</span></a>
                <a href="/admin/notifications.html" class="admin-nav-item"><i class="fas fa-bell"></i> <span>通知管理</span></a>
                <a href="/admin/settings/index.html" class="admin-nav-item active"><i class="fas fa-cog"></i> <span>系统设置</span></a>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <div class="header-left">
                    <button class="back-btn" onclick="location.href='/admin/settings/index.html'"><i class="fas fa-arrow-left"></i></button>
                    <h1 class="page-title">邮件模板配置</h1>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary" id="previewBtn"><i class="fas fa-eye"></i> 预览</button>
                    <button class="btn btn-primary" id="saveBtn"><i class="fas fa-save"></i> 保存当前模板</button>
                </div>
            </header>

            <div class="settings-container">
                <div class="two-column">
                    <div class="template-list-card">
                        <div class="list-header"><div class="list-title"><i class="fas fa-list"></i> 邮件模板</div><button class="btn btn-secondary" id="newTemplateBtn" style="padding: 6px 12px;"><i class="fas fa-plus"></i> 新建</button></div>
                        <div class="list-search"><div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchTemplates" placeholder="搜索模板..."></div></div>
                        <div class="template-items" id="templateList"></div>
                    </div>

                    <div class="editor-card">
                        <div class="panel-header"><i class="fas fa-edit"></i><h3 id="currentTemplateTitle">编辑模板</h3><div class="editor-tabs"><button class="editor-tab active" data-mode="text">文本</button><button class="editor-tab" data-mode="html">HTML</button></div></div>
                        <div class="panel-body">
                            <div class="quick-actions"><button class="quick-btn" id="insertVariableBtn"><i class="fas fa-code"></i> 插入变量</button><button class="quick-btn" id="enableToggleBtn"><i class="fas fa-power-off"></i> 启用/停用</button><button class="quick-btn" id="resetTemplateBtn"><i class="fas fa-history"></i> 恢复默认</button></div>
                            <div class="variables-section"><div class="variables-title">可用变量 <span>点击插入</span></div><div class="variables-grid" id="variableGrid"></div></div>
                            <div class="form-group"><label class="form-label">邮件主题</label><input type="text" class="form-control" id="emailSubject"><div class="form-hint">当前: <span id="subjectLength">0</span>字符</div></div>
                            <div class="form-group"><label class="form-label">邮件内容</label><textarea class="form-control" id="emailContent" rows="12"></textarea></div>
                            <div class="test-section"><div class="form-group"><label class="form-label">发送测试邮件到</label><input type="email" class="form-control" id="testEmail" placeholder="test@example.com"></div><button class="btn btn-primary" id="sendTestBtn"><i class="fas fa-paper-plane"></i> 发送测试</button></div>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button class="btn btn-danger" id="resetAllBtn"><i class="fas fa-history"></i> 恢复默认</button>
                    <button class="btn btn-secondary" onclick="location.href='/admin/settings/index.html'"><i class="fas fa-times"></i> 取消</button>
                    <button class="btn btn-primary" id="saveAllBtn"><i class="fas fa-save"></i> 保存所有模板</button>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="preview-modal" id="previewModal"><div class="preview-header"><h3>邮件预览</h3><button class="preview-close" id="closePreviewBtn"><i class="fas fa-times"></i></button></div><div class="preview-body"><div class="preview-subject" id="previewSubject"></div><div class="preview-content" id="previewContent"></div></div></div>

    <script>
        const TEMPLATES = {
            welcome: { id:'welcome', name:'欢迎邮件', category:'register', status:'active', desc:'新用户注册成功', time:'2小时前', subject:'欢迎加入 FOOTRADA，{{username}}！', content:'尊敬的 {{username}}：\n\n感谢您注册 FOOTRADA 平台！我们非常高兴欢迎您的加入。\n\n验证码：{{verify_code}}（有效期为24小时）\n\nFOOTRADA 团队', html:'<h2>欢迎 {{username}}</h2><p>验证码：{{verify_code}}</p>' },
            verify: { id:'verify', name:'邮箱验证', category:'register', status:'active', desc:'验证码邮件', time:'昨天', subject:'请验证您的邮箱 - FOOTRADA', content:'您好 {{username}}：您的验证码是：{{verify_code}}', html:'<p>验证码：<strong>{{verify_code}}</strong></p>' },
            deposit: { id:'deposit', name:'充值成功', category:'deposit', status:'active', desc:'充值到账通知', time:'上周', subject:'充值成功通知', content:'充值金额：{{amount}} USDT', html:'<p>充值金额：{{amount}} USDT</p>' }
        };
        const VARIABLES = { common:['{{username}}','{{email}}','{{date}}','{{time}}'], register:['{{verify_code}}'], deposit:['{{amount}}','{{txid}}'] };
        let currentId = 'welcome', currentMode = 'text';

        function renderTemplateList() {
            const list = document.getElementById('templateList');
            list.innerHTML = '';
            Object.values(TEMPLATES).forEach(t => {
                const activeClass = t.id === currentId ? 'active' : '';
                const statusClass = t.status === 'active' ? 'active' : 'inactive';
                const statusText = t.status === 'active' ? '启用' : '停用';
                const div = document.createElement('div');
                div.className = `template-item ${activeClass}`;
                div.dataset.id = t.id;
                div.innerHTML = `<div class="item-icon"><i class="fas fa-envelope"></i></div><div class="item-info"><div class="item-name">${t.name}<span class="item-badge ${statusClass}">${statusText}</span></div><div class="item-desc">${t.desc}</div><div class="item-time">${t.time}</div></div>`;
                list.appendChild(div);
            });
        }
        function loadTemplate(id) {
            const t = TEMPLATES[id];
            if(!t) return;
            currentId = id;
            document.getElementById('currentTemplateTitle').textContent = `编辑模板 · ${t.name}`;
            document.getElementById('emailSubject').value = t.subject;
            document.getElementById('emailContent').value = currentMode === 'text' ? t.content : t.html;
            document.getElementById('subjectLength').textContent = t.subject.length;
            const vars = [...(VARIABLES.common||[]), ...(VARIABLES[t.category]||[])];
            document.getElementById('variableGrid').innerHTML = vars.map(v => `<span class="variable-tag" data-var="${v}"><i class="fas fa-code"></i> ${v}</span>`).join('');
            document.querySelectorAll('.template-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
        }
        function showToast(msg, type='success') {
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.cssText = `position:fixed; top:20px; right:20px; padding:12px 24px; background:${type==='success'?'#10b981':'#3b82f6'}; color:white; border-radius:12px; z-index:10001; animation:slideIn 0.3s ease;`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        function closePreview() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.getElementById('previewModal').classList.remove('active');
        }
        document.addEventListener('DOMContentLoaded', function() {
            renderTemplateList();
            loadTemplate('welcome');
            document.getElementById('templateList').addEventListener('click', e => { const item = e.target.closest('.template-item'); if(item?.dataset.id) loadTemplate(item.dataset.id); });
            document.querySelectorAll('.editor-tab').forEach(tab => { tab.addEventListener('click', function() {
                document.querySelectorAll('.editor-tab').forEach(t=>t.classList.remove('active')); this.classList.add('active');
                const t = TEMPLATES[currentId]; if(!t) return;
                currentMode = this.dataset.mode;
                document.getElementById('emailContent').value = currentMode === 'text' ? t.content : t.html;
            }); });
            document.getElementById('variableGrid').addEventListener('click', e => { const tag = e.target.closest('.variable-tag'); if(!tag) return; const textarea = document.getElementById('emailContent'); const start = textarea.selectionStart; const val = textarea.value; textarea.value = val.substring(0,start) + tag.dataset.var + val.substring(start); textarea.focus(); });
            document.getElementById('enableToggleBtn').addEventListener('click', () => { const t = TEMPLATES[currentId]; if(t){ t.status = t.status==='active'?'inactive':'active'; t.time='刚刚'; renderTemplateList(); showToast(`模板已${t.status==='active'?'启用':'停用'}`); } });
            document.getElementById('resetTemplateBtn').addEventListener('click', () => { if(confirm('恢复默认？')) location.reload(); });
            document.getElementById('newTemplateBtn').addEventListener('click', () => { const newId = 'new_'+Date.now(); TEMPLATES[newId]={id:newId,name:'新模板',category:'register',status:'inactive',desc:'新建模板',time:'刚刚',subject:'新邮件主题',content:'请输入内容...',html:'<p>HTML内容...</p>'}; renderTemplateList(); loadTemplate(newId); showToast('新模板已创建'); });
            document.getElementById('searchTemplates').addEventListener('input', e => { const term = e.target.value.toLowerCase(); document.querySelectorAll('.template-item').forEach(item => { const name = item.querySelector('.item-name').childNodes[0]?.textContent.toLowerCase(); item.style.display = name?.includes(term) ? 'flex' : 'none'; }); });
            document.getElementById('emailSubject').addEventListener('input', function() { document.getElementById('subjectLength').textContent = this.value.length; });
            document.getElementById('emailContent').addEventListener('input', function() { const t = TEMPLATES[currentId]; if(t){ if(currentMode==='text') t.content = this.value; else t.html = this.value; } });
            document.getElementById('previewBtn').addEventListener('click', function() {
                const t = TEMPLATES[currentId]; if(!t) return;
                let content = document.getElementById('emailContent').value;
                content = content.replace(/{{username}}/g,'john_doe').replace(/{{verify_code}}/g,'123456').replace(/{{amount}}/g,'1,000');
                document.getElementById('previewSubject').textContent = '主题：' + document.getElementById('emailSubject').value;
                document.getElementById('previewContent').innerHTML = content.replace(/\n/g,'<br>');
                document.getElementById('modalOverlay').classList.add('active');
                document.getElementById('previewModal').classList.add('active');
            });
            document.getElementById('closePreviewBtn').addEventListener('click', closePreview);
            document.getElementById('modalOverlay').addEventListener('click', closePreview);
            document.getElementById('saveBtn').addEventListener('click', function() { const t = TEMPLATES[currentId]; if(t){ t.subject = document.getElementById('emailSubject').value; if(currentMode==='text') t.content = document.getElementById('emailContent').value; else t.html = document.getElementById('emailContent').value; t.time='刚刚'; renderTemplateList(); showToast(`✅ 模板 "${t.name}" 已保存`); } });
            document.getElementById('sendTestBtn').addEventListener('click', () => showToast('测试邮件已发送'));
            document.getElementById('saveAllBtn').addEventListener('click', () => showToast('所有模板已保存'));
            document.getElementById('resetAllBtn').addEventListener('click', () => { if(confirm('恢复所有默认？')) location.reload(); });
            document.getElementById('insertVariableBtn').addEventListener('click', () => document.querySelector('.variables-section').scrollIntoView({ behavior:'smooth' }));
            const style = document.createElement('style');
            style.textContent = `@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}`;
            document.head.appendChild(style);
        });
    </script>
</body>
</html>
