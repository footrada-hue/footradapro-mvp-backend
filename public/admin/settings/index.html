<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>系统设置 · FOOTRADAPRO 后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- 全局配置 - 保留原有引用 -->
    <script src="/js/core/timezone.js"></script>
    
    <style>
        /* ============================================
           世界級後台管理系統 - 系统设置頁面
           深色主題 | 玻璃態效果 | 響應式佈局
        ============================================ */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --primary-light: #60A5FA;
            --secondary: #8B5CF6;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --info: #06B6D4;
            --dark-bg: #0A0F1C;
            --card-bg: rgba(18, 28, 44, 0.75);
            --border-glow: rgba(59, 130, 246, 0.25);
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0B1120, #050814);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1E293B;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        /* ========= 側邊欄 ========= */
        .admin-sidebar {
            width: 280px;
            background: rgba(10, 18, 32, 0.85);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-glow);
            box-shadow: 8px 0 32px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 20;
        }

        .admin-sidebar::-webkit-scrollbar {
            width: 3px;
        }

        .admin-sidebar-logo {
            padding: 28px 24px;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border-bottom: 1px solid var(--border-glow);
            margin-bottom: 20px;
        }
        .admin-sidebar-logo span {
            color: var(--primary);
            background: none;
        }

        .admin-nav {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 0 16px 20px 16px;
        }
        .admin-nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .admin-nav-item i {
            width: 24px;
            font-size: 1.2rem;
        }
        .admin-nav-item:hover {
            background: rgba(59, 130, 246, 0.15);
            color: white;
            transform: translateX(4px);
        }
        .admin-nav-item.active {
            background: linear-gradient(95deg, rgba(59,130,246,0.2), rgba(139,92,246,0.1));
            color: white;
            border-left: 3px solid var(--primary);
        }

        /* ========= 主內容區域 ========= */
        .admin-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .admin-header {
            background: rgba(10, 18, 32, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glow);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 15;
        }
        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(120deg, #F1F5F9, var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .page-title i {
            color: var(--primary);
            margin-right: 12px;
        }
        .admin-user {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.04);
            padding: 6px 18px;
            border-radius: 60px;
        }
        #adminName {
            font-weight: 600;
            color: var(--text-primary);
        }
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .admin-content {
            padding: 28px 32px;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        /* ========= 設置卡片網格 ========= */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        .setting-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid var(--border-glow);
            padding: 28px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .setting-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .setting-card:hover {
            transform: translateY(-6px);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.4);
        }

        .setting-card:hover::before {
            opacity: 1;
        }

        .card-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(139, 92, 246, 0.1));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .card-icon i {
            font-size: 28px;
            color: var(--primary-light);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .card-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid rgba(51, 65, 85, 0.4);
        }

        .card-badge {
            font-size: 0.7rem;
            padding: 4px 12px;
            background: rgba(59, 130, 246, 0.15);
            border-radius: 20px;
            color: var(--primary-light);
            font-weight: 500;
        }

        .card-footer i {
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .setting-card:hover .card-footer i {
            transform: translateX(4px);
            color: var(--primary);
        }

        /* ========= 響應式 ========= */
        @media (max-width: 768px) {
            .admin-layout {
                flex-direction: column;
            }
            .admin-sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }
            .admin-nav {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .admin-nav-item {
                flex: 0 0 auto;
            }
            .admin-content {
                padding: 20px;
            }
            .page-title {
                font-size: 1.2rem;
            }
            .settings-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .setting-card {
                padding: 20px;
            }
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .setting-card {
            animation: fadeSlideUp 0.4s ease forwards;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- 側邊導航欄 -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-logo">FOOT<span>RADA</span></div>
            <nav class="admin-nav">
                <a href="/admin/dashboard.html" class="admin-nav-item"><i class="fas fa-tachometer-alt"></i> <span>仪表盘</span></a>
                <a href="/admin/stats.html" class="admin-nav-item"><i class="fas fa-chart-pie"></i> <span>数据统计</span></a>
                <a href="/admin/users.html" class="admin-nav-item"><i class="fas fa-users"></i> <span>用户管理</span></a>
                <a href="/admin/admins.html" class="admin-nav-item"><i class="fas fa-user-shield"></i> <span>管理员管理</span></a>
                <a href="/admin/deposits.html" class="admin-nav-item"><i class="fas fa-arrow-down"></i> <span>充值审核</span></a>
                <a href="/admin/withdrawals.html" class="admin-nav-item"><i class="fas fa-arrow-up"></i> <span>提现审核</span></a>
                <a href="/admin/finance.html" class="admin-nav-item"><i class="fas fa-chart-line"></i> <span>财务管理</span></a>
                <a href="/admin/matches.html" class="admin-nav-item"><i class="fas fa-futbol"></i> <span>比赛管理</span></a>
                <a href="/admin/settle.html" class="admin-nav-item"><i class="fas fa-calculator"></i> <span>清算管理</span></a>
                <a href="/admin/report-editor.html" class="admin-nav-item"><i class="fas fa-edit"></i> <span>报告编辑</span></a>
                <a href="/admin/ticker-manager.html" class="admin-nav-item"><i class="fas fa-bolt"></i> <span>动态管理</span></a>
                <a href="/admin/notifications.html" class="admin-nav-item"><i class="fas fa-bell"></i> <span>通知管理</span></a>
                <a href="/admin/settings/index.html" class="admin-nav-item active"><i class="fas fa-cog"></i> <span>系统设置</span></a>
                <a href="/admin/support-admin.html" class="admin-nav-item active"><i class="fas fa-cog"></i> <span>客服管理</span></a>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <h1 class="page-title"><i class="fas fa-cog"></i> 系统设置中心</h1>
                <div class="admin-user">
                    <span id="adminName">管理员</span>
                    <button class="icon-btn" id="logoutBtn" title="退出登录">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <div class="admin-content">
                <div class="settings-grid">
                    <div class="setting-card" onclick="location.href='/admin/settings/basic.html'">
                        <div class="card-icon"><i class="fas fa-globe"></i></div>
                        <h3 class="card-title">网站基础设置</h3>
                        <p class="card-desc">配置网站名称、Logo、SEO、联系方式等基础信息</p>
                        <div class="card-footer">
                            <span class="card-badge">基础信息</span>
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </div>

                    <div class="setting-card" onclick="location.href='/admin/settings/trade.html'">
                        <div class="card-icon"><i class="fas fa-chart-line"></i></div>
                        <h3 class="card-title">交易规则配置</h3>
                        <p class="card-desc">设置限额、费率、授权规则等交易参数</p>
                        <div class="card-footer">
                            <span class="card-badge">交易参数</span>
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </div>

                    <div class="setting-card" onclick="location.href='/admin/settings/withdraw.html'">
                        <div class="card-icon"><i class="fas fa-coins"></i></div>
                        <h3 class="card-title">提现网络配置</h3>
                        <p class="card-desc">管理TRC20/ERC20/BEP20网络参数</p>
                        <div class="card-footer">
                            <span class="card-badge">资金配置</span>
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </div>

                    <div class="setting-card" onclick="location.href='/admin/settings/email.html'">
                        <div class="card-icon"><i class="fas fa-envelope"></i></div>
                        <h3 class="card-title">邮件模板编辑</h3>
                        <p class="card-desc">自定义各类系统邮件的模板内容</p>
                        <div class="card-footer">
                            <span class="card-badge">通知配置</span>
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </div>

                    <div class="setting-card" onclick="location.href='/admin/settings/layout.html'">
                        <div class="card-icon"><i class="fas fa-paint-brush"></i></div>
                        <h3 class="card-title">首页布局设置</h3>
                        <p class="card-desc">调整首页模块顺序、轮播图、公告等</p>
                        <div class="card-footer">
                            <span class="card-badge">界面配置</span>
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 显示管理员名称
        const storedAdmin = localStorage.getItem('admin_name');
        if (storedAdmin) {
            document.getElementById('adminName').textContent = storedAdmin;
        }

        // 退出登录
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            window.location.href = '/admin/index.html';
        });
    </script>
</body>
</html>
