<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数据统计 - FOOTRADAPRO 后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- 核心配置 JS - 必須在 head 中加載 -->
    <script src="/js/core/config.js"></script>
    <script src="/js/core/timezone.js"></script>
    <script src="/js/admin/admin_auth_guard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        /* ========== 完整 CSS 樣式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #0B1120;
            color: #F1F5F9;
            line-height: 1.5;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1E293B;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #3B82F6;
            border-radius: 10px;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .admin-sidebar {
            width: 280px;
            background: rgba(10, 18, 32, 0.95);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(59, 130, 246, 0.25);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 20;
        }

        .admin-sidebar-logo {
            padding: 28px 24px;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #60A5FA, #8B5CF6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border-bottom: 1px solid rgba(59, 130, 246, 0.25);
            margin-bottom: 20px;
        }
        .admin-sidebar-logo span {
            color: #3B82F6;
            background: none;
        }

        .admin-nav {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 0 16px 20px 16px;
        }
        .admin-nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 14px;
            color: #94A3B8;
            font-weight: 500;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .admin-nav-item i {
            width: 24px;
            font-size: 1.2rem;
        }
        .admin-nav-item:hover {
            background: rgba(59, 130, 246, 0.15);
            color: white;
            transform: translateX(4px);
        }
        .admin-nav-item.active {
            background: linear-gradient(95deg, rgba(59,130,246,0.2), rgba(139,92,246,0.1));
            color: white;
            border-left: 3px solid #3B82F6;
        }
        
        .unread-badge {
            margin-left: auto;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            background: #F97316;
            color: white;
        }

        .admin-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .admin-header {
            background: rgba(10, 18, 32, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(59, 130, 246, 0.25);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 15;
        }
        .admin-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(120deg, #F1F5F9, #60A5FA);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .admin-header h1 i {
            color: #3B82F6;
            margin-right: 12px;
        }
        .admin-user {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.04);
            padding: 6px 18px;
            border-radius: 60px;
        }
        #adminName {
            font-weight: 600;
            color: #F1F5F9;
        }
        .icon-btn {
            background: transparent;
            border: none;
            color: #94A3B8;
            font-size: 1.2rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }
        .icon-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #EF4444;
        }

        .admin-content {
            padding: 28px 32px;
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
        }

        .mode-switcher {
            background: rgba(18, 28, 44, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid rgba(59, 130, 246, 0.25);
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .mode-label {
            font-weight: 600;
            color: #94A3B8;
        }
        .mode-label i {
            color: #3B82F6;
            margin-right: 8px;
        }
        .mode-buttons {
            display: flex;
            gap: 12px;
        }
        .mode-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 40px;
            color: #94A3B8;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .mode-btn i {
            margin-right: 6px;
        }
        .mode-btn:hover {
            background: rgba(59,130,246,0.2);
            color: white;
        }
        .mode-btn.active {
            background: #3B82F6;
            color: white;
            border-color: #3B82F6;
        }

        .date-range-bar {
            background: rgba(18, 28, 44, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid rgba(59, 130, 246, 0.25);
            padding: 16px 24px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .range-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .range-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 40px;
            color: #94A3B8;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .range-btn:hover {
            background: rgba(59,130,246,0.2);
            color: white;
        }
        .range-btn.active {
            background: #3B82F6;
            color: white;
            border-color: #3B82F6;
        }
        .custom-range {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .custom-range input {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 12px;
            border-radius: 12px;
            color: white;
            font-size: 0.85rem;
        }
        .custom-range input:focus {
            outline: none;
            border-color: #3B82F6;
        }
        .custom-range span {
            color: #94A3B8;
        }
        .btn-small {
            background: #3B82F6;
            border: none;
            padding: 8px 18px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-small:hover {
            background: #2563EB;
        }

        .loading-state {
            text-align: center;
            padding: 80px;
            color: #94A3B8;
        }
        .loading-state i {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: rgba(18, 28, 44, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid rgba(59, 130, 246, 0.25);
            padding: 22px 24px;
            display: flex;
            align-items: center;
            gap: 18px;
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(59,130,246,0.5);
        }
        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }
        .stat-icon.blue { background: linear-gradient(145deg, #1E3A8A, #2563EB); }
        .stat-icon.green { background: linear-gradient(145deg, #14532D, #16A34A); }
        .stat-icon.orange { background: linear-gradient(145deg, #9A3412, #EA580C); }
        .stat-icon.purple { background: linear-gradient(145deg, #4C1D95, #8B5CF6); }

        .stat-info {
            flex: 1;
        }
        .stat-info h4 {
            font-size: 0.85rem;
            font-weight: 500;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 1.9rem;
            font-weight: 800;
            color: white;
            line-height: 1.2;
        }

        .two-columns {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 24px;
        }
        .three-columns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 28px;
        }
        .chart-card {
            background: rgba(18, 28, 44, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid rgba(59, 130, 246, 0.25);
            overflow: hidden;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 22px;
            border-bottom: 1px solid rgba(71,85,105,0.4);
        }
        .chart-header h3 {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-header h3 i {
            color: #3B82F6;
        }
        .chart-actions {
            display: flex;
            gap: 8px;
        }
        .chart-type-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            color: #94A3B8;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .chart-type-btn.active {
            background: #3B82F6;
            color: white;
        }
        .chart-wrapper {
            padding: 20px;
            height: 280px;
            position: relative;
        }
        .chart-wrapper.small {
            height: 220px;
        }

        .data-table-card {
            background: rgba(18, 28, 44, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid rgba(59, 130, 246, 0.25);
            overflow: hidden;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            padding: 18px 24px;
            border-bottom: 1px solid rgba(71,85,105,0.4);
        }
        .card-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-header h3 i {
            color: #3B82F6;
        }
        .card-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .limit-select, .status-select {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 12px;
            border-radius: 12px;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .view-link {
            background: transparent;
            border: 1px solid #3B82F6;
            padding: 8px 16px;
            border-radius: 12px;
            color: #60A5FA;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .view-link:hover {
            background: #3B82F6;
            color: white;
        }
        .table-container {
            overflow-x: auto;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .data-table th {
            text-align: left;
            padding: 14px 16px;
            color: #94A3B8;
            font-weight: 600;
            border-bottom: 1px solid rgba(59, 130, 246, 0.25);
        }
        .data-table td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(51,65,85,0.4);
            color: #F1F5F9;
        }
        .data-table tr:hover td {
            background: rgba(59,130,246,0.06);
        }
        .sortable {
            cursor: pointer;
        }
        .sortable i {
            margin-left: 6px;
        }
        .amount-cell {
            font-weight: 600;
            color: #10B981;
        }
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .status-badge.pending {
            background: rgba(245, 158, 11, 0.2);
            color: #F59E0B;
        }
        .status-badge.settled {
            background: rgba(16, 185, 129, 0.2);
            color: #10B981;
        }
        .loading-td {
            text-align: center;
            padding: 48px !important;
            color: #94A3B8;
        }

        .auth-pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 20px 24px;
            border-top: 1px solid rgba(71,85,105,0.4);
            flex-wrap: wrap;
        }
        .page-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            color: #94A3B8;
            cursor: pointer;
        }
        .page-btn:hover:not(:disabled) {
            background: #3B82F6;
            color: white;
        }
        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .page-info {
            color: #94A3B8;
            font-size: 0.85rem;
        }
        .total-info {
            color: #64748B;
            font-size: 0.8rem;
            margin-left: 12px;
        }

        @media (max-width: 1024px) {
            .two-columns, .three-columns {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 768px) {
            .admin-layout {
                flex-direction: column;
            }
            .admin-sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }
            .admin-nav {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
            .admin-content {
                padding: 20px;
            }
            .admin-header h1 {
                font-size: 1.2rem;
            }
        }
        @media (max-width: 550px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .stat-value {
                font-size: 1.5rem;
            }
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stat-card, .chart-card, .data-table-card {
            animation: fadeSlideUp 0.4s ease;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar" id="sidebar-container"></aside>

        <script>
            // 加載側邊欄組件
            fetch('/admin/components/sidebar.html')
                .then(res => res.text())
                .then(html => {
                    document.getElementById('sidebar-container').innerHTML = html;
                    const currentPath = window.location.pathname;
                    document.querySelectorAll('.admin-nav-item').forEach(link => {
                        if (link.getAttribute('href') === currentPath) {
                            link.classList.add('active');
                        }
                    });
                })
                .catch(err => console.error('加載側邊欄失敗:', err));
        </script>

        <main class="admin-main">
            <header class="admin-header">
                <h1><i class="fas fa-chart-pie"></i> 數據統計</h1>
                <div class="admin-user">
                    <span id="adminName">管理員</span>
                    <button class="icon-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>

            <div class="admin-content">
                <div class="mode-switcher">
                    <span class="mode-label"><i class="fas fa-chart-simple"></i> 數據模式</span>
                    <div class="mode-buttons">
                        <button class="mode-btn active" data-mode="all"><i class="fas fa-chart-pie"></i> 全部</button>
                        <button class="mode-btn" data-mode="test"><i class="fas fa-flask"></i> 測試模式</button>
                        <button class="mode-btn" data-mode="live"><i class="fas fa-bolt"></i> 真實模式</button>
                    </div>
                </div>

                <div class="date-range-bar">
                    <div class="range-buttons">
                        <button class="range-btn active" data-range="today">今日</button>
                        <button class="range-btn" data-range="week">本週</button>
                        <button class="range-btn" data-range="month">本月</button>
                        <button class="range-btn" data-range="year">本年</button>
                    </div>
                    <div class="custom-range">
                        <input type="date" id="startDate">
                        <span>至</span>
                        <input type="date" id="endDate">
                        <button class="btn-small" id="applyRange">應用</button>
                    </div>
                </div>

                <div id="loadingSpinner" class="loading-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <span>加載數據中...</span>
                </div>

                <div id="statsContent" style="display: none;">
                    <div class="stats-grid" id="statsCards"></div>
                    <div class="two-columns">
                        <div class="chart-card">
                            <div class="chart-header">
                                <h3><i class="fas fa-chart-line"></i> 收入趨勢</h3>
                                <div class="chart-actions">
                                    <button class="chart-type-btn active" data-chart="trend" data-type="line">折線圖</button>
                                    <button class="chart-type-btn" data-chart="trend" data-type="bar">柱狀圖</button>
                                </div>
                            </div>
                            <div class="chart-wrapper"><canvas id="trendChart"></canvas></div>
                        </div>
                        <div class="chart-card">
                            <div class="chart-header"><h3><i class="fas fa-futbol"></i> 比賽統計</h3></div>
                            <div class="chart-wrapper"><canvas id="matchesChart"></canvas></div>
                        </div>
                    </div>
                    <div class="three-columns">
                        <div class="chart-card">
                            <div class="chart-header"><h3><i class="fas fa-users"></i> 用戶活躍度</h3></div>
                            <div class="chart-wrapper small"><canvas id="activityChart"></canvas></div>
                        </div>
                        <div class="chart-card">
                            <div class="chart-header"><h3><i class="fas fa-flask"></i> 模式分佈</h3></div>
                            <div class="chart-wrapper small"><canvas id="modeChart"></canvas></div>
                        </div>
                        <div class="chart-card">
                            <div class="chart-header"><h3><i class="fas fa-crown"></i> VIP等級分佈</h3></div>
                            <div class="chart-wrapper small"><canvas id="vipChart"></canvas></div>
                        </div>
                    </div>
                    <div class="data-table-card">
                        <div class="card-header">
                            <h3><i class="fas fa-list-ul"></i> 授權記錄</h3>
                            <div class="card-actions">
                                <select id="authLimitSelect" class="limit-select">
                                    <option value="20">20條/頁</option>
                                    <option value="50" selected>50條/頁</option>
                                    <option value="100">100條/頁</option>
                                </select>
                                <select id="authStatusFilter" class="status-select">
                                    <option value="all">全部狀態</option>
                                    <option value="pending">待結算</option>
                                    <option value="won">盈利</option>
                                    <option value="lost">虧損</option>
                                    <option value="settled">已結算</option>
                                </select>
                                <button class="view-link" id="exportAuthBtn"><i class="fas fa-download"></i> 導出記錄</button>
                            </div>
                        </div>
                        <div class="table-container">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>授權ID</th><th>用戶</th><th>比賽</th>
                                        <th class="sortable" data-sort="amount">金額 <i class="fas fa-sort"></i></th>
                                        <th>狀態</th>
                                        <th class="sortable" data-sort="time">時間 <i class="fas fa-sort"></i></th>
                                    </tr>
                                </thead>
                                <tbody id="authTableBody">
                                    <tr><td colspan="6" class="loading-td">加載中...</td</tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="auth-pagination" id="authPagination">
                            <button class="page-btn" id="authFirstBtn" disabled><i class="fas fa-angle-double-left"></i></button>
                            <button class="page-btn" id="authPrevBtn" disabled><i class="fas fa-chevron-left"></i></button>
                            <span class="page-info" id="authPageInfo">第 1 / 1 頁</span>
                            <button class="page-btn" id="authNextBtn" disabled><i class="fas fa-chevron-right"></i></button>
                            <button class="page-btn" id="authLastBtn" disabled><i class="fas fa-angle-double-right"></i></button>
                            <span class="total-info" id="authTotalInfo">共 0 條</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- ⭐ 關鍵：stats_controller.js 必須放在 body 底部，確保 DOM 加載完成 -->
    <script src="/js/admin/stats_controller.js"></script>
</body>
</html>
