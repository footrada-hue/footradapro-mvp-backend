<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>提现审核 - FOOTRADAPRO 后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- JS 引用 - 保留原有 -->
    <script src="/js/core/config.js"></script>
    <script src="/js/core/timezone.js"></script>
    <script src="/js/admin/admin_auth_guard.js"></script>
    
    <style>
        /* ============================================
           世界級後台管理系統 - 提现审核頁面
           深色主題 | 玻璃態效果 | 響應式佈局
        ============================================ */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --primary-light: #60A5FA;
            --secondary: #8B5CF6;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --info: #06B6D4;
            --dark-bg: #0A0F1C;
            --card-bg: rgba(18, 28, 44, 0.75);
            --border-glow: rgba(59, 130, 246, 0.25);
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0B1120, #050814);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1E293B;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        /* ========= 側邊欄 ========= */
        .admin-sidebar {
            width: 280px;
            background: rgba(10, 18, 32, 0.85);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-glow);
            box-shadow: 8px 0 32px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 20;
        }

        .admin-sidebar::-webkit-scrollbar {
            width: 3px;
        }

        .admin-sidebar-logo {
            padding: 28px 24px;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border-bottom: 1px solid var(--border-glow);
            margin-bottom: 20px;
        }
        .admin-sidebar-logo span {
            color: var(--primary);
            background: none;
        }

        .admin-nav {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 0 16px 20px 16px;
        }
        .admin-nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .admin-nav-item i {
            width: 24px;
            font-size: 1.2rem;
        }
        .admin-nav-item:hover {
            background: rgba(59, 130, 246, 0.15);
            color: white;
            transform: translateX(4px);
        }
        .admin-nav-item.active {
            background: linear-gradient(95deg, rgba(59,130,246,0.2), rgba(139,92,246,0.1));
            color: white;
            border-left: 3px solid var(--primary);
        }
        
        .unread-badge {
            margin-left: auto;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            background: var(--warning);
            color: white;
        }

        /* ========= 主內容區域 ========= */
        .admin-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .admin-header {
            background: rgba(10, 18, 32, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glow);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 15;
        }
        .admin-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(120deg, #F1F5F9, var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .admin-header h1 i {
            color: var(--primary);
            margin-right: 12px;
        }
        .admin-user {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.04);
            padding: 6px 18px;
            border-radius: 60px;
        }
        #adminName {
            font-weight: 600;
            color: var(--text-primary);
        }
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .admin-content {
            padding: 28px 32px;
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
        }

        /* ========= 通知欄 ========= */
        .notification-bar {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 14px 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .notification-bar i {
            color: var(--primary);
            font-size: 1.2rem;
        }
        .notification-bar span {
            flex: 1;
            color: var(--text-primary);
        }
        .notification-bar button {
            background: var(--primary);
            border: none;
            border-radius: 10px;
            padding: 6px 16px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .notification-bar .close-btn {
            background: transparent;
            color: var(--text-secondary);
            padding: 4px;
        }

        /* ========= 統計卡片 ========= */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid var(--border-glow);
            padding: 20px 24px;
            text-align: center;
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            border-color: rgba(59,130,246,0.5);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: white;
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        /* ========= 篩選欄 ========= */
        .filters-bar {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid var(--border-glow);
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filter-group label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .filter-select {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 16px;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
        }
        .search-box {
            flex: 1;
            min-width: 200px;
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 16px;
            gap: 10px;
        }
        .search-box i {
            color: var(--text-secondary);
        }
        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: 0.85rem;
            width: 100%;
            outline: none;
        }
        .search-box input::placeholder {
            color: var(--text-muted);
        }
        .btn-refresh {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 18px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-refresh:hover {
            background: rgba(59,130,246,0.2);
            color: var(--primary);
            border-color: var(--primary);
        }

        /* ========= 表格 ========= */
        .table-container {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid var(--border-glow);
            overflow-x: auto;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .admin-table th {
            text-align: left;
            padding: 16px 16px;
            color: var(--text-secondary);
            font-weight: 600;
            border-bottom: 1px solid var(--border-glow);
            background: rgba(0,0,0,0.2);
        }
        .admin-table td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.4);
            color: var(--text-primary);
        }
        .admin-table tr:hover td {
            background: rgba(59, 130, 246, 0.06);
        }
        .loading {
            text-align: center;
            padding: 48px !important;
            color: var(--text-secondary);
        }
        .loading i {
            margin-right: 8px;
        }

        /* 地址截斷 */
        .address-truncate {
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
            font-family: monospace;
        }

        /* 狀態徽章 */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-badge.status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #F59E0B;
        }
        .status-badge.status-approved {
            background: rgba(16, 185, 129, 0.2);
            color: #10B981;
        }
        .status-badge.status-rejected {
            background: rgba(239, 68, 68, 0.2);
            color: #EF4444;
        }

        /* 操作按鈕 */
        .action-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:hover {
            background: rgba(59,130,246,0.2);
            color: var(--primary);
            border-color: var(--primary);
        }
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ========= 分頁 ========= */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        /* ========= 模態框 ========= */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: #0F172A;
            border-radius: 28px;
            border: 1px solid var(--border-glow);
            width: 90%;
            max-width: 550px;
            max-height: 85vh;
            overflow: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-glow);
            position: sticky;
            top: 0;
            background: #0F172A;
        }
        .modal-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-header h2 i {
            color: var(--primary);
        }
        .modal-close {
            background: transparent;
            border: none;
            font-size: 1.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            line-height: 1;
        }
        .modal-close:hover {
            color: var(--danger);
        }
        .modal-body {
            padding: 24px;
        }
        .detail-row {
            display: flex;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.4);
        }
        .detail-row label {
            width: 100px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .detail-row span {
            flex: 1;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-primary);
            word-break: break-all;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 0.85rem;
            font-family: 'Inter', monospace;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        .tx-hash-input {
            font-family: monospace;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn-approve {
            flex: 1;
            background: linear-gradient(135deg, #10B981, #059669);
            border: none;
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-approve:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }
        .btn-reject {
            flex: 1;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 12px;
            color: #EF4444;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-reject:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        /* 操作類型切換 */
        .review-action-group {
            display: flex;
            gap: 24px;
            margin: 20px 0;
        }
        .review-action-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .review-action-group input[type="radio"] {
            accent-color: var(--primary);
        }

        /* ========= 響應式 ========= */
        @media (max-width: 768px) {
            .admin-layout {
                flex-direction: column;
            }
            .admin-sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }
            .admin-nav {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .admin-nav-item {
                flex: 0 0 auto;
            }
            .admin-content {
                padding: 20px;
            }
            .admin-header h1 {
                font-size: 1.2rem;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .filters-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-group {
                justify-content: space-between;
            }
            .detail-row {
                flex-direction: column;
            }
            .detail-row label {
                width: 100%;
                margin-bottom: 4px;
            }
        }
        @media (max-width: 550px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stat-card, .filters-bar, .table-container {
            animation: fadeSlideUp 0.4s ease forwards;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- 側邊導航欄 -->
        <aside class="admin-sidebar" id="sidebar-container"></aside>

        <script>
            fetch('/admin/components/sidebar.html')
                .then(res => res.text())
                .then(html => {
                    document.getElementById('sidebar-container').innerHTML = html;
                    const currentPath = window.location.pathname;
                    document.querySelectorAll('.admin-nav-item').forEach(link => {
                        if (link.getAttribute('href') === currentPath) {
                            link.classList.add('active');
                        }
                    });
                })
                .catch(err => console.error('加载侧边栏失败:', err));
        </script>

        <main class="admin-main">
            <header class="admin-header">
                <h1><i class="fas fa-arrow-up"></i> 提现审核</h1>
                <div class="admin-user">
                    <span id="adminName">管理员</span>
                    <button class="icon-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>

            <div class="admin-content">
                <div class="notification-bar" id="notificationBar" style="display: none;">
                    <i class="fas fa-bell"></i>
                    <span id="notificationMessage">有新的提现申请</span>
                    <button onclick="location.href='#pending'">查看</button>
                    <button class="close-btn" onclick="document.getElementById('notificationBar').style.display='none'"><i class="fas fa-times"></i></button>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="pendingCount">0</div>
                        <div class="stat-label">待审核</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="approvedCount">0</div>
                        <div class="stat-label">已通过</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="rejectedCount">0</div>
                        <div class="stat-label">已驳回</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="pendingAmount">0 USDT</div>
                        <div class="stat-label">待审核总额</div>
                    </div>
                </div>

                <div class="filters-bar">
                    <div class="filter-group">
                        <label>状态</label>
                        <select id="statusFilter" class="filter-select">
                            <option value="pending">待审核</option>
                            <option value="approved">已通过</option>
                            <option value="rejected">已驳回</option>
                            <option value="all">全部</option>
                        </select>
                    </div>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="搜索用户、UID、地址...">
                    </div>
                    <button class="btn-refresh" onclick="loadWithdrawals()">
                        <i class="fas fa-sync-alt"></i> 刷新
                    </button>
                </div>

                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>时间</th>
                                <th>用户</th>
                                <th>金额</th>
                                <th>手续费</th>
                                <th>到账</th>
                                <th>网络</th>
                                <th>提现地址</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="withdrawalTableBody">
                            <tr><td colspan="10" class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</td</tr>
                        </tbody>
                    </table>
                </div>

                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="reviewModal">
        <div class="modal">
            <div class="modal-header">
                <h2><i class="fas fa-gavel"></i> 审核提现</h2>
                <button class="modal-close" id="closeReviewModalBtn">&times;</button>
            </div>
            <div class="modal-body" id="reviewModalBody">
                <input type="hidden" id="reviewId">
                
                <div class="detail-row">
                    <label>用户信息</label>
                    <span id="reviewUser"></span>
                </div>
                <div class="detail-row">
                    <label>提现金额</label>
                    <span id="reviewAmount"></span>
                </div>
                <div class="detail-row">
                    <label>手续费</label>
                    <span>1 USDT</span>
                </div>
                <div class="detail-row">
                    <label>实际到账</label>
                    <span id="reviewNetAmount"></span>
                </div>
                <div class="detail-row">
                    <label>网络</label>
                    <span id="reviewNetwork"></span>
                </div>
                <div class="detail-row">
                    <label>提现地址</label>
                    <span id="reviewAddress" style="word-break: break-all;"></span>
                </div>
                <div class="detail-row">
                    <label>用户余额</label>
                    <span id="reviewBalance"></span>
                </div>

                <div id="approveSection">
                    <div class="form-group">
                        <label>交易哈希 (TxID) <span style="color: var(--danger);">*</span></label>
                        <input type="text" id="reviewTxHash" class="form-control tx-hash-input" placeholder="请输入区块链交易哈希">
                    </div>
                </div>

                <div id="rejectSection" style="display: none;">
                    <div class="form-group">
                        <label>拒绝原因 <span style="color: var(--danger);">*</span></label>
                        <textarea id="reviewRejectReason" class="form-control" rows="3" placeholder="请输入拒绝原因"></textarea>
                    </div>
                </div>

                <div class="review-action-group">
                    <label>
                        <input type="radio" name="reviewAction" value="approve" checked onclick="toggleReviewAction('approve')"> 通过
                    </label>
                    <label>
                        <input type="radio" name="reviewAction" value="reject" onclick="toggleReviewAction('reject')"> 拒绝
                    </label>
                </div>

                <div class="form-group">
                    <label>管理员备注</label>
                    <textarea id="adminNote" class="form-control" rows="2" placeholder="可选备注"></textarea>
                </div>

                <div class="action-buttons">
                    <button class="btn-approve" onclick="submitReview()">确认提交</button>
                    <button class="btn-reject" onclick="closeReviewModal()">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allWithdrawals = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadWithdrawals();
            
            const statusFilter = document.getElementById('statusFilter');
            const searchInput = document.getElementById('searchInput');
            
            if (statusFilter) statusFilter.addEventListener('change', filterWithdrawals);
            if (searchInput) searchInput.addEventListener('input', filterWithdrawals);
            
            const closeModalBtn = document.getElementById('closeReviewModalBtn');
            if (closeModalBtn) closeModalBtn.addEventListener('click', closeReviewModal);
            
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => window.location.href = '/admin/index.html');
            }
            
            const adminNameSpan = document.getElementById('adminName');
            const storedAdmin = localStorage.getItem('admin_name');
            if (storedAdmin) {
                adminNameSpan.textContent = storedAdmin;
            }
            
            const modal = document.getElementById('reviewModal');
            if (modal) {
                modal.addEventListener('click', function(e) {
                    if (e.target === modal) closeReviewModal();
                });
            }
        });

        async function adminRequest(endpoint, options = {}) {
            options.credentials = 'include';
            options.headers = { 'Content-Type': 'application/json', ...options.headers };
            const res = await fetch(endpoint, options);
            return res.json();
        }

        async function loadWithdrawals() {
            const tbody = document.getElementById('withdrawalTableBody');
            if (tbody) tbody.innerHTML = '<tr><td colspan="10" class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</td</tr>';
            
            try {
                const stats = await adminRequest('/api/v1/admin/withdraw/stats');
                if (stats.success) {
                    const pendingCount = document.getElementById('pendingCount');
                    const approvedCount = document.getElementById('approvedCount');
                    const rejectedCount = document.getElementById('rejectedCount');
                    const pendingAmount = document.getElementById('pendingAmount');
                    
                    if (pendingCount) pendingCount.textContent = stats.data.pending_count || 0;
                    if (approvedCount) approvedCount.textContent = stats.data.approved_count || 0;
                    if (rejectedCount) rejectedCount.textContent = stats.data.rejected_count || 0;
                    if (pendingAmount) pendingAmount.textContent = (stats.data.pending_amount || 0).toFixed(2) + ' USDT';
                }

                const res = await adminRequest('/api/v1/admin/withdraw/all');
                if (res.success) {
                    allWithdrawals = res.data;
                    filterWithdrawals();
                }
            } catch (err) {
                if (tbody) tbody.innerHTML = '<tr><td colspan="10" class="loading" style="color: #ef4444;">加载失败，请刷新重试</td</tr>';
            }
        }

        function filterWithdrawals() {
            const status = document.getElementById('statusFilter')?.value || 'all';
            const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
            
            let filtered = allWithdrawals;
            if (status !== 'all') {
                filtered = filtered.filter(w => w.status === status);
            }
            if (search) {
                filtered = filtered.filter(w => 
                    (w.username?.toLowerCase().includes(search) ||
                     w.uid?.toLowerCase().includes(search) ||
                     w.address?.toLowerCase().includes(search))
                );
            }
            renderTable(filtered);
        }

        function renderTable(list) {
            const tbody = document.getElementById('withdrawalTableBody');
            if (!tbody) return;
            
            if (list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="loading">暂无记录</td</tr>';
                return;
            }

            let html = '';
            list.forEach(w => {
                const date = new Date(w.created_at).toLocaleString();
                const statusClass = w.status === 'pending' ? 'status-pending' : 
                                   w.status === 'approved' ? 'status-approved' : 'status-rejected';
                const statusText = w.status === 'pending' ? '待审核' : 
                                  w.status === 'approved' ? '已通过' : '已驳回';
                
                const fee = w.fee !== undefined && w.fee !== null ? w.fee : 1;
const netAmount = w.net_amount !== undefined && w.net_amount !== null ? w.net_amount : (w.amount - fee);

html += `<tr>
    <td>${w.id}</td>
    <td>${date}</td>
    <td>${w.username || w.user_id}<br><small style="color: var(--text-muted);">UID: ${w.uid || '-'}</small></td>
    <td>${w.amount} USDT</td>
    <td>${fee} USDT</td>
    <td>${netAmount.toFixed(2)} USDT</td>
    <td>${w.network || '-'}</td>
    <td><span class="address-truncate" title="${w.address || ''}">${w.address || '-'}</span></td>
    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
    <td>${w.status === 'pending' ? `<button class="action-btn" onclick="openReviewModal(${w.id})"><i class="fas fa-gavel"></i> 审核</button>` : '<button class="action-btn" disabled style="opacity:0.5;"><i class="fas fa-check"></i> 已处理</button>'}
    </td>
</tr>`;
            });
            tbody.innerHTML = html;
        }

        async function openReviewModal(id) {
            try {
                const res = await adminRequest(`/api/v1/admin/withdraw/detail/${id}`);
                if (res.success) {
                    const w = res.data;
                    document.getElementById('reviewId').value = w.id;
                    document.getElementById('reviewUser').textContent = `${w.username} (UID: ${w.uid})`;
                    document.getElementById('reviewAmount').textContent = w.amount + ' USDT';
                    document.getElementById('reviewNetAmount').textContent = (w.amount - 1) + ' USDT';
                    document.getElementById('reviewNetwork').textContent = w.network || '-';
                    document.getElementById('reviewAddress').textContent = w.address || '-';
                    document.getElementById('reviewBalance').textContent = w.user_balance + ' USDT';
                    
                    document.getElementById('reviewTxHash').value = '';
                    document.getElementById('reviewRejectReason').value = '';
                    document.getElementById('adminNote').value = '';
                    
                    document.getElementById('approveSection').style.display = 'block';
                    document.getElementById('rejectSection').style.display = 'none';
                    const approveRadio = document.querySelector('input[name="reviewAction"][value="approve"]');
                    if (approveRadio) approveRadio.checked = true;
                    
                    document.getElementById('reviewModal').classList.add('show');
                }
            } catch (err) {
                alert('获取详情失败');
            }
        }

        function closeReviewModal() {
            document.getElementById('reviewModal').classList.remove('show');
        }

        function toggleReviewAction(action) {
            document.getElementById('approveSection').style.display = action === 'approve' ? 'block' : 'none';
            document.getElementById('rejectSection').style.display = action === 'reject' ? 'block' : 'none';
        }

        async function submitReview() {
            const id = document.getElementById('reviewId').value;
            const action = document.querySelector('input[name="reviewAction"]:checked')?.value;
            const adminNote = document.getElementById('adminNote').value;
            
            if (action === 'approve') {
                const txHash = document.getElementById('reviewTxHash').value.trim();
                if (!txHash) {
                    alert('请输入交易哈希');
                    return;
                }
                
                try {
                    const res = await adminRequest(`/api/v1/admin/withdraw/${id}/approve`, {
                        method: 'POST',
                        body: JSON.stringify({ tx_hash: txHash, admin_note: adminNote })
                    });
                    
                    if (res.success) {
                        alert('提现已通过');
                        closeReviewModal();
                        loadWithdrawals();
                    } else {
                        alert(res.message || '操作失败');
                    }
                } catch (err) {
                    alert('操作失败');
                }
            } else if (action === 'reject') {
                const reason = document.getElementById('reviewRejectReason').value.trim();
                if (!reason) {
                    alert('请输入拒绝原因');
                    return;
                }
                
                try {
                    const res = await adminRequest(`/api/v1/admin/withdraw/${id}/reject`, {
                        method: 'POST',
                        body: JSON.stringify({ admin_note: reason + (adminNote ? ` (${adminNote})` : '') })
                    });
                    
                    if (res.success) {
                        alert('提现已拒绝');
                        closeReviewModal();
                        loadWithdrawals();
                    } else {
                        alert(res.message || '操作失败');
                    }
                } catch (err) {
                    alert('操作失败');
                }
            }
        }
    </script>
</body>
</html>
