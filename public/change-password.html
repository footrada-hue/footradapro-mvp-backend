<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Change Password · FOOTRADA</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="/js/core/config.js"></script>
    <script src="/js/core/timezone.js"></script>
    <script src="/js/core/theme.js"></script>
    
    <!-- 核心样式系统 -->
    <link rel="stylesheet" href="/css/core/variables.css">
    <link rel="stylesheet" href="/css/core/layout.css">
    <link rel="stylesheet" href="/css/core/components.css">
    
    <style>
        /* 头部 */
        .header-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border-brand-light);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .back-btn:hover {
            border-color: var(--brand-500);
            color: var(--brand-500);
        }
        
        .page-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--brand-400));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .test-mode-badge {
            background: #2563EB;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 30px;
            margin-left: 8px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        /* 测试模式提示 */
        .test-hint {
            background: rgba(37, 99, 235, 0.08);
            border: 1px solid rgba(37, 99, 235, 0.25);
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #3b82f6;
            font-size: 13px;
        }
        
        .test-hint i {
            font-size: 18px;
        }
        
        /* 密码卡片 */
        .password-card {
            background: var(--bg-card);
            border: 1px solid var(--border-brand-light);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-brand-light);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.2s;
            padding-right: 45px;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--brand-500);
        }
        
        .form-input::placeholder {
            color: var(--text-tertiary);
        }
        
        .toggle-password {
            position: absolute;
            right: 14px;
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 16px;
            padding: 8px;
        }
        
        .toggle-password:hover {
            color: var(--brand-500);
        }
        
        /* 密码强度指示器 */
        .password-strength {
            margin-top: 10px;
        }
        
        .strength-bars {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
        }
        
        .strength-bar {
            height: 4px;
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 2px;
            transition: all 0.2s;
        }
        
        .strength-bar.active {
            background: var(--brand-500);
        }
        
        .strength-text {
            font-size: 11px;
            color: var(--text-tertiary);
        }
        
        .strength-text.weak { color: var(--danger-500); }
        .strength-text.medium { color: var(--warning-500); }
        .strength-text.strong { color: var(--success-500); }
        
        /* 密码规则 */
        .password-rules {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 14px 16px;
            margin-top: 20px;
        }
        
        .rule-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }
        
        .rule-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            font-size: 12px;
            color: var(--text-tertiary);
        }
        
        .rule-item i {
            width: 16px;
            font-size: 12px;
        }
        
        .rule-item.valid {
            color: var(--success-500);
        }
        
        .rule-item.valid i {
            color: var(--success-500);
        }
        
        .rule-item.invalid {
            color: var(--text-tertiary);
        }
        
        .rule-item.invalid i {
            color: var(--text-tertiary);
        }
        
        /* 提交按钮 */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--gradient-primary);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }
        
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--neon-glow);
        }
        
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 错误提示 */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--danger-500);
            font-size: 13px;
            display: none;
        }
        
        /* 成功提示 */
        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.25);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--success-500);
            font-size: 13px;
            display: none;
        }
        
        /* 提示信息 */
        .info-message {
            text-align: center;
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 16px;
        }
        
        .info-message a {
            color: var(--brand-500);
            text-decoration: none;
            font-weight: 600;
        }
        
        .info-message a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 480px) {
            .password-card {
                padding: 16px;
            }
            .form-input {
                padding: 12px 14px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-container">
            <div class="header-section">
                <a href="/settings.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h1 class="page-title">
                    Change Password
                    <span id="testModeBadge" class="test-mode-badge" style="display: none;">
                        <i class="fas fa-flask"></i> TEST
                    </span>
                </h1>
                <div style="width: 40px;"></div>
            </div>
            
            <!-- 测试模式提示 -->
            <div class="test-hint" id="testModeHint" style="display: none;">
                <i class="fas fa-flask"></i>
                <span>You are in Test Mode. Password change is disabled.</span>
                <!-- i18n: "change_password.test_mode" -->
            </div>
        </div>
    </header>

    <main class="content-scrollable">
        <div class="content-container">
            <!-- 错误提示 -->
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <!-- 成功提示 -->
            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle"></i>
                <span id="successText"></span>
            </div>

            <!-- 密码卡片 -->
            <div class="password-card">
                <form id="passwordForm" onsubmit="return false;">
                    <!-- 当前密码 -->
                    <div class="form-group">
                        <label class="form-label">Current Password</label>
                        <!-- i18n: "change_password.label.current" -->
                        <div class="input-wrapper">
                            <input type="password" id="currentPassword" class="form-input" placeholder="Enter current password" autocomplete="current-password">
                            <!-- i18n: "change_password.placeholder.current" -->
                            <button type="button" class="toggle-password" onclick="togglePassword('currentPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 新密码 -->
                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <!-- i18n: "change_password.label.new" -->
                        <div class="input-wrapper">
                            <input type="password" id="newPassword" class="form-input" placeholder="Enter new password" autocomplete="new-password">
                            <!-- i18n: "change_password.placeholder.new" -->
                            <button type="button" class="toggle-password" onclick="togglePassword('newPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        
                        <!-- 密码强度 -->
                        <div class="password-strength">
                            <div class="strength-bars">
                                <div class="strength-bar" id="strengthBar1"></div>
                                <div class="strength-bar" id="strengthBar2"></div>
                                <div class="strength-bar" id="strengthBar3"></div>
                                <div class="strength-bar" id="strengthBar4"></div>
                            </div>
                            <div class="strength-text" id="strengthText">Enter new password</div>
                            <!-- i18n: "change_password.strength.placeholder" -->
                        </div>
                    </div>

                    <!-- 确认新密码 -->
                    <div class="form-group">
                        <label class="form-label">Confirm New Password</label>
                        <!-- i18n: "change_password.label.confirm" -->
                        <div class="input-wrapper">
                            <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm new password" autocomplete="new-password">
                            <!-- i18n: "change_password.placeholder.confirm" -->
                            <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 密码规则 -->
                    <div class="password-rules">
                        <div class="rule-title">Password must contain:</div>
                        <!-- i18n: "change_password.rules.title" -->
                        <div class="rule-item" id="ruleLength">
                            <i class="fas fa-circle"></i>
                            <span>At least 8 characters</span>
                            <!-- i18n: "change_password.rules.length" -->
                        </div>
                        <div class="rule-item" id="ruleUppercase">
                            <i class="fas fa-circle"></i>
                            <span>At least 1 uppercase letter</span>
                            <!-- i18n: "change_password.rules.uppercase" -->
                        </div>
                        <div class="rule-item" id="ruleLowercase">
                            <i class="fas fa-circle"></i>
                            <span>At least 1 lowercase letter</span>
                            <!-- i18n: "change_password.rules.lowercase" -->
                        </div>
                        <div class="rule-item" id="ruleNumber">
                            <i class="fas fa-circle"></i>
                            <span>At least 1 number</span>
                            <!-- i18n: "change_password.rules.number" -->
                        </div>
                        <div class="rule-item" id="ruleMatch">
                            <i class="fas fa-circle"></i>
                            <span>Passwords match</span>
                            <!-- i18n: "change_password.rules.match" -->
                        </div>
                    </div>

                    <!-- 提交按钮 -->
                    <button type="submit" class="submit-btn" id="submitBtn" disabled>
                        <i class="fas fa-key"></i>
                        <span>Change Password</span>
                        <!-- i18n: "change_password.button" -->
                    </button>
                </form>
            </div>

            <!-- 提示信息 -->
            <div class="info-message">
                <i class="fas fa-info-circle"></i>
                Forgot your password? <a href="/forgot-password.html">Reset it here</a>
                <!-- i18n: "change_password.forgot_link" -->
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-container">
            <a href="/index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="/match-market.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Markets</span></a>
            <a href="/support.html" class="nav-item"><i class="fas fa-headset"></i><span>Support</span></a>
            <a href="/profile.html" class="nav-item active"><i class="fas fa-user"></i><span>Account</span></a>
        </div>
    </nav>

    <script src="/js/user/change-password.js"></script>
    <script src="/js/core/theme.js"></script>
    
    <script>
        // 切换密码可见性
        window.togglePassword = function(inputId) {
            const input = document.getElementById(inputId);
            const icon = event.currentTarget.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        };
        
        // 更新规则图标
        function updateRule(ruleId, isValid) {
            const rule = document.getElementById(ruleId);
            if (!rule) return;
            
            const icon = rule.querySelector('i');
            if (isValid) {
                rule.classList.add('valid');
                rule.classList.remove('invalid');
                icon.className = 'fas fa-check-circle';
            } else {
                rule.classList.add('invalid');
                rule.classList.remove('valid');
                icon.className = 'fas fa-circle';
            }
        }
        
        // 检查密码强度
        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const bars = [
                document.getElementById('strengthBar1'),
                document.getElementById('strengthBar2'),
                document.getElementById('strengthBar3'),
                document.getElementById('strengthBar4')
            ];
            const strengthText = document.getElementById('strengthText');
            
            const hasLength = password.length >= 8;
            const hasUppercase = /[A-Z]/.test(password);
            const hasLowercase = /[a-z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            
            updateRule('ruleLength', hasLength);
            updateRule('ruleUppercase', hasUppercase);
            updateRule('ruleLowercase', hasLowercase);
            updateRule('ruleNumber', hasNumber);
            
            let strength = 0;
            if (hasLength) strength++;
            if (hasUppercase) strength++;
            if (hasLowercase) strength++;
            if (hasNumber) strength++;
            
            bars.forEach((bar, index) => {
                if (index < strength) {
                    bar.classList.add('active');
                } else {
                    bar.classList.remove('active');
                }
            });
            
            if (password.length === 0) {
                strengthText.textContent = 'Enter new password';
                strengthText.className = 'strength-text';
            } else if (strength <= 2) {
                strengthText.textContent = 'Weak password';
                strengthText.className = 'strength-text weak';
            } else if (strength === 3) {
                strengthText.textContent = 'Medium password';
                strengthText.className = 'strength-text medium';
            } else {
                strengthText.textContent = 'Strong password';
                strengthText.className = 'strength-text strong';
            }
        }
        
        // 验证表单
        function validateForm() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            const isTestMode = window.ThemeManager ? ThemeManager.isTestMode : false;
            
            const passwordsMatch = newPassword === confirmPassword && newPassword.length > 0;
            updateRule('ruleMatch', passwordsMatch);
            
            const hasLength = newPassword.length >= 8;
            const hasUppercase = /[A-Z]/.test(newPassword);
            const hasLowercase = /[a-z]/.test(newPassword);
            const hasNumber = /[0-9]/.test(newPassword);
            
            const isValid = !isTestMode && 
                           currentPassword.length > 0 &&
                           hasLength && 
                           hasUppercase && 
                           hasLowercase && 
                           hasNumber && 
                           passwordsMatch;
            
            submitBtn.disabled = !isValid;
        }
        
        // 处理表单提交
        async function handleSubmit(event) {
            event.preventDefault();
            
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const errorMsg = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const successMsg = document.getElementById('successMessage');
            const successText = document.getElementById('successText');
            const submitBtn = document.getElementById('submitBtn');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            try {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
                
                const response = await fetch('/api/v1/user/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        currentPassword: currentPassword,
                        newPassword: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successText.textContent = 'Password changed successfully!';
                    successMsg.style.display = 'flex';
                    
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                    checkPasswordStrength();
                    
                    setTimeout(() => {
                        window.location.href = '/settings.html';
                    }, 2000);
                } else {
                    errorText.textContent = data.message || 'Failed to change password';
                    errorMsg.style.display = 'flex';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-key"></i><span>Change Password</span>';
                }
            } catch (err) {
                console.error('Change password error:', err);
                errorText.textContent = 'Network error, please try again';
                errorMsg.style.display = 'flex';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-key"></i><span>Change Password</span>';
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', async function() {
            if (window.ThemeManager) {
                await ThemeManager.init(true);
                const isTestMode = ThemeManager.isTestMode;
                const testModeBadge = document.getElementById('testModeBadge');
                const testModeHint = document.getElementById('testModeHint');
                const submitBtn = document.getElementById('submitBtn');
                const inputs = document.querySelectorAll('.form-input');
                
                if (testModeBadge) {
                    testModeBadge.style.display = isTestMode ? 'inline-flex' : 'none';
                }
                if (testModeHint) {
                    testModeHint.style.display = isTestMode ? 'flex' : 'none';
                }
                if (isTestMode) {
                    submitBtn.disabled = true;
                    inputs.forEach(input => input.disabled = true);
                }
            }
            
            const newPassword = document.getElementById('newPassword');
            const confirmPassword = document.getElementById('confirmPassword');
            const currentPassword = document.getElementById('currentPassword');
            
            if (newPassword) {
                newPassword.addEventListener('input', checkPasswordStrength);
                newPassword.addEventListener('input', validateForm);
            }
            if (confirmPassword) {
                confirmPassword.addEventListener('input', validateForm);
            }
            if (currentPassword) {
                currentPassword.addEventListener('input', validateForm);
            }
            
            document.getElementById('passwordForm').addEventListener('submit', handleSubmit);
        });
    </script>
</body>
</html>
