<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0B0E11" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#F8FAFC" media="(prefers-color-scheme: light)">
    <title>FAQ Detail · FOOTRADAPRO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 核心样式 -->
    <link rel="stylesheet" href="/css/core/variables.css">
    <link rel="stylesheet" href="/css/core/layout.css">
    <link rel="stylesheet" href="/css/core/components.css">
    
    <!-- 页面特有样式 -->
    <link rel="stylesheet" href="/css/pages/faq.css">
</head>
<body>
    <div class="page-header">
        <div class="top-nav">
            <button class="back-btn" onclick="history.back()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="page-title">FAQ Details</h1>
            <div style="width: 42px;"></div>
        </div>
    </div>

    <main class="content-scrollable">
        <div class="content-container">
            <!-- 問題區域 -->
            <div class="question-section">
                <div class="question-label">
                    <i class="fas fa-question-circle"></i> QUESTION
                </div>
                <div class="question-text" id="questionText">Loading...</div>
            </div>
            
            <!-- 答案區域 -->
            <div class="answer-section">
                <div class="answer-label">
                    <i class="fas fa-reply-all"></i> ANSWER
                </div>
                <div class="answer-content" id="answerContent">Loading answer...</div>
            </div>
            
            <!-- 操作按鈕 -->
            <div class="action-buttons">
                <a href="/support.html" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Back to Support
                </a>
                <a href="/support.html#contact" class="btn-support">
                    Contact Support <i class="fas fa-headset"></i>
                </a>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-container">
            <a href="/index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="/match-market.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Markets</span></a>
            <a href="/support.html" class="nav-item active"><i class="fas fa-headset"></i><span>Support</span></a>
            <a href="/profile.html" class="nav-item"><i class="fas fa-user"></i><span>Account</span></a>
        </div>
    </nav>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const question = decodeURIComponent(urlParams.get('q') || '');
        const answer = decodeURIComponent(urlParams.get('a') || '');
        
        document.getElementById('questionText').innerHTML = question || 'Question not found';
        document.getElementById('answerContent').innerHTML = answer || '<p>Answer not found. Please go back and try again.</p>';
        
        if (question) {
            document.title = `${question.substring(0, 50)} · FOOTRADAPRO`;
        }
    </script>
</body>
</html>
