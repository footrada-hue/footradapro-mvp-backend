<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0B0E11" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#F8FAFC" media="(prefers-color-scheme: light)">
    <title>历史报告 · FOOTRADAPRO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/css/historical-reports.css">
    <script src="/js/core/timezone.js"></script>
</head>
<body>

<!-- 极简滚动条 -->
<div class="ticker-strip" id="tickerStrip">
    <div class="ticker-content" id="tickerContent">
        <span class="ticker-item">⚡ 加载动态中...</span>
    </div>
</div>

<style>
.ticker-strip {
    width: 100%;
    height: 28px;
    background: linear-gradient(90deg, #1a1f2e, #0f1422);
    border-bottom: 1px solid rgba(251,191,36,0.2);
    overflow: hidden;
    white-space: nowrap;
    position: relative;
    font-size: 13px;
    line-height: 28px;
    color: #e2e8f0;
}

.ticker-content {
    display: inline-block;
    white-space: nowrap;
    animation: tickerMove 40s linear infinite;
    padding-left: 20px;
}

.ticker-item {
    display: inline-block;
    margin-right: 40px;
}

.ticker-item .auth { color: #fbbf24; }
.ticker-item .profit { color: #00e68a; }
.ticker-item .vip { color: #ff7a00; }
.ticker-item .system { color: #3b82f6; }

@keyframes tickerMove {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}
</style>

<script>
async function updateTicker() {
    try {
        const res = await fetch('/api/v1/ticker/recent');
        const data = await res.json();
        
        if (data.success && data.data.length > 0) {
            const items = data.data.map(msg => {
                if (msg.type === 'auth') {
                    return `<span class="ticker-item"><span class="auth">⚡ ${msg.display_name}</span> 授权 ${msg.amount} USDT</span>`;
                } else if (msg.type === 'profit') {
                    return `<span class="ticker-item"><span class="profit">💰 ${msg.display_name}</span> 盈利 +${msg.profit} USDT</span>`;
                } else if (msg.type === 'vip') {
                    return `<span class="ticker-item"><span class="vip">👑 ${msg.display_name}</span> ${msg.message}</span>`;
                } else {
                    return `<span class="ticker-item"><span class="system">📢</span> ${msg.message}</span>`;
                }
            }).join('');
            
            document.getElementById('tickerContent').innerHTML = items + items;
        }
    } catch (err) {
        console.error('更新滚动条失败:', err);
    }
}

updateTicker();
setInterval(updateTicker, 30000);
</script></body>
</html>
