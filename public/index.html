<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FOOTRADA · AI-Powered Football Trading</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Page Styles -->
    <link rel="stylesheet" href="/css/pages/index.css">
    
    <!-- Core Scripts -->
    <script src="/js/core/config.js"></script>
    <script src="/js/core/timezone.js"></script>
    <script src="/js/core/theme.js"></script>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <!-- Header -->
    <header class="app-header">
        <div class="header-container">
            <!-- Marquee Ticker -->
            <div class="ticker-bar" id="tickerBar" style="display: none;">
                <div class="ticker-icon"><i class="fas fa-circle-nodes"></i></div>
                <div class="ticker-wrapper">
                    <div class="ticker-messages" id="tickerMessages">Loading...</div>
                </div>
                <div class="ticker-stats"><span id="tickerVolume">0</span> USDT</div>
            </div>
            
            <!-- Main Header -->
            <div class="header-main">
                <div class="logo">FOOT<span>RADA</span></div>
                <div class="mode-indicator" id="modeIndicator">
                    <span class="mode-badge test-mode-badge" style="display: none;">
                        <i class="fas fa-flask"></i>
                        <span>Test Mode</span>
                        <span class="mode-balance">· Simulated 10,000 USDT</span>
                    </span>
                </div>
                <div class="mode-switch" id="modeSwitch">
                    <button class="mode-btn test-mode-btn" id="testModeBtn">
                        <i class="fas fa-flask"></i>
                        <span>Test</span>
                    </button>
                    <button class="mode-btn live-mode-btn" id="liveModeBtn">
                        <i class="fas fa-bolt"></i>
                        <span>Live</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="content-container" id="appRoot">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Loading...</p>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-container">
           <a href="/index.html" class="nav-item active">
    <i class="fas fa-home"></i>
    <span>Home</span>
</a>
            <a href="/match-market.html" class="nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Market</span>
            </a>
            <a href="/support.html" class="nav-item">
                <i class="fas fa-headset"></i>
                <span>Support</span>
            </a>
            <a href="/profile.html" class="nav-item">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </a>
        </div>
    </nav>

    <!-- Onboarding Modal -->
    <div id="onboardingOverlay" class="onboarding-overlay" style="display: none;">
        <div class="onboarding-card">
            <div class="onboarding-header">
                <div class="onboarding-step-dots">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
                <button class="onboarding-close" id="onboardingClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="onboarding-body">
                <div class="onboarding-icon" id="onboardingIcon"></div>
                <h3 id="onboardingTitle"></h3>
                <p id="onboardingDesc"></p>
            </div>
            <div class="onboarding-footer">
                <button class="onboarding-prev" id="onboardingPrev" style="display: none;">Back</button>
                <button class="onboarding-next" id="onboardingNext">Next</button>
                <button class="onboarding-skip" id="onboardingSkip">Skip</button>
            </div>
        </div>
        <div class="onboarding-highlight" id="onboardingHighlight"></div>
    </div>

    <!-- Main Controller -->
    <script src="/js/user/index_controller.js"></script>
</body>
</html>
