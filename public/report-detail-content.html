<!-- 
  report-detail-content.html - AI分析报告详情
  SPA 架构：只包含主内容区，样式与首页统一
  功能：显示AI生成的比赛分析报告
-->

<div class="report-detail-container">
  <!-- 模式指示器 -->
  <div class="mode-indicator">
    <i class="fa-solid fa-info-circle"></i>
    <span>Current Mode: </span>
    <span id="currentModeText" class="sandbox-mode-text">Sandbox</span>
    <span id="testModeBadge" class="test-badge-mode" style="display: none;">🧪 Test Mode</span>
  </div>

  <!-- 加载状态 -->
  <div id="loadingState" class="loading-state">
    <div class="loading-spinner"></div>
    <p>Loading AI analysis report...</p>
  </div>

  <!-- 错误状态 -->
  <div id="errorState" class="error-state" style="display: none;">
    <i class="fa-solid fa-circle-exclamation"></i>
    <p id="errorMessage">Failed to load report</p>
    <button class="retry-btn" onclick="location.reload()">Retry</button>
  </div>

  <!-- 报告内容 -->
  <div id="reportContent" style="display: none;">
    <!-- 比赛信息卡片 -->
    <div class="card">
      <div class="match-header">
        <div class="teams-container">
          <div class="team-block home-team-block">
            <div class="team-badge" id="homeCrest">
              <i class="fas fa-futbol"></i>
              <img id="homeImg" style="display: none;">
            </div>
            <span class="team-name" id="homeName">Home Team</span>
          </div>
          <span class="vs-divider">VS</span>
          <div class="team-block away-team-block">
            <span class="team-name" id="awayName">Away Team</span>
            <div class="team-badge" id="awayCrest">
              <i class="fas fa-futbol"></i>
              <img id="awayImg" style="display: none;">
            </div>
          </div>
        </div>
        <div class="match-score" id="matchScore">0 : 0</div>
        <div><span class="match-result win" id="matchResult" style="display: none;">WIN</span></div>
        <div class="match-meta">
          <span id="matchLeague"><i class="fas fa-trophy"></i> —</span>
          <span id="matchTime"><i class="far fa-calendar"></i> —</span>
          <span id="matchStatus"><i class="fas fa-flag-checkered"></i> —</span>
        </div>
      </div>
    </div>

    <!-- AI 分析报告卡片 -->
    <div class="card">
      <div class="card-header">
        <div class="card-title"><i class="fa-solid fa-file-alt"></i> AI Analysis Report</div>
      </div>
      <div class="report-text" id="reportText">
        Loading report content...
      </div>
      <div class="action-buttons">
        <button class="action-btn copy" id="copyBtn"><i class="fa-regular fa-copy"></i> Copy</button>
        <button class="action-btn download" id="downloadBtn"><i class="fa-solid fa-download"></i> Download</button>
      </div>
    </div>
  </div>
</div>

<style>
/* ========== 报告详情样式 ========== */
.report-detail-container {
  flex: 1;
  max-width: 680px;
  margin: 0 auto;
  padding: 24px;
  width: 100%;
}

/* 模式指示器 */
.mode-indicator {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--badge-soft);
  padding: 6px 16px;
  border-radius: 40px;
  font-size: 13px;
  margin-bottom: 20px;
  color: var(--text-secondary);
}

.mode-indicator .sandbox-mode-text { color: #8b5cf6; font-weight: 600; }
.mode-indicator .live-mode-text { color: #f97316; font-weight: 600; }

.test-badge-mode {
  background: linear-gradient(135deg, #8b5cf6, #6d28d9);
  color: white;
  padding: 4px 12px;
  border-radius: 40px;
  font-size: 11px;
  margin-left: 10px;
}

/* 卡片通用样式 */
.card {
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  border: 1px solid var(--glass-border);
  padding: 20px;
  margin-bottom: 16px;
  transition: all 0.2s ease;
}

.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-light);
}

.card-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-secondary);
}

.card-title i {
  font-size: 16px;
  color: var(--accent);
}

/* 比赛信息卡片 */
.match-header {
  text-align: center;
}

.teams-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.team-block {
  display: flex;
  align-items: center;
  gap: 12px;
}

.home-team-block {
  flex-direction: row;
}

.away-team-block {
  flex-direction: row;
}

.team-badge {
  width: 64px;
  height: 64px;
  background: var(--badge-soft);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  border: 2px solid var(--glass-border);
}

.team-badge i {
  font-size: 32px;
  color: var(--accent);
}

.team-badge img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.team-name {
  font-weight: 700;
  font-size: 16px;
  color: var(--text-primary);
}

.vs-divider {
  color: var(--accent);
  font-size: 14px;
  font-weight: 700;
  background: var(--badge-soft);
  padding: 6px 16px;
  border-radius: 40px;
}

.match-score {
  font-size: 32px;
  font-weight: 800;
  font-family: monospace;
  margin: 16px 0 8px;
  color: var(--text-primary);
}

.match-result {
  display: inline-block;
  padding: 4px 16px;
  border-radius: 40px;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 16px;
}

.match-result.win {
  background: rgba(16, 185, 129, 0.15);
  color: #10b981;
}

.match-result.loss {
  background: rgba(239, 68, 68, 0.15);
  color: #ef4444;
}

.match-result.draw {
  background: rgba(245, 158, 11, 0.15);
  color: #f59e0b;
}

.match-meta {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  color: var(--text-muted);
  font-size: 12px;
}

.match-meta i {
  margin-right: 6px;
}

/* 报告文本 */
.report-text {
  line-height: 1.8;
  font-size: 14px;
  color: var(--text-secondary);
  white-space: pre-wrap;
  word-break: break-word;
}

/* 操作按钮 */
.action-buttons {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}

.action-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px;
  border-radius: 40px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.action-btn.copy {
  background: var(--badge-soft);
  border: 1px solid var(--glass-border);
  color: var(--text-secondary);
}

.action-btn.download {
  background: var(--accent-gradient);
  color: white;
}

.action-btn.copy:hover {
  background: var(--accent);
  color: white;
  transform: translateY(-2px);
}

.action-btn.download:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}

/* 加载状态 */
.loading-state {
  text-align: center;
  padding: 60px 20px;
}

.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border-light);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* 错误状态 */
.error-state {
  text-align: center;
  padding: 60px 20px;
  background: var(--card-bg);
  border-radius: 20px;
}

.error-state i {
  font-size: 48px;
  color: var(--danger);
  margin-bottom: 16px;
}

.error-state p {
  color: var(--text-muted);
  margin-bottom: 20px;
}

.retry-btn {
  padding: 10px 24px;
  border-radius: 40px;
  background: var(--accent-gradient);
  color: white;
  font-weight: 600;
  border: none;
  cursor: pointer;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--success);
  color: white;
  padding: 10px 20px;
  border-radius: 40px;
  font-size: 13px;
  z-index: 9999;
  animation: fadeInUp 0.3s ease;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translate(-50%, 20px);
  }
  to {
    opacity: 1;
    transform: translate(-50%, 0);
  }
}

/* 响应式 */
@media (max-width: 768px) {
  .report-detail-container {
    padding: 16px;
  }
  
  .team-badge {
    width: 50px;
    height: 50px;
  }
  
  .team-badge i {
    font-size: 24px;
  }
  
  .team-name {
    font-size: 14px;
  }
  
  .vs-divider {
    padding: 4px 12px;
    font-size: 12px;
  }
  
  .match-score {
    font-size: 28px;
  }
}

@media (max-width: 480px) {
  .report-detail-container {
    padding: 12px;
  }
  
  .card {
    padding: 16px;
  }
  
  .teams-container {
    gap: 10px;
  }
  
  .team-block {
    gap: 8px;
  }
  
  .team-badge {
    width: 40px;
    height: 40px;
  }
  
  .team-badge i {
    font-size: 20px;
  }
  
  .team-name {
    font-size: 12px;
  }
  
  .vs-divider {
    padding: 2px 8px;
    font-size: 10px;
  }
  
  .match-score {
    font-size: 24px;
  }
  
  .match-meta {
    gap: 12px;
    font-size: 10px;
  }
  
  .action-buttons {
    flex-direction: column;
    gap: 10px;
  }
  
  .report-text {
    font-size: 13px;
  }
}
</style>

<script>
(function() {
  'use strict';

  const urlParams = new URLSearchParams(window.location.search);
  const matchId = urlParams.get('match_id');
  const authId = urlParams.get('auth_id');
  let currentData = null;

  // DOM 元素
  const loadingState = document.getElementById('loadingState');
  const errorState = document.getElementById('errorState');
  const errorMessage = document.getElementById('errorMessage');
  const reportContent = document.getElementById('reportContent');
  const currentModeText = document.getElementById('currentModeText');
  const testBadge = document.getElementById('testModeBadge');

  const homeImg = document.getElementById('homeImg');
  const awayImg = document.getElementById('awayImg');
  const homeName = document.getElementById('homeName');
  const awayName = document.getElementById('awayName');
  const homeCrest = document.getElementById('homeCrest');
  const awayCrest = document.getElementById('awayCrest');

  const matchScore = document.getElementById('matchScore');
  const matchResult = document.getElementById('matchResult');
  const matchLeague = document.getElementById('matchLeague');
  const matchTime = document.getElementById('matchTime');
  const matchStatus = document.getElementById('matchStatus');

  const reportText = document.getElementById('reportText');
  const copyBtn = document.getElementById('copyBtn');
  const downloadBtn = document.getElementById('downloadBtn');

  // 工具函数
  const escapeHtml = (str) => {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
  };

  const formatDateTime = (dateStr) => {
    if (!dateStr) return '-';
    try {
      const date = new Date(dateStr);
      if (isNaN(date.getTime())) return '-';
      return date.toLocaleString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    } catch { return '-'; }
  };

  const showToast = (message) => {
    const existingToast = document.querySelector('.toast');
    if (existingToast) existingToast.remove();
    
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = '<i class="fas fa-check-circle"></i> ' + message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  };

  // 更新模式 UI
  const updateModeUI = () => {
    if (!currentModeText) return;
    const isSandbox = window.ThemeManager ? window.ThemeManager.isTestMode : true;
    currentModeText.textContent = isSandbox ? 'Sandbox' : 'Live';
    currentModeText.className = isSandbox ? 'sandbox-mode-text' : 'live-mode-text';
    if (testBadge) {
      testBadge.style.display = isSandbox ? 'inline-flex' : 'none';
    }
  };

  // 渲染队徽
  const renderTeamLogo = (containerId, imgId, logoUrl) => {
    const container = document.getElementById(containerId);
    const img = document.getElementById(imgId);
    if (!container || !img) return;
    
    const defaultIcon = container.querySelector('i');
    
    if (logoUrl && logoUrl !== '/uploads/teams/default.png' && logoUrl !== '') {
      img.src = logoUrl;
      img.style.display = 'block';
      if (defaultIcon) defaultIcon.style.display = 'none';
      img.onerror = () => {
        img.style.display = 'none';
        if (defaultIcon) defaultIcon.style.display = 'flex';
      };
    } else {
      img.style.display = 'none';
      if (defaultIcon) defaultIcon.style.display = 'flex';
    }
  };

  // 渲染报告
  const renderReport = (data) => {
    currentData = data;
    
    homeName.textContent = data.home_team || 'Home';
    awayName.textContent = data.away_team || 'Away';
    
    // 队徽
    renderTeamLogo('homeCrest', 'homeImg', data.home_logo);
    renderTeamLogo('awayCrest', 'awayImg', data.away_logo);
    
    // 比分
    matchScore.textContent = `${data.home_score || 0} : ${data.away_score || 0}`;
    
    // 结果徽章
    if (data.home_score > data.away_score) {
      matchResult.textContent = 'WIN';
      matchResult.className = 'match-result win';
      matchResult.style.display = 'inline-block';
    } else if (data.home_score < data.away_score) {
      matchResult.textContent = 'LOSS';
      matchResult.className = 'match-result loss';
      matchResult.style.display = 'inline-block';
    } else if (data.home_score === data.away_score && data.home_score > 0) {
      matchResult.textContent = 'DRAW';
      matchResult.className = 'match-result draw';
      matchResult.style.display = 'inline-block';
    } else {
      matchResult.style.display = 'none';
    }
    
    matchLeague.innerHTML = `<i class="fas fa-trophy"></i> ${escapeHtml(data.league || 'Unknown League')}`;
    matchTime.innerHTML = `<i class="far fa-calendar"></i> ${formatDateTime(data.match_time)}`;
    matchStatus.innerHTML = `<i class="fas fa-flag-checkered"></i> ${data.status === 'completed' ? 'Completed' : (data.status || 'Unknown')}`;
    
    reportText.textContent = data.report_text || 'No report content available.';
  };

  const showError = (msg) => {
    if (errorMessage) errorMessage.textContent = msg;
    if (loadingState) loadingState.style.display = 'none';
    if (errorState) errorState.style.display = 'block';
  };

  // 复制报告
  const copyReport = () => {
    const text = reportText?.textContent;
    if (!text || text === 'Loading report content...') {
      showToast('No content to copy');
      return;
    }
    navigator.clipboard.writeText(text).then(() => {
      showToast('Report copied');
    }).catch(() => {
      showToast('Copy failed');
    });
  };

  // 下载报告
  const downloadReport = () => {
    const text = reportText?.textContent;
    if (!text || text === 'Loading report content...') {
      showToast('No content to download');
      return;
    }
    const blob = new Blob([text], { type: 'text/plain' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `footrada_report_${matchId || authId || 'report'}.txt`;
    link.click();
    URL.revokeObjectURL(link.href);
    showToast('Report downloaded');
  };

  // 加载报告数据
  const loadReport = async () => {
    if (!matchId && !authId) {
      showError('Missing match or authorization ID');
      return;
    }
    
    try {
      let apiUrl;
      if (matchId) {
        apiUrl = `/api/v1/matches/${matchId}/report`;
      } else {
        apiUrl = `/api/v1/user/authorize/${authId}/report`;
      }
      
      const response = await fetch(apiUrl, {
        credentials: 'include',
        cache: 'no-cache'
      });
      const result = await response.json();
      
      console.log('📡 Report API Response:', result);
      
      if (result.success && result.data) {
        loadingState.style.display = 'none';
        reportContent.style.display = 'block';
        renderReport(result.data);
      } else {
        throw new Error(result.error || 'Failed to load report');
      }
    } catch (err) {
      console.error('Failed to load report:', err);
      showError(err.message || 'Network error. Please try again.');
    }
  };

  // 监听模式切换
  const initModeListener = () => {
    if (window.ThemeManager) {
      ThemeManager.addListener(() => {
        updateModeUI();
      });
    }
  };

  // 绑定事件
  const bindEvents = () => {
    if (copyBtn) copyBtn.addEventListener('click', copyReport);
    if (downloadBtn) downloadBtn.addEventListener('click', downloadReport);
  };

  // 初始化
  const init = async () => {
    console.log('📋 Report Detail page initialized');
    
    if (window.ThemeManager) {
      await ThemeManager.init(true);
    }
    updateModeUI();
    initModeListener();
    bindEvents();
    
    await loadReport();
  };
  
  init();
})();
</script>
