<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>My Authorizations · FootRadaPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ========== 8px 网格系统 ========== */
    :root {
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-7: 28px;
      --space-8: 32px;
      
      --font-xs: 0.75rem;
      --font-sm: 0.875rem;
      --font-base: 1rem;
      --font-md: 1.125rem;
      --font-lg: 1.25rem;
      --font-xl: 1.5rem;
      
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 20px;
      --radius-xl: 24px;
      --radius-2xl: 28px;
      --radius-full: 9999px;
      
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-fast: 0.15s;
      --duration-base: 0.24s;
    }

    /* ========== 玻璃质感主题 ========== */
    :root {
      --bg-gradient-start: rgba(248, 250, 252, 0.95);
      --bg-gradient-end: rgba(241, 245, 249, 0.98);
      --glass-bg: rgba(255, 255, 255, 0.52);
      --glass-border: rgba(59, 130, 246, 0.12);
      --glass-shadow: 0 2px 8px rgba(0,0,0,0.02), 0 8px 24px rgba(0,0,0,0.03), inset 0 1px 0 rgba(255,255,255,0.9);
      --glass-shadow-hover: 0 8px 24px rgba(0,0,0,0.06), 0 16px 32px -12px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.95);
      --accent: #2563eb;
      --accent-glow: rgba(37,99,235,0.2);
      --accent-gradient: linear-gradient(135deg, #2563eb, #4f46e5);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #64748b;
      --border-light: rgba(148,163,184,0.12);
      --card-bg: rgba(255,255,255,0.65);
      --ticker-bg: rgba(37,99,235,0.9);
      --badge-soft: rgba(37,99,235,0.08);
    }

    body.dark {
      --bg-gradient-start: rgba(10,16,30,0.96);
      --bg-gradient-end: rgba(2,6,18,0.98);
      --glass-bg: rgba(20,28,44,0.55);
      --glass-border: rgba(59,130,246,0.2);
      --glass-shadow: 0 2px 8px rgba(0,0,0,0.2), 0 8px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.04);
      --glass-shadow-hover: 0 8px 24px rgba(0,0,0,0.35), 0 16px 32px -12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.3);
      --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
      --success: #34d399;
      --warning: #fbbf24;
      --danger: #f87171;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --card-bg: rgba(20,28,44,0.6);
    }

    body {
      background: radial-gradient(ellipse at 30% 40%, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: ''; position: fixed; top:0; left:0; width:100%; height:100%;
      background-image: repeating-linear-gradient(90deg, rgba(59,130,246,0.015) 0px, rgba(59,130,246,0.015) 1px, transparent 1px, transparent 40px),
                        repeating-linear-gradient(0deg, rgba(59,130,246,0.015) 0px, rgba(59,130,246,0.015) 1px, transparent 1px, transparent 40px);
      background-size: 40px 40px;
      pointer-events: none; z-index:0;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--border-light); border-radius: var(--radius-full); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: var(--radius-full); }

    .app-wrapper { position: relative; z-index:1; min-height:100vh; display: flex; flex-direction: column; }

    /* 跑马灯 */
    .ticker {
      background: var(--ticker-bg); backdrop-filter: blur(12px); color: white; padding: 10px 0; font-size: var(--font-sm); font-weight: 500;
      white-space: nowrap; overflow: hidden; border-bottom: 1px solid var(--glass-border);
    }
    .ticker-content { display: inline-block; animation: ticker 32s linear infinite; padding-left: 100%; letter-spacing: 0.3px; }
    @keyframes ticker { to { transform: translateX(-100%); } }

    /* 头部导航 */
    .header {
      background: var(--glass-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border);
      padding: var(--space-4) var(--space-6); position: sticky; top:0; z-index:50; box-shadow: var(--glass-shadow);
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: var(--space-3); }
    .logo-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .logo-text { font-size: var(--font-md); font-weight: 700; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .header-actions { display: flex; gap: var(--space-5); align-items: center; }
    .header-actions i { font-size: 20px; color: var(--text-secondary); cursor: pointer; transition: all var(--duration-fast) var(--ease-out); }
    .user-badge { width: 38px; height: 38px; border-radius: 50%; background: var(--badge-soft); backdrop-filter: blur(8px); color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 600; border: 1px solid var(--glass-border); }

    /* 主内容区 */
    .container { display: flex; flex:1; padding: var(--space-6); gap: var(--space-6); max-width: 900px; margin: 0 auto; width: 100%; }
    .content { flex:1; }

    /* 模式指示器 */
    .mode-indicator {
      display: inline-flex; align-items: center; gap: var(--space-2); background: var(--badge-soft); backdrop-filter: blur(8px);
      padding: 6px 16px; border-radius: var(--radius-full); width: fit-content; margin-bottom: var(--space-5);
      font-size: var(--font-sm);
    }
    .mode-indicator .sandbox-mode-text { color: #8b5cf6; font-weight: 600; }
    .mode-indicator .live-mode-text { color: #f97316; font-weight: 600; }

    /* 筛选标签 */
    .filter-tabs {
      display: flex; gap: var(--space-2); margin-bottom: var(--space-6); flex-wrap: wrap;
    }
    .filter-tab {
      background: var(--badge-soft); border: none; padding: 10px 24px; border-radius: var(--radius-full);
      color: var(--text-secondary); font-weight: 600; cursor: pointer; transition: all var(--duration-fast);
      font-size: var(--font-sm);
    }
    .filter-tab.active { background: var(--accent-gradient); color: white; box-shadow: 0 4px 12px var(--accent-glow); }

    /* 统计卡片 - 并排显示 */
    .stats-row {
      display: flex; gap: var(--space-4); margin-bottom: var(--space-6);
    }
    .stat-card {
      flex: 1; background: var(--card-bg); backdrop-filter: blur(24px); border-radius: var(--radius-lg);
      border: 1px solid var(--glass-border); padding: var(--space-4) var(--space-3); text-align: center;
      transition: all var(--duration-fast);
    }
    .stat-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .stat-number { font-size: var(--font-xl); font-weight: 700; color: var(--accent); line-height: 1.2; }
    .stat-label { font-size: var(--font-xs); color: var(--text-muted); margin-top: var(--space-1); }

    /* 授权卡片 - 带队徽 */
    .auth-card {
      background: var(--card-bg); backdrop-filter: blur(24px); border-radius: var(--radius-xl);
      border: 1px solid var(--glass-border); padding: var(--space-5); margin-bottom: var(--space-4);
      cursor: pointer; transition: all var(--duration-base);
    }
    .auth-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: var(--glass-shadow-hover); }

    /* 卡片头部 */
    .auth-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4); }
    .auth-league { display: flex; align-items: center; gap: var(--space-2); font-size: var(--font-xs); color: var(--text-muted); }
    .auth-status { font-size: var(--font-xs); font-weight: 600; padding: 4px 12px; border-radius: var(--radius-full); }
    .auth-status.active { background: rgba(249,115,22,0.15); color: #f97316; }
    .auth-status.won { background: rgba(16,185,129,0.15); color: #10b981; }
    .auth-status.loss { background: rgba(239,68,68,0.15); color: #ef4444; }

    /* 球队区域 - 带队徽 */
    .auth-teams {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4);
    }
    .team-with-logo {
      display: flex; flex-direction: column; align-items: center; gap: var(--space-2); flex: 1;
    }
    .team-logo-circle {
      width: 56px; height: 56px; background: var(--badge-soft); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border);
    }
    .team-logo-circle i { font-size: 28px; color: var(--accent); }
    .team-name { font-weight: 600; font-size: var(--font-sm); text-align: center; }
    .team-abbr { font-size: var(--font-xs); color: var(--text-muted); }
    .vs-badge { font-weight: 700; color: var(--accent); background: var(--badge-soft); padding: 4px 12px; border-radius: var(--radius-full); font-size: var(--font-xs); }

    /* 卡片底部 */
    .auth-footer {
      display: flex; justify-content: space-between; align-items: center; margin-top: var(--space-4);
      padding-top: var(--space-4); border-top: 1px solid var(--border-light);
    }
    .auth-amount { display: flex; align-items: center; gap: var(--space-2); font-size: var(--font-sm); font-weight: 600; }
    .auth-profit { font-size: var(--font-sm); font-weight: 600; }
    .auth-profit.positive { color: var(--success); }
    .auth-profit.negative { color: var(--danger); }
    .auth-profit.pending { color: var(--warning); }
    .auth-time { display: flex; align-items: center; gap: var(--space-2); font-size: var(--font-xs); color: var(--text-muted); margin-top: var(--space-3); }

    /* 加载状态 */
    .loading-state { text-align: center; padding: 60px; }
    .loading-spinner { width: 48px; height: 48px; border: 3px solid var(--border-light); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 60px; background: var(--card-bg); backdrop-filter: blur(20px); border-radius: var(--radius-2xl); }
    .empty-state i { font-size: 64px; color: var(--text-muted); margin-bottom: 16px; }

    /* 底部导航 */
    .bottom-nav { display: none; position: fixed; bottom:0; left:0; right:0; background: var(--card-bg); backdrop-filter: blur(24px); border-top: 1px solid var(--glass-border); padding: var(--space-3) var(--space-5); z-index:60; }
    .bottom-nav-items { display: flex; justify-content: space-around; max-width: 500px; margin:0 auto; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: var(--space-1); font-size: var(--font-xs); color: var(--text-muted); cursor: pointer; padding: var(--space-2) 0; transition: all var(--duration-fast); }
    .nav-item.active { color: var(--accent); }
    .nav-item i { font-size: 22px; }
    .nav-item:active { transform: scale(0.95); }

    /* 悬浮按钮 */
    .fab { position: fixed; bottom: 28px; right: 28px; width: 52px; height: 52px; border-radius: 50%; background: var(--accent-gradient); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px var(--accent-glow); z-index:55; cursor: pointer; transition: all var(--duration-fast); border: 1px solid rgba(255,255,255,0.2); }
    .fab:hover { transform: scale(1.05); }
    .fab:active { transform: scale(0.95); }

    /* ========== 响应式设计 ========== */
    @media (max-width: 768px) {
      .container { padding: var(--space-4); }
      .mode-indicator { padding: 4px 14px; font-size: var(--font-xs); margin-bottom: var(--space-4); }
      
      .filter-tab { padding: 8px 18px; font-size: var(--font-xs); }
      
      /* 统计卡片 - 移动端并排显示 */
      .stats-row { gap: var(--space-3); }
      .stat-card { padding: var(--space-3) var(--space-2); }
      .stat-number { font-size: var(--font-md); }
      .stat-label { font-size: 10px; }
      
      /* 授权卡片 - 移动端优化 */
      .auth-card { padding: var(--space-4); border-radius: var(--radius-lg); }
      
      .team-logo-circle { width: 48px; height: 48px; }
      .team-logo-circle i { font-size: 24px; }
      .team-name { font-size: var(--font-xs); }
      
      .auth-amount { font-size: var(--font-xs); }
      .auth-profit { font-size: var(--font-xs); }
      
      .bottom-nav { display: block; }
      body { padding-bottom: 70px; }
      .fab { bottom: 80px; right: 20px; width: 48px; height: 48px; }
      .fab i { font-size: 20px; }
    }

    @media (max-width: 480px) {
      .container { padding: var(--space-3); }
      
      .stats-row { gap: var(--space-2); }
      .stat-card { padding: var(--space-2); }
      .stat-number { font-size: var(--font-base); }
      
      .team-logo-circle { width: 40px; height: 40px; }
      .team-logo-circle i { font-size: 20px; }
      .team-name { font-size: 10px; }
      
      .vs-badge { padding: 2px 8px; font-size: 10px; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div class="ticker"><div class="ticker-content">⚡ FOOTRADA · AI-Powered Football Trading &nbsp;|&nbsp; 🔒 Trust Anchor Enabled &nbsp;|&nbsp; 🏆 World Cup 2026</div></div>

  <div class="header">
    <div class="logo"><div class="logo-icon">⚽</div><div class="logo-text">FootRadaPro</div></div>
    <div class="header-actions"><i class="fa-regular fa-moon" id="themeToggle"></i><div class="user-badge">EN</div></div>
  </div>

  <div class="container">
    <main class="content">
      <div class="mode-indicator">
        <i class="fa-solid fa-info-circle"></i>
        <span>Current Mode: </span>
        <span id="currentModeText" class="sandbox-mode-text">Sandbox</span>
      </div>

      <div class="filter-tabs">
        <button class="filter-tab active" data-status="all">All</button>
        <button class="filter-tab" data-status="pending">Active</button>
        <button class="filter-tab" data-status="settled">History</button>
      </div>

      <div class="stats-row" id="statsRow">
        <div class="stat-card"><div class="stat-number" id="pendingCount">0</div><div class="stat-label">Active</div></div>
        <div class="stat-card"><div class="stat-number" id="winCount">0</div><div class="stat-label">Won</div></div>
        <div class="stat-card"><div class="stat-number" id="lossCount">0</div><div class="stat-label">Loss</div></div>
      </div>

      <div id="loadingState" class="loading-state">
        <div class="loading-spinner"></div>
        <p>Loading authorizations...</p>
      </div>

      <div id="emptyState" class="empty-state" style="display: none;">
        <i class="fa-solid fa-futbol"></i>
        <p>No authorizations found</p>
      </div>

      <div id="listContainer"></div>

      <div id="loadMore" class="load-more" style="display: none;">
        <button class="load-more-btn" id="loadMoreBtn">Load More</button>
      </div>
    </main>
  </div>

  <div class="bottom-nav">
    <div class="bottom-nav-items">
      <div class="nav-item" data-nav="home"><i class="fa-solid fa-home"></i><span>Home</span></div>
      <div class="nav-item" data-nav="market"><i class="fa-solid fa-chart-line"></i><span>Market</span></div>
      <div class="nav-item active" data-nav="records"><i class="fa-solid fa-list"></i><span>Records</span></div>
      <div class="nav-item" data-nav="support"><i class="fa-solid fa-headset"></i><span>Support</span></div>
      <div class="nav-item" data-nav="profile"><i class="fa-solid fa-user"></i><span>Profile</span></div>
    </div>
  </div>

  <div class="fab" onclick="alert('Support: contact via Telegram')"><i class="fa-solid fa-comment-dots"></i></div>
</div>

<script>
  // 模拟数据（带队徽占位）
  const mockAuthorizations = [
    { id: 1, auth_id: 'A1001', home_team: 'Liverpool', away_team: 'Manchester City', league: 'Premier League', amount: 200, profit: 0, status: 'pending', created_at: new Date(Date.now() - 2 * 3600000).toISOString() },
    { id: 2, auth_id: 'A1002', home_team: 'Real Madrid', away_team: 'Barcelona', league: 'La Liga', amount: 300, profit: 45.20, status: 'settled', created_at: new Date(Date.now() - 24 * 3600000).toISOString() },
    { id: 3, auth_id: 'A1003', home_team: 'Bayern Munich', away_team: 'Borussia Dortmund', league: 'Bundesliga', amount: 150, profit: 22.50, status: 'settled', created_at: new Date(Date.now() - 48 * 3600000).toISOString() },
    { id: 4, auth_id: 'A1004', home_team: 'Paris SG', away_team: 'Olympique Marseille', league: 'Ligue 1', amount: 500, profit: -30.00, status: 'settled', created_at: new Date(Date.now() - 72 * 3600000).toISOString() }
  ];

  let currentStatus = 'all';
  let items = [...mockAuthorizations];

  function getAppMode() { return localStorage.getItem('appMode') || 'sandbox'; }
  function getThemeMode() { return localStorage.getItem('theme') || 'light'; }

  function updateThemeUI() {
    const theme = getThemeMode();
    if (theme === 'dark') document.body.classList.add('dark');
    else document.body.classList.remove('dark');
    const icon = document.getElementById('themeToggle');
    if (icon) {
      if (theme === 'dark') { icon.classList.remove('fa-moon'); icon.classList.add('fa-sun'); }
      else { icon.classList.remove('fa-sun'); icon.classList.add('fa-moon'); }
    }
  }

  function updateModeUI() {
    const isSandbox = getAppMode() === 'sandbox';
    const modeText = document.getElementById('currentModeText');
    if (modeText) {
      modeText.textContent = isSandbox ? 'Sandbox' : 'Live';
      modeText.className = isSandbox ? 'sandbox-mode-text' : 'live-mode-text';
    }
  }

  function getTeamLogoHtml(teamName) {
    // 简单队徽映射，实际使用时替换为真实图片URL
    const logoMap = {
      'Liverpool': 'fa-futbol',
      'Manchester City': 'fa-futbol',
      'Real Madrid': 'fa-futbol',
      'Barcelona': 'fa-futbol',
      'Bayern Munich': 'fa-futbol',
      'Borussia Dortmund': 'fa-futbol',
      'Paris SG': 'fa-futbol',
      'Olympique Marseille': 'fa-futbol'
    };
    const icon = logoMap[teamName] || 'fa-futbol';
    return `<i class="fas ${icon}"></i>`;
  }

  function renderAuthCard(item) {
    const date = new Date(item.created_at);
    const dateStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
    const isPending = item.status === 'pending';
    const isWin = item.profit > 0;
    const profitClass = isPending ? 'pending' : (isWin ? 'positive' : 'negative');
    const profitText = isPending ? 'Pending' : (isWin ? `+${item.profit.toFixed(2)}` : `${item.profit.toFixed(2)}`);
    const statusClass = isPending ? 'active' : (isWin ? 'won' : 'loss');
    const statusText = isPending ? 'Active' : (isWin ? 'Won' : 'Loss');
    const currency = 'USDT';

    return `
      <div class="auth-card" onclick="location.href='/transaction-detail.html?authId=${item.auth_id}'">
        <div class="auth-header">
          <div class="auth-league"><i class="fas fa-trophy"></i> ${item.league}</div>
          <div class="auth-status ${statusClass}">${statusText}</div>
        </div>
        <div class="auth-teams">
          <div class="team-with-logo">
            <div class="team-logo-circle">${getTeamLogoHtml(item.home_team)}</div>
            <div class="team-name">${item.home_team}</div>
            <div class="team-abbr">${item.home_team.substring(0, 3).toUpperCase()}</div>
          </div>
          <div class="vs-badge">VS</div>
          <div class="team-with-logo">
            <div class="team-logo-circle">${getTeamLogoHtml(item.away_team)}</div>
            <div class="team-name">${item.away_team}</div>
            <div class="team-abbr">${item.away_team.substring(0, 3).toUpperCase()}</div>
          </div>
        </div>
        <div class="auth-footer">
          <div class="auth-amount"><i class="fas fa-coins"></i> ${item.amount} ${currency}</div>
          <div class="auth-profit ${profitClass}">${profitText}</div>
        </div>
        <div class="auth-time"><i class="far fa-clock"></i> ${dateStr}</div>
      </div>
    `;
  }

  function renderList() {
    let filtered = items;
    if (currentStatus === 'pending') filtered = items.filter(i => i.status === 'pending');
    if (currentStatus === 'settled') filtered = items.filter(i => i.status === 'settled');

    const pendingCount = items.filter(i => i.status === 'pending').length;
    const winCount = items.filter(i => i.status === 'settled' && i.profit > 0).length;
    const lossCount = items.filter(i => i.status === 'settled' && i.profit < 0).length;

    document.getElementById('pendingCount').textContent = pendingCount;
    document.getElementById('winCount').textContent = winCount;
    document.getElementById('lossCount').textContent = lossCount;

    const container = document.getElementById('listContainer');
    const emptyState = document.getElementById('emptyState');
    const loadMore = document.getElementById('loadMore');

    if (filtered.length === 0) {
      container.innerHTML = '';
      emptyState.style.display = 'block';
      loadMore.style.display = 'none';
    } else {
      emptyState.style.display = 'none';
      container.innerHTML = filtered.map(i => renderAuthCard(i)).join('');
      loadMore.style.display = 'none';
    }
    document.getElementById('loadingState').style.display = 'none';
  }

  function switchTab(status) {
    currentStatus = status;
    document.querySelectorAll('.filter-tab').forEach(tab => {
      if (tab.dataset.status === status) tab.classList.add('active');
      else tab.classList.remove('active');
    });
    renderList();
  }

  // 主题切换
  document.getElementById('themeToggle')?.addEventListener('click', () => {
    const newTheme = getThemeMode() === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', newTheme);
    window.dispatchEvent(new CustomEvent('themeChanged', { detail: { theme: newTheme } }));
    updateThemeUI();
  });

  // 监听全局状态
  window.addEventListener('appModeChanged', () => updateModeUI());
  window.addEventListener('themeChanged', () => updateThemeUI());

  // 底部导航
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      const nav = item.dataset.nav;
      if (nav === 'home') window.location.href = '/index.html';
      if (nav === 'market') window.location.href = '/match-market.html';
      if (nav === 'records') window.location.href = '/authorizations.html';
      if (nav === 'support') window.location.href = '/support.html';
      if (nav === 'profile') window.location.href = '/profile.html';
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
    });
  });

  // 筛选事件
  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => switchTab(tab.dataset.status));
  });

  // 初始化
  (function init() {
    updateThemeUI();
    updateModeUI();
    setTimeout(() => { renderList(); }, 500);
  })();
</script>
</body>
</html>
