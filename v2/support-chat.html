<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Live Chat · FootRadaPro</title>
  <meta name="description" content="Chat with our support team in real-time">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-7: 32px;
      
      --font-xs: 0.75rem;
      --font-sm: 0.875rem;
      --font-base: 1rem;
      --font-md: 1.125rem;
      --font-lg: 1.25rem;
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-2xl: 24px;
      --radius-full: 9999px;
      
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-fast: 0.15s;
      --duration-base: 0.24s;
      
      --bg-primary: #FFFFFF;
      --bg-secondary: #F7F9FC;
      --bg-tertiary: #EFF2F8;
      --border-light: #E5E9F0;
      --text-primary: #1A1A2E;
      --text-secondary: #4A4A6A;
      --text-muted: #8A8AAE;
      --accent: #0066FF;
      --accent-glow: rgba(0,102,255,0.1);
      --accent-gradient: linear-gradient(135deg, #0066FF, #0052CC);
      --success: #00A86B;
      --user-message-bg: linear-gradient(135deg, #0066FF, #0052CC);
      --user-message-text: #FFFFFF;
      --admin-message-bg: #F0F2F5;
      --admin-message-text: #1A1A2E;
    }

    body.dark {
      --bg-primary: #0F172A;
      --bg-secondary: #1E293B;
      --bg-tertiary: #334155;
      --border-light: #334155;
      --text-primary: #F1F5F9;
      --text-secondary: #CBD5E1;
      --text-muted: #94A3B8;
      --accent: #3B82F6;
      --accent-glow: rgba(59,130,246,0.15);
      --user-message-bg: linear-gradient(135deg, #3B82F6, #8B5CF6);
      --admin-message-bg: #2D3A4F;
      --admin-message-text: #F1F5F9;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* 聊天容器 */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 1000px;
      margin: 0 auto;
      background: var(--bg-primary);
    }

    /* 头部 */
    .chat-header {
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-light);
      padding: var(--space-4) var(--space-6);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-info {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .support-avatar {
      width: 44px;
      height: 44px;
      background: var(--accent-gradient);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .support-avatar i { font-size: 22px; color: white; }
    .header-text h2 { font-size: var(--font-md); font-weight: 600; margin-bottom: 2px; }
    .status-badge {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--font-xs);
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--success);
    }
    .status-offline .status-dot { background: var(--text-muted); }
    .header-actions { display: flex; gap: var(--space-4); }
    .header-actions i { font-size: 20px; color: var(--text-muted); cursor: pointer; transition: all var(--duration-fast); }
    .header-actions i:hover { color: var(--accent); }

    /* 消息区域 */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-5) var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    .messages-area::-webkit-scrollbar { width: 5px; }
    .messages-area::-webkit-scrollbar-track { background: var(--border-light); border-radius: var(--radius-full); }
    .messages-area::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: var(--radius-full); }

    /* 消息气泡 */
    .message {
      display: flex;
      animation: messageIn 0.2s ease;
    }
    @keyframes messageIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .user-message { justify-content: flex-end; }
    .admin-message { justify-content: flex-start; }
    .system-message { justify-content: center; }
    .message-bubble {
      max-width: 75%;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-xl);
      position: relative;
    }
    .user-message .message-bubble {
      background: var(--user-message-bg);
      color: var(--user-message-text);
      border-bottom-right-radius: var(--radius-sm);
    }
    .admin-message .message-bubble {
      background: var(--admin-message-bg);
      color: var(--admin-message-text);
      border-bottom-left-radius: var(--radius-sm);
    }
    .system-message .message-bubble {
      background: var(--bg-tertiary);
      color: var(--text-muted);
      font-size: var(--font-xs);
      padding: var(--space-2) var(--space-4);
    }
    .message-time {
      font-size: 10px;
      opacity: 0.6;
      margin-top: var(--space-1);
      text-align: right;
    }
    .admin-message .message-time { text-align: left; }

    /* 图片附件 */
    .image-attachment {
      margin-top: var(--space-2);
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: pointer;
    }
    .image-attachment img {
      max-width: 200px;
      max-height: 150px;
      object-fit: cover;
      transition: transform var(--duration-fast);
    }
    .image-attachment img:hover { transform: scale(1.02); }
    .file-attachment {
      margin-top: var(--space-2);
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background: rgba(0,0,0,0.05);
      border-radius: var(--radius-md);
    }
    .file-link { color: inherit; text-decoration: none; font-size: var(--font-sm); }
    .file-link:hover { text-decoration: underline; }

    /* 空状态 */
    .empty-message {
      text-align: center;
      padding: var(--space-10);
      color: var(--text-muted);
    }
    .empty-icon { font-size: 48px; display: block; margin-bottom: var(--space-4); }

    /* 输入区域 */
    .input-area {
      background: var(--bg-primary);
      border-top: 1px solid var(--border-light);
      padding: var(--space-4) var(--space-6);
      flex-shrink: 0;
    }
    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: var(--space-3);
      background: var(--bg-secondary);
      border-radius: var(--radius-2xl);
      padding: var(--space-2) var(--space-3);
      border: 1px solid var(--border-light);
      transition: all var(--duration-fast);
    }
    .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .input-actions {
      display: flex;
      gap: var(--space-2);
      align-items: center;
    }
    .action-btn {
      background: none; border: none; width: 36px; height: 36px;
      border-radius: 50%; cursor: pointer; color: var(--text-muted);
      transition: all var(--duration-fast); font-size: 18px;
    }
    .action-btn:hover { background: var(--bg-tertiary); color: var(--accent); }
    .message-input {
      flex: 1;
      background: none;
      border: none;
      padding: var(--space-2) 0;
      color: var(--text-primary);
      font-size: var(--font-sm);
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 100px;
    }
    .send-btn {
      background: var(--accent-gradient);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      color: white;
      transition: all var(--duration-fast);
    }
    .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px var(--accent-glow); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* 打字指示器 */
    .typing-indicator {
      padding: var(--space-2) var(--space-4);
      background: var(--admin-message-bg);
      border-radius: var(--radius-xl);
      width: fit-content;
      font-size: var(--font-xs);
      color: var(--text-muted);
      margin-bottom: var(--space-2);
    }
    .typing-dots { display: inline-flex; gap: 4px; margin-left: 6px; }
    .typing-dots span {
      width: 6px; height: 6px; background: var(--accent);
      border-radius: 50%; animation: typingDot 1.4s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }

    /* Emoji 选择器 */
    .emoji-picker {
      position: absolute;
      bottom: 70px;
      right: 20px;
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xl);
      box-shadow: var(--glass-shadow);
      width: 280px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .emoji-category-title { font-size: var(--font-xs); font-weight: 600; padding: var(--space-2) var(--space-3); color: var(--text-muted); }
    .emoji-list { display: flex; flex-wrap: wrap; gap: var(--space-2); padding: var(--space-2) var(--space-3); }
    .emoji-item {
      font-size: 24px; cursor: pointer; padding: var(--space-1); border-radius: var(--radius-sm);
      transition: all var(--duration-fast);
    }
    .emoji-item:hover { background: var(--bg-tertiary); transform: scale(1.1); }

    /* 移动端适配 */
    @media (max-width: 768px) {
      .chat-header { padding: var(--space-3) var(--space-4); }
      .messages-area { padding: var(--space-3) var(--space-4); }
      .input-area { padding: var(--space-3) var(--space-4); }
      .message-bubble { max-width: 85%; }
      .image-attachment img { max-width: 150px; }
    }
  </style>
</head>
<body>
<div class="chat-container">
  <!-- 头部 -->
  <div class="chat-header">
    <div class="header-info">
      <div class="support-avatar"><i class="fas fa-headset"></i></div>
      <div class="header-text">
        <h2>Support Team</h2>
        <div class="status-badge" id="connectionStatus">
          <span class="status-dot"></span>
          <span>Connecting...</span>
        </div>
      </div>
    </div>
    <div class="header-actions">
      <i class="fas fa-phone-alt" onclick="alert('Call support: +1 888 123 4567')"></i>
      <i class="fas fa-ellipsis-v" onclick="alert('More options coming soon')"></i>
    </div>
  </div>

  <!-- 消息区域 -->
  <div class="messages-area" id="messagesContainer">
    <div class="empty-message">
      <span class="empty-icon">💬</span>
      <p>Loading messages...</p>
    </div>
  </div>

  <!-- 打字指示器 -->
  <div id="typingIndicator" class="typing-indicator" style="display: none; margin: 0 var(--space-6);">
    <span>Support is typing</span>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>

  <!-- 输入区域 -->
  <div class="input-area">
    <div class="input-wrapper">
      <div class="input-actions">
        <button class="action-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
        <button class="action-btn" id="emojiBtn"><i class="fas fa-smile"></i></button>
      </div>
      <textarea id="messageInput" class="message-input" rows="1" placeholder="Type your message..."></textarea>
      <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
    <input type="file" id="fileInput" style="display: none;" accept="image/*,.pdf,.txt">
  </div>
</div>

<script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
<script>
  // ==================== 简化版聊天控制器（与 support-chat.js 配套） ====================
  class SupportChat {
    constructor() {
      this.convId = null;
      this.userId = null;
      this.socket = null;
      this.isConnected = false;
      this.isSending = false;
      
      this.messagesContainer = document.getElementById('messagesContainer');
      this.messageInput = document.getElementById('messageInput');
      this.sendBtn = document.getElementById('sendBtn');
      this.fileInput = document.getElementById('fileInput');
      this.attachBtn = document.getElementById('attachBtn');
      this.emojiBtn = document.getElementById('emojiBtn');
      
      this.init();
    }
    
    async init() {
      console.log('[Chat] Initializing...');
      this.showLoading();
      
      try {
        // 模拟初始化（实际调用 API）
        this.convId = 'conv_' + Date.now();
        this.userId = 'user_' + Math.random().toString(36).substr(2, 8);
        
        // 模拟欢迎消息
        const welcomeMsg = {
          id: 'welcome',
          content: '👋 Hello! Welcome to FootRadaPro Support. How can we help you today?',
          sender_type: 'admin',
          created_at: new Date().toISOString()
        };
        this.renderMessages([welcomeMsg]);
        this.updateConnectionStatus(true);
        
        this.bindEvents();
        this.initEmojiPicker();
        
        // 自动调整输入框高度
        this.messageInput.addEventListener('input', () => this.autoResizeTextarea());
      } catch (error) {
        console.error('[Chat] Init error:', error);
        this.showError();
      }
    }
    
    updateConnectionStatus(connected) {
      const statusEl = document.getElementById('connectionStatus');
      if (statusEl) {
        if (connected) {
          statusEl.innerHTML = '<span class="status-dot"></span><span>Online</span>';
          statusEl.classList.remove('status-offline');
        } else {
          statusEl.innerHTML = '<span class="status-dot"></span><span>Offline</span>';
          statusEl.classList.add('status-offline');
        }
      }
    }
    
    renderMessages(messages) {
      if (!this.messagesContainer) return;
      if (!messages || messages.length === 0) {
        this.messagesContainer.innerHTML = '<div class="empty-message"><span class="empty-icon">💬</span><p>No messages yet. Send your first message!</p></div>';
        return;
      }
      
      this.messagesContainer.innerHTML = messages.map(msg => this.formatMessage(msg)).join('');
      this.scrollToBottom();
    }
    
    formatMessage(msg) {
      const isUser = msg.sender_type === 'user';
      const isSystem = msg.sender_type === 'system';
      const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      
      let senderClass = 'admin-message';
      if (isUser) senderClass = 'user-message';
      if (isSystem) senderClass = 'system-message';
      
      return `
        <div class="message ${senderClass}" data-message-id="${msg.id || ''}">
          <div class="message-bubble">
            <div class="message-content">${this.escapeHtml(msg.content)}</div>
            <div class="message-time">${time}</div>
          </div>
        </div>
      `;
    }
    
    appendMessage(message) {
      const messageHtml = this.formatMessage(message);
      this.messagesContainer.insertAdjacentHTML('beforeend', messageHtml);
      this.scrollToBottom();
    }
    
    async sendMessage() {
      if (this.isSending) return;
      
      const content = this.messageInput.value.trim();
      if (!content) return;
      
      this.isSending = true;
      this.sendBtn.disabled = true;
      
      const tempMessage = {
        id: 'temp_' + Date.now(),
        content: content,
        sender_type: 'user',
        created_at: new Date().toISOString()
      };
      this.appendMessage(tempMessage);
      this.messageInput.value = '';
      this.autoResizeTextarea();
      
      // 模拟 AI 回复
      setTimeout(() => {
        this.isSending = false;
        this.sendBtn.disabled = false;
        
        const reply = {
          id: 'reply_' + Date.now(),
          content: this.getAutoReply(content),
          sender_type: 'admin',
          created_at: new Date().toISOString()
        };
        this.appendMessage(reply);
        this.removeTempMessage(tempMessage.id);
      }, 1000);
    }
    
    getAutoReply(message) {
      const lowerMsg = message.toLowerCase();
      if (lowerMsg.includes('hello') || lowerMsg.includes('hi')) {
        return 'Hello! How can I assist you today?';
      }
      if (lowerMsg.includes('deposit')) {
        return 'To deposit funds, go to the Deposit page and select your preferred network. Minimum deposit is 10 USDT.';
      }
      if (lowerMsg.includes('withdraw')) {
        return 'Withdrawals can be made from the Withdraw page. Fee is 1 USDT, processing takes 1-2 hours.';
      }
      if (lowerMsg.includes('authorization')) {
        return 'One-Click Authorization is our core feature. Simply select a match and click Authorize - the AI will handle the rest!';
      }
      return 'Thank you for your message. Our support team will get back to you shortly. Is there anything specific I can help with?';
    }
    
    removeTempMessage(tempId) {
      const tempEl = document.querySelector(`.message[data-message-id="${tempId}"]`);
      if (tempEl) tempEl.remove();
    }
    
    autoResizeTextarea() {
      this.messageInput.style.height = 'auto';
      this.messageInput.style.height = Math.min(this.messageInput.scrollHeight, 100) + 'px';
    }
    
    scrollToBottom() {
      if (this.messagesContainer) {
        this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
      }
    }
    
    showLoading() {
      if (this.messagesContainer) {
        this.messagesContainer.innerHTML = '<div class="empty-message"><div class="typing-dots" style="justify-content: center;"><span></span><span></span><span></span></div><p>Connecting to support...</p></div>';
      }
    }
    
    showError() {
      if (this.messagesContainer) {
        this.messagesContainer.innerHTML = '<div class="empty-message"><span class="empty-icon">⚠️</span><p>Failed to load chat. Please refresh the page.</p></div>';
      }
    }
    
    handleFileSelect() {
      const file = this.fileInput.files[0];
      if (!file) return;
      if (file.size > 10 * 1024 * 1024) {
        alert('File size cannot exceed 10MB');
        return;
      }
      this.messageInput.value = `[File] ${file.name}`;
      this.sendMessage();
      this.fileInput.value = '';
    }
    
    handlePaste(event) {
      const items = event.clipboardData.items;
      for (const item of items) {
        if (item.type.indexOf('image') !== -1) {
          event.preventDefault();
          alert('Image pasting will be available soon. Please use the attach button.');
          break;
        }
      }
    }
    
    initEmojiPicker() {
      if (!this.emojiBtn) return;
      
      // 创建 emoji 选择器
      const picker = document.createElement('div');
      picker.className = 'emoji-picker';
      picker.id = 'emojiPicker';
      picker.innerHTML = `
        <div class="emoji-category-title">Common Emojis</div>
        <div class="emoji-list">
          😊, 😂, 🥰, 😍, 😎, 🤔, 😭, 👍, ❤️, 🎉, 🔥, ✨, 🙏, 🤝, 💪, 👋, ✅, ❌, 💬, 🏆
        </div>
      `;
      document.body.appendChild(picker);
      
      this.emojiBtn.addEventListener('click', () => {
        picker.style.display = picker.style.display === 'block' ? 'none' : 'block';
      });
      
      picker.addEventListener('click', (e) => {
        const emoji = e.target.textContent.trim();
        if (emoji && emoji.length <= 4) {
          this.messageInput.value += emoji;
          this.messageInput.focus();
          picker.style.display = 'none';
        }
      });
      
      document.addEventListener('click', (e) => {
        if (!this.emojiBtn.contains(e.target) && !picker.contains(e.target)) {
          picker.style.display = 'none';
        }
      });
    }
    
    bindEvents() {
      this.sendBtn.addEventListener('click', () => this.sendMessage());
      this.messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          this.sendMessage();
        }
      });
      this.attachBtn.addEventListener('click', () => this.fileInput.click());
      this.fileInput.addEventListener('change', () => this.handleFileSelect());
      this.messageInput.addEventListener('paste', (e) => this.handlePaste(e));
    }
    
    escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }
  }
  
  // 启动聊天
  document.addEventListener('DOMContentLoaded', () => {
    window.chat = new SupportChat();
  });
</script>
</body>
</html>
