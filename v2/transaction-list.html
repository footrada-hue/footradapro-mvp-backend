<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Transaction History · FootRadaPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ========== 8px 网格系统 ========== */
    :root {
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-7: 28px;
      --space-8: 32px;
      
      --font-xs: 0.75rem;
      --font-sm: 0.875rem;
      --font-base: 1rem;
      --font-md: 1.125rem;
      --font-lg: 1.25rem;
      --font-xl: 1.5rem;
      
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 20px;
      --radius-xl: 24px;
      --radius-2xl: 28px;
      --radius-full: 9999px;
      
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-fast: 0.15s;
      --duration-base: 0.24s;
    }

    /* ========== 玻璃质感主题 ========== */
    :root {
      --bg-gradient-start: rgba(248, 250, 252, 0.95);
      --bg-gradient-end: rgba(241, 245, 249, 0.98);
      --glass-bg: rgba(255, 255, 255, 0.52);
      --glass-border: rgba(59, 130, 246, 0.12);
      --glass-shadow: 0 2px 8px rgba(0,0,0,0.02), 0 8px 24px rgba(0,0,0,0.03), inset 0 1px 0 rgba(255,255,255,0.9);
      --glass-shadow-hover: 0 8px 24px rgba(0,0,0,0.06), 0 16px 32px -12px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.95);
      --accent: #2563eb;
      --accent-glow: rgba(37,99,235,0.2);
      --accent-gradient: linear-gradient(135deg, #2563eb, #4f46e5);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #64748b;
      --border-light: rgba(148,163,184,0.12);
      --card-bg: rgba(255,255,255,0.65);
      --ticker-bg: rgba(37,99,235,0.9);
      --badge-soft: rgba(37,99,235,0.08);
    }

    body.dark {
      --bg-gradient-start: rgba(10,16,30,0.96);
      --bg-gradient-end: rgba(2,6,18,0.98);
      --glass-bg: rgba(20,28,44,0.55);
      --glass-border: rgba(59,130,246,0.2);
      --glass-shadow: 0 2px 8px rgba(0,0,0,0.2), 0 8px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.04);
      --glass-shadow-hover: 0 8px 24px rgba(0,0,0,0.35), 0 16px 32px -12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.3);
      --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
      --success: #34d399;
      --warning: #fbbf24;
      --danger: #f87171;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --card-bg: rgba(20,28,44,0.6);
    }

    body {
      background: radial-gradient(ellipse at 30% 40%, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: ''; position: fixed; top:0; left:0; width:100%; height:100%;
      background-image: repeating-linear-gradient(90deg, rgba(59,130,246,0.015) 0px, rgba(59,130,246,0.015) 1px, transparent 1px, transparent 40px),
                        repeating-linear-gradient(0deg, rgba(59,130,246,0.015) 0px, rgba(59,130,246,0.015) 1px, transparent 1px, transparent 40px);
      background-size: 40px 40px;
      pointer-events: none; z-index:0;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--border-light); border-radius: var(--radius-full); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: var(--radius-full); }

    .app-wrapper { position: relative; z-index:1; min-height:100vh; display: flex; flex-direction: column; }

    /* 跑马灯 */
    .ticker {
      background: var(--ticker-bg); backdrop-filter: blur(12px); color: white; padding: 10px 0; font-size: var(--font-sm); font-weight: 500;
      white-space: nowrap; overflow: hidden; border-bottom: 1px solid var(--glass-border);
    }
    .ticker-content { display: inline-block; animation: ticker 32s linear infinite; padding-left: 100%; letter-spacing: 0.3px; }
    @keyframes ticker { to { transform: translateX(-100%); } }

    /* 头部导航 */
    .header {
      background: var(--glass-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border);
      padding: var(--space-4) var(--space-6); position: sticky; top:0; z-index:50; box-shadow: var(--glass-shadow);
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: var(--space-3); }
    .logo-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .logo-text { font-size: var(--font-md); font-weight: 700; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .header-actions { display: flex; gap: var(--space-5); align-items: center; }
    .header-actions i { font-size: 20px; color: var(--text-secondary); cursor: pointer; transition: all var(--duration-fast) var(--ease-out); }
    .user-badge { width: 38px; height: 38px; border-radius: 50%; background: var(--badge-soft); backdrop-filter: blur(8px); color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 600; border: 1px solid var(--glass-border); }

    /* 主内容区 */
    .container { display: flex; flex:1; padding: var(--space-6); gap: var(--space-6); max-width: 900px; margin: 0 auto; width: 100%; }
    .content { flex:1; }

    /* 模式指示器（只读） */
    .mode-indicator {
      display: inline-flex; align-items: center; gap: var(--space-2); background: var(--badge-soft); backdrop-filter: blur(8px);
      padding: 6px 16px; border-radius: var(--radius-full); width: fit-content; margin-bottom: var(--space-5);
      font-size: var(--font-sm);
    }
    .mode-indicator .sandbox-mode-text { color: #8b5cf6; font-weight: 600; }
    .mode-indicator .live-mode-text { color: #f97316; font-weight: 600; }
    .test-badge-mode { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; padding: 4px 12px; border-radius: var(--radius-full); font-size: var(--font-xs); margin-left: var(--space-3); }

    /* 筛选标签 */
    .filter-tabs {
      display: flex; gap: var(--space-2); margin-bottom: var(--space-6); flex-wrap: wrap;
    }
    .filter-tab {
      background: var(--badge-soft); border: none; padding: 10px 24px; border-radius: var(--radius-full);
      color: var(--text-secondary); font-weight: 600; cursor: pointer; transition: all var(--duration-fast);
      font-size: var(--font-sm);
    }
    .filter-tab.active { background: var(--accent-gradient); color: white; box-shadow: 0 4px 12px var(--accent-glow); }

    /* 统计卡片 */
    .stats-row {
      display: flex; gap: var(--space-4); margin-bottom: var(--space-6);
    }
    .stat-card {
      flex: 1; background: var(--card-bg); backdrop-filter: blur(24px); border-radius: var(--radius-lg);
      border: 1px solid var(--glass-border); padding: var(--space-4) var(--space-3); text-align: center;
      transition: all var(--duration-fast);
    }
    .stat-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .stat-number { font-size: var(--font-xl); font-weight: 700; color: var(--accent); line-height: 1.2; }
    .stat-label { font-size: var(--font-xs); color: var(--text-muted); margin-top: var(--space-1); }

    /* 交易卡片 */
    .transaction-card {
      background: var(--card-bg); backdrop-filter: blur(24px); border-radius: var(--radius-xl);
      border: 1px solid var(--glass-border); margin-bottom: var(--space-4);
      transition: all var(--duration-base);
    }
    .transaction-card:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: var(--glass-shadow-hover); }

    /* 卡片头部 - 队徽两端，名称靠中间 */
    .card-header {
      display: flex; justify-content: space-between; align-items: center; padding: var(--space-5) var(--space-5) var(--space-3);
    }
    /* 主队区块：队徽在左，名称在右 */
    .home-team-block {
      display: flex; align-items: center; gap: var(--space-2);
    }
    /* 客队区块：名称在左，队徽在右 */
    .away-team-block {
      display: flex; align-items: center; gap: var(--space-2);
    }
    /* 队徽容器 */
    .team-badge {
      width: 40px; height: 40px; background: var(--badge-soft); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .team-badge i { font-size: 20px; color: var(--accent); }
    .team-badge img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .team-name {
      font-weight: 600; font-size: var(--font-sm); white-space: nowrap;
    }
    /* VS 分隔符 */
    .vs-divider {
      color: var(--accent); font-size: var(--font-xs); font-weight: 700; 
      background: var(--badge-soft); padding: 4px 12px; border-radius: var(--radius-full);
      margin: 0 var(--space-2);
    }
    .card-header-right { display: flex; align-items: center; gap: var(--space-2); flex-shrink: 0; }
    .test-badge { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; padding: 2px 8px; border-radius: var(--radius-full); font-size: 10px; }
    .status-badge { font-size: var(--font-xs); font-weight: 600; padding: 4px 12px; border-radius: var(--radius-full); }
    .status-badge.pending { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .status-badge.won { background: rgba(16,185,129,0.15); color: #10b981; }
    .status-badge.lost { background: rgba(239,68,68,0.15); color: #ef4444; }

    /* 卡片主体 */
    .card-body { padding: var(--space-2) var(--space-5); cursor: pointer; }
    .match-league { font-size: var(--font-xs); color: var(--text-muted); margin-bottom: var(--space-2); }
    .amount-info { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: var(--space-2); }
    .auth-amount { font-size: var(--font-md); font-weight: 700; }
    .auth-amount small { font-size: var(--font-xs); font-weight: normal; color: var(--text-muted); }
    .profit-badge { font-size: var(--font-sm); font-weight: 600; }
    .profit-badge.positive { color: var(--success); }
    .profit-badge.negative { color: var(--danger); }
    .profit-badge.pending { color: var(--warning); }

    /* 卡片底部 */
    .card-footer {
      display: flex; justify-content: space-between; align-items: center; padding: var(--space-3) var(--space-5) var(--space-5);
      border-top: 1px solid var(--border-light);
      flex-wrap: wrap; gap: var(--space-2);
    }
    .match-time { font-size: var(--font-xs); color: var(--text-muted); display: flex; align-items: center; gap: var(--space-1); }
    .footer-right { display: flex; align-items: center; gap: var(--space-3); }
    .report-btn {
      background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 6px 14px;
      border-radius: var(--radius-full); font-size: var(--font-xs); font-weight: 500; cursor: pointer; transition: all var(--duration-fast);
    }
    .report-btn:hover { background: var(--accent); color: white; }
    .detail-btn {
      background: var(--badge-soft); border: none; width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all var(--duration-fast);
    }
    .detail-btn:hover { background: var(--accent); color: white; transform: translateX(2px); }

    /* 章节标题 */
    .section-title {
      font-size: var(--font-base); font-weight: 600; margin: var(--space-5) 0 var(--space-3);
      display: flex; align-items: center;
    }

    /* 加载状态 */
    .loading-state { text-align: center; padding: 60px; }
    .loading-spinner { width: 48px; height: 48px; border: 3px solid var(--border-light); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 60px; background: var(--card-bg); backdrop-filter: blur(20px); border-radius: var(--radius-2xl); }
    .empty-state i { font-size: 64px; color: var(--text-muted); margin-bottom: 16px; }

    /* 加载更多 */
    .load-more { display: flex; justify-content: center; margin: var(--space-6) 0; }
    .load-more-btn { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); padding: 12px 32px; border-radius: var(--radius-full); color: var(--accent); font-weight: 600; cursor: pointer; transition: all var(--duration-fast); }
    .load-more-btn:hover { background: var(--accent); color: white; }

    /* 底部导航 */
    .bottom-nav { display: none; position: fixed; bottom:0; left:0; right:0; background: var(--card-bg); backdrop-filter: blur(24px); border-top: 1px solid var(--glass-border); padding: var(--space-3) var(--space-5); z-index:60; }
    .bottom-nav-items { display: flex; justify-content: space-around; max-width: 500px; margin:0 auto; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: var(--space-1); font-size: var(--font-xs); color: var(--text-muted); cursor: pointer; padding: var(--space-2) 0; transition: all var(--duration-fast); }
    .nav-item.active { color: var(--accent); }
    .nav-item i { font-size: 22px; }

    /* 悬浮按钮 */
    .fab { position: fixed; bottom: 28px; right: 28px; width: 52px; height: 52px; border-radius: 50%; background: var(--accent-gradient); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px var(--accent-glow); z-index:55; cursor: pointer; transition: all var(--duration-fast); border: 1px solid rgba(255,255,255,0.2); }

    /* 响应式 */
    @media (max-width: 768px) {
      .container { padding: var(--space-4); }
      .filter-tab { padding: 8px 18px; font-size: var(--font-xs); }
      .stat-number { font-size: var(--font-md); }
      
      /* 移动端队徽和文字优化 */
      .team-badge { width: 32px; height: 32px; }
      .team-badge i { font-size: 16px; }
      .team-name { font-size: var(--font-xs); white-space: normal; max-width: 80px; }
      .vs-divider { padding: 2px 8px; font-size: 10px; margin: 0 var(--space-1); }
      
      .card-header { padding: var(--space-4); flex-wrap: wrap; gap: var(--space-2); }
      .card-body { padding: var(--space-2) var(--space-4); }
      .card-footer { padding: var(--space-2) var(--space-4) var(--space-4); }
      
      .auth-amount { font-size: var(--font-base); }
      .profit-badge { font-size: var(--font-xs); }
      .report-btn { padding: 4px 10px; font-size: 10px; }
      .detail-btn { width: 28px; height: 28px; }
      
      .bottom-nav { display: block; }
      body { padding-bottom: 70px; }
      .fab { bottom: 80px; right: 20px; width: 48px; height: 48px; }
    }

    @media (max-width: 480px) {
      .container { padding: var(--space-3); }
      .stats-row { gap: var(--space-2); }
      .stat-card { padding: var(--space-2); }
      .stat-number { font-size: var(--font-base); }
      
      .team-badge { width: 28px; height: 28px; }
      .team-badge i { font-size: 14px; }
      .team-name { font-size: 10px; max-width: 65px; }
      .vs-divider { padding: 2px 6px; font-size: 9px; }
      
      .card-footer { flex-direction: column; align-items: flex-start; }
      .footer-right { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div class="ticker"><div class="ticker-content">⚡ FOOTRADA · AI-Powered Football Trading &nbsp;|&nbsp; 🔒 Trust Anchor Enabled &nbsp;|&nbsp; 🏆 World Cup 2026</div></div>

  <div class="header">
    <div class="logo"><div class="logo-icon">⚽</div><div class="logo-text">FootRadaPro</div></div>
    <div class="header-actions"><i class="fa-regular fa-moon" id="themeToggle"></i><div class="user-badge">EN</div></div>
  </div>

  <div class="container">
    <main class="content">
      <div class="mode-indicator">
        <i class="fa-solid fa-info-circle"></i>
        <span>Current Mode: </span>
        <span id="currentModeText" class="sandbox-mode-text">Sandbox</span>
        <span id="testModeBadge" class="test-badge-mode" style="display: none;">🧪 Test Mode</span>
      </div>

      <div class="filter-tabs">
        <button class="filter-tab active" data-status="all">All</button>
        <button class="filter-tab" data-status="pending">Active</button>
        <button class="filter-tab" data-status="settled">Settled</button>
      </div>

      <div class="stats-row">
        <div class="stat-card"><div class="stat-number" id="totalCount">0</div><div class="stat-label">Total</div></div>
        <div class="stat-card"><div class="stat-number" id="winCount">0</div><div class="stat-label">Won</div></div>
        <div class="stat-card"><div class="stat-number" id="lossCount">0</div><div class="stat-label">Loss</div></div>
      </div>

      <div id="loadingState" class="loading-state">
        <div class="loading-spinner"></div>
        <p>Loading transactions...</p>
      </div>

      <div id="emptyState" class="empty-state" style="display: none;">
        <i class="fa-solid fa-receipt"></i>
        <p>No transactions found</p>
      </div>

      <div id="transactionList"></div>

      <div id="loadMore" class="load-more" style="display: none;">
        <button class="load-more-btn" id="loadMoreBtn">Load More</button>
      </div>
    </main>
  </div>

  <div class="bottom-nav">
    <div class="bottom-nav-items">
      <div class="nav-item" data-nav="home"><i class="fa-solid fa-home"></i><span>Home</span></div>
      <div class="nav-item" data-nav="market"><i class="fa-solid fa-chart-line"></i><span>Market</span></div>
      <div class="nav-item active" data-nav="records"><i class="fa-solid fa-list"></i><span>Records</span></div>
      <div class="nav-item" data-nav="support"><i class="fa-solid fa-headset"></i><span>Support</span></div>
      <div class="nav-item" data-nav="profile"><i class="fa-solid fa-user"></i><span>Profile</span></div>
    </div>
  </div>

  <div class="fab" onclick="alert('Support: contact via Telegram')"><i class="fa-solid fa-comment-dots"></i></div>
</div>

<script>
  // 模拟数据
  const mockTransactions = [
    { auth_id: 'A1001', home_team: 'Liverpool', away_team: 'Manchester City', league: 'Premier League', amount: 200, profit: 0, status: 'pending', match_time: new Date(Date.now() - 2 * 3600000).toISOString(), is_test_mode: false, has_report: false },
    { auth_id: 'A1002', home_team: 'Real Madrid', away_team: 'Barcelona', league: 'La Liga', amount: 300, profit: 45.20, status: 'won', match_time: new Date(Date.now() - 24 * 3600000).toISOString(), is_test_mode: false, has_report: true },
    { auth_id: 'A1003', home_team: 'Bayern Munich', away_team: 'Borussia Dortmund', league: 'Bundesliga', amount: 150, profit: 22.50, status: 'won', match_time: new Date(Date.now() - 48 * 3600000).toISOString(), is_test_mode: false, has_report: true },
    { auth_id: 'A1004', home_team: 'Paris SG', away_team: 'Olympique Marseille', league: 'Ligue 1', amount: 500, profit: -30.00, status: 'lost', match_time: new Date(Date.now() - 72 * 3600000).toISOString(), is_test_mode: false, has_report: true }
  ];

  // 全局状态
  function getAppMode() { return localStorage.getItem('appMode') || 'sandbox'; }
  function getThemeMode() { return localStorage.getItem('theme') || 'light'; }

  function updateThemeUI() {
    const theme = getThemeMode();
    if (theme === 'dark') document.body.classList.add('dark');
    else document.body.classList.remove('dark');
    const icon = document.getElementById('themeToggle');
    if (icon) {
      if (theme === 'dark') { icon.classList.remove('fa-moon'); icon.classList.add('fa-sun'); }
      else { icon.classList.remove('fa-sun'); icon.classList.add('fa-moon'); }
    }
  }

  function updateModeUI() {
    const isSandbox = getAppMode() === 'sandbox';
    const modeText = document.getElementById('currentModeText');
    if (modeText) {
      modeText.textContent = isSandbox ? 'Sandbox' : 'Live';
      modeText.className = isSandbox ? 'sandbox-mode-text' : 'live-mode-text';
    }
    const testBadge = document.getElementById('testModeBadge');
    if (testBadge) testBadge.style.display = isSandbox ? 'inline-flex' : 'none';
  }

  function formatAmount(amount) {
    const num = Number(amount);
    if (isNaN(num)) return '0.00';
    return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function formatDate(dateString) {
    if (!dateString) return '-';
    try {
      const date = new Date(dateString);
      return `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
    } catch { return '-'; }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
  }

  // 渲染交易卡片 - 队徽两端，名称靠中
  function renderTransactionCard(t) {
    const isTestMode = getAppMode() === 'sandbox';
    const currency = isTestMode ? 'tUSDT' : 'USDT';
    const isPending = t.status === 'pending';
    const isWin = t.profit > 0;
    const profitClass = isPending ? 'pending' : (isWin ? 'positive' : 'negative');
    const profitText = isPending ? 'Pending' : (isWin ? `+${formatAmount(t.profit)}` : formatAmount(t.profit));
    const statusClass = isPending ? 'pending' : (isWin ? 'won' : 'lost');
    const statusText = isPending ? 'Pending' : (isWin ? 'Won' : 'Lost');

    return `
      <div class="transaction-card" data-auth-id="${t.auth_id}">
        <div class="card-header">
          <div style="display: flex; align-items: center; gap: var(--space-3);">
            <div class="home-team-block">
              <div class="team-badge"><i class="fas fa-futbol"></i></div>
              <span class="team-name">${escapeHtml(t.home_team)}</span>
            </div>
            <span class="vs-divider">VS</span>
            <div class="away-team-block">
              <span class="team-name">${escapeHtml(t.away_team)}</span>
              <div class="team-badge"><i class="fas fa-futbol"></i></div>
            </div>
          </div>
          <div class="card-header-right">
            ${isTestMode ? '<span class="test-badge"><i class="fas fa-flask"></i> Test</span>' : ''}
            <div class="status-badge ${statusClass}">${statusText}</div>
          </div>
        </div>
        <div class="card-body" onclick="viewDetail('${t.auth_id}')">
          <div class="match-league"><i class="fas fa-trophy"></i> ${escapeHtml(t.league)}</div>
          <div class="amount-info">
            <div class="auth-amount">${formatAmount(t.amount)} <small>${currency}</small></div>
            <div class="profit-badge ${profitClass}">${profitText}</div>
          </div>
        </div>
        <div class="card-footer">
          <div class="match-time"><i class="fas fa-clock"></i> ${formatDate(t.match_time)}</div>
          <div class="footer-right">
            ${!isPending && t.has_report ? `<button class="report-btn" onclick="viewReport('${t.auth_id}', event)"><i class="fas fa-file-alt"></i> Report</button>` : ''}
            <button class="detail-btn" onclick="viewDetail('${t.auth_id}')"><i class="fas fa-chevron-right"></i></button>
          </div>
        </div>
      </div>
    `;
  }

  function renderTransactions() {
    const container = document.getElementById('transactionList');
    const loadingState = document.getElementById('loadingState');
    const emptyState = document.getElementById('emptyState');
    const loadMore = document.getElementById('loadMore');
    
    if (!container) return;
    
    const pending = mockTransactions.filter(t => t.status === 'pending');
    const settled = mockTransactions.filter(t => t.status !== 'pending');
    
    let html = '';
    if (pending.length > 0) {
      html += '<div class="section-title"><i class="fas fa-hourglass-half" style="margin-right: 8px; color: #f59e0b;"></i>Active</div>';
      pending.forEach(t => { html += renderTransactionCard(t); });
    }
    if (settled.length > 0) {
      html += '<div class="section-title"><i class="fas fa-check-circle" style="margin-right: 8px; color: #10b981;"></i>Settled</div>';
      settled.forEach(t => { html += renderTransactionCard(t); });
    }
    
    if (mockTransactions.length === 0) {
      loadingState.style.display = 'none';
      emptyState.style.display = 'flex';
      container.style.display = 'none';
      loadMore.style.display = 'none';
    } else {
      loadingState.style.display = 'none';
      emptyState.style.display = 'none';
      container.style.display = 'block';
      container.innerHTML = html;
      loadMore.style.display = 'none';
    }
    
    document.getElementById('totalCount').textContent = mockTransactions.length;
    document.getElementById('winCount').textContent = mockTransactions.filter(t => t.profit > 0).length;
    document.getElementById('lossCount').textContent = mockTransactions.filter(t => t.profit < 0).length;
  }

  window.viewDetail = function(authId) {
    window.location.href = `/transaction-detail.html?authId=${authId}`;
  };
  
  window.viewReport = function(authId, event) {
    if (event) event.stopPropagation();
    window.location.href = `/report-detail.html?authId=${authId}`;
  };

  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    });
  });

  document.getElementById('themeToggle')?.addEventListener('click', () => {
    const newTheme = getThemeMode() === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', newTheme);
    window.dispatchEvent(new CustomEvent('themeChanged', { detail: { theme: newTheme } }));
    updateThemeUI();
  });

  window.addEventListener('appModeChanged', () => updateModeUI());
  window.addEventListener('themeChanged', () => updateThemeUI());

  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      const nav = item.dataset.nav;
      if (nav === 'home') window.location.href = '/index.html';
      if (nav === 'market') window.location.href = '/match-market.html';
      if (nav === 'records') window.location.href = '/transaction-list.html';
      if (nav === 'support') window.location.href = '/support.html';
      if (nav === 'profile') window.location.href = '/profile.html';
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
    });
  });

  updateThemeUI();
  updateModeUI();
  renderTransactions();
</script>
</body>
</html>
